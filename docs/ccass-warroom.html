<style>
:root{
  --bg:#070B14; --panel:#0C1322; --panel2:#101A30; --line:rgba(0,229,255,.14);
  --cy:#00E5FF; --up:#FF4757; --dn:#00D98B; --amb:#FFB300; --mag:#FF2EC4; --vio:#9D6BFF;
  --txt:#D8E6F5; --dim:#6B7E99; --s:#FF4757; --a:#FFB300; --b:#00E5FF; --c:#6B7E99;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg); color:var(--txt); font-family:'Noto Sans TC',sans-serif; overflow-x:hidden; min-height:100vh}
body::before{content:''; position:fixed; inset:0; pointer-events:none; z-index:99;
  background:repeating-linear-gradient(0deg, rgba(0,229,255,.018) 0 1px, transparent 1px 3px)}
.mono{font-family:'JetBrains Mono',monospace}

/* ── 套件導航 (對齊你現有系統) ── */
.suitenav{display:flex; gap:6px; padding:8px 16px; flex-wrap:wrap; border-bottom:1px solid var(--line); background:rgba(255,255,255,.02)}
.suitenav a{font-size:12px; color:var(--dim); text-decoration:none; padding:3px 9px; border:1px solid rgba(255,255,255,.08); border-radius:6px; white-space:nowrap}
.suitenav a:hover{color:var(--cy); border-color:var(--cy)}
.suitenav a.here,.suitenav a.active{color:var(--cy); border-color:var(--cy); box-shadow:0 0 8px rgba(0,229,255,.3)}

header{display:flex; align-items:center; gap:16px; padding:12px 20px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(0,229,255,.06), transparent)}
.logo .t1{font-family:'Rajdhani'; font-weight:700; font-size:21px; letter-spacing:.16em; color:var(--cy); text-shadow:0 0 12px rgba(0,229,255,.6)}
.logo .t2{font-size:11px; color:var(--dim); letter-spacing:.25em}
.hstat{margin-left:auto; display:flex; gap:18px; align-items:center}
.live{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dn); letter-spacing:.12em}
.live .dot{width:7px;height:7px;border-radius:50%;background:var(--dn);box-shadow:0 0 8px var(--dn);animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.25}}
.hitem .k{font-size:10px;color:var(--dim);letter-spacing:.15em}
.hitem .v{font-family:'JetBrains Mono';font-size:14px;font-weight:600;color:var(--cy)}

.statbar{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:12px 20px}
.scard{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:9px 14px; position:relative; overflow:hidden}
.scard::before{content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--cy); opacity:.7}
.scard .k{font-size:11px; color:var(--dim); letter-spacing:.1em}
.scard .v{font-family:'JetBrains Mono'; font-size:22px; font-weight:700; margin-top:2px}

.fbar{display:flex; gap:6px; padding:0 20px 10px; flex-wrap:wrap; align-items:center}
.fbtn{font-size:12px; padding:4px 12px; border-radius:6px; border:1px solid rgba(255,255,255,.12); color:var(--dim); cursor:pointer; background:none; font-family:inherit}
.fbtn.on{color:var(--cy); border-color:var(--cy); background:rgba(0,229,255,.08)}
.fbar .gap{flex:1}
.search{background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:6px; color:var(--txt); padding:4px 10px; font-size:12px; font-family:'JetBrains Mono'; width:130px}

.main{display:grid; grid-template-columns:400px 1fr; gap:12px; padding:0 20px 20px}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden}
.ptitle{display:flex; align-items:center; gap:8px; padding:9px 14px; border-bottom:1px solid var(--line);
  font-family:'Rajdhani'; font-weight:600; font-size:13px; letter-spacing:.18em; color:var(--cy)}
.ptitle .tag{margin-left:auto; font-size:10px; color:var(--dim); font-family:'Noto Sans TC'; letter-spacing:.05em}

.elist{max-height:calc(100vh - 290px); overflow-y:auto}
.elist::-webkit-scrollbar{width:4px}
.elist::-webkit-scrollbar-thumb{background:rgba(0,229,255,.3)}
.ecard{padding:11px 14px; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; transition:background .15s}
.ecard:hover{background:var(--panel2)}
.ecard.sel{background:var(--panel2); box-shadow:inset 3px 0 0 var(--cy)}
.erow1{display:flex; align-items:center; gap:8px}
.ecode{font-family:'JetBrains Mono'; font-weight:700; font-size:14px}
.ename{font-size:13px; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.etype{font-size:10px; padding:2px 7px; border-radius:3px; letter-spacing:.08em; font-weight:700}
.etype.pg{background:rgba(255,46,196,.15); color:var(--mag); border:1px solid rgba(255,46,196,.4)}
.etype.rs{background:rgba(255,179,0,.13); color:var(--amb); border:1px solid rgba(255,179,0,.4)}
.grade{margin-left:auto; font-family:'Rajdhani'; font-weight:700; font-size:19px; width:28px; height:28px;
  display:flex; align-items:center; justify-content:center; border-radius:6px}
.grade.S{color:var(--s); border:1px solid var(--s); box-shadow:0 0 10px rgba(255,71,87,.5); animation:pulseS 1.6s infinite}
.grade.A{color:var(--a); border:1px solid var(--a)}
.grade.B{color:var(--b); border:1px solid var(--b)}
.grade.C{color:var(--c); border:1px solid var(--c)}
@keyframes pulseS{50%{box-shadow:0 0 18px rgba(255,71,87,.9)}}
.erow2{display:flex; gap:10px; margin-top:5px; font-size:11px; color:var(--dim); flex-wrap:wrap}
.erow2 b{color:var(--txt); font-family:'JetBrains Mono'; font-weight:600}
.sigchips{display:flex; gap:4px; margin-top:6px; flex-wrap:wrap}
.chip{font-size:10px; padding:2px 6px; border-radius:3px; border:1px solid rgba(107,126,153,.3); color:var(--dim)}
.chip.on{border-color:var(--up); color:var(--up); background:rgba(255,71,87,.08)}
.chip.poc.on{border-color:var(--mag); color:var(--mag); background:rgba(255,46,196,.08)}
.chip.ev.on{border-color:var(--vio); color:var(--vio); background:rgba(157,107,255,.08)}

.rcol{display:flex; flex-direction:column; gap:12px}
.detail-grid{display:grid; grid-template-columns:1fr 270px; gap:0}
.dleft{padding:14px; border-right:1px solid var(--line)}
.dright{padding:14px}
.dhead{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
.dcode{font-family:'JetBrains Mono'; font-size:23px; font-weight:700; color:var(--cy)}
.dname{font-size:16px}
.dpx{margin-left:auto; font-family:'JetBrains Mono'; font-size:23px; font-weight:700}
.dchg{font-family:'JetBrains Mono'; font-size:13px}
.up{color:var(--up)} .dn{color:var(--dn)}
.evinfo{display:flex; gap:14px; font-size:12px; color:var(--dim); margin:8px 0 4px; flex-wrap:wrap}
.evinfo b{color:var(--txt); font-family:'JetBrains Mono'}
.evinfo a{color:var(--cy)}

/* 關卡梯級 */
.ladder{margin-top:10px}
.lrow{display:flex; align-items:center; gap:10px; padding:7px 10px; margin-bottom:5px;
  background:var(--panel2); border:1px solid rgba(255,255,255,.05); border-radius:6px; font-size:12px}
.lrow .nm{width:110px; color:var(--dim)}
.lrow .bar{flex:1; height:8px; background:rgba(255,255,255,.05); border-radius:3px; position:relative; overflow:visible}
.lrow .bar i{position:absolute; left:0; top:0; height:100%; border-radius:3px}
.lrow .bar .me{position:absolute; top:-3px; width:2px; height:14px; background:#fff; box-shadow:0 0 6px #fff}
.lrow .lv{font-family:'JetBrains Mono'; width:70px; text-align:right; color:var(--txt)}
.lrow .pc{font-family:'JetBrains Mono'; width:64px; text-align:right; font-weight:600}
.lrow.broke{border-color:rgba(255,71,87,.4)}
.lrow.broke .nm{color:var(--up)}

.sighist{margin-top:12px}
.sline{display:flex; gap:10px; padding:5px 0; font-size:12px; border-bottom:1px solid rgba(255,255,255,.04); align-items:baseline}
.sline .d{font-family:'JetBrains Mono'; font-size:10px; color:var(--dim); white-space:nowrap}
.sline .cat{font-size:10px; padding:1px 6px; border-radius:3px; white-space:nowrap}
.cat.poc{background:rgba(255,46,196,.12); color:var(--mag)}
.cat.year_open{background:rgba(0,229,255,.1); color:var(--cy)}
.cat.ipo{background:rgba(255,179,0,.12); color:var(--amb)}
.cat.gap{background:rgba(255,71,87,.12); color:var(--up)}
.cat.ccass{background:rgba(0,217,139,.12); color:var(--dn)}
.cat.other{background:rgba(107,126,153,.15); color:var(--dim)}

.radarwrap{text-align:center}
.gradebig{font-family:'Rajdhani'; font-weight:700; font-size:46px; line-height:1}
.gradelabel{font-size:11px; color:var(--dim); letter-spacing:.25em; margin-bottom:4px}
.scorebar{height:6px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; margin:8px 0 4px}
.scorebar i{display:block; height:100%; background:linear-gradient(90deg,var(--cy),var(--up)); transition:width .8s cubic-bezier(.2,.9,.2,1)}
.scoreval{font-family:'JetBrains Mono'; font-size:13px}
.mrow{display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.05)}
.mrow .k{color:var(--dim)} .mrow .v{font-family:'JetBrains Mono'; font-weight:600}

footer{padding:8px 20px 16px; font-size:10px; color:var(--dim)}
footer a{color:var(--cy)}
@media(max-width:980px){
  .main{grid-template-columns:1fr}
  .statbar{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .dleft{border-right:none; border-bottom:1px solid var(--line)}
  .elist{max-height:400px}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important}}

<footer>數據:你現有系統 holdings / signals / announcements / breakthroughs · 每10分鐘自動更新 · <a href="../rights_analysis.html">📋 供配股詳細分析</a> · <a href="../daily_trade_prompt.html">🚦 每日提示</a> · <a href="../timing_analysis.html">⏱ 時間窗口</a> · <a href="../jieqi_analysis.html">🧭 節氣窗口</a> · <a href="../distribution_day.html">📉 分佈日</a> · 僅供研究,不構成投資建議</footer>

<script>
/* ════════════════════════════════════════════════════
   v3.1 引擎 — 自我診斷 + 永不死版
   修正: ① 自動偵測數據路徑(絕對URL為主,點開都行,包括file://以外任何位置)
        ② 四檔獨立載入,缺檔自動降級,唔會一檔死全家
        ③ 載入失敗自動重試(3次退避) + 手動重載掣
        ④ 手機切返嚟個tab自動補刷新(計時器被殺都唔怕)
        ⑤ 數據過期警告(holdings超過26個鐘 = 你後台管線冇出新數據,唔係app壞)
        ⑥ Pages設定錯誤自動診斷提示
   ════════════════════════════════════════════════════ */
const SITE = "https://rachellam28-lang.github.io/hk-alert-cloud-gas";
const BASES = ["..", ".", SITE];          // 順序試
const FILES = {holdings:"holdings.json", signals:"data/signals.json",
               ann:"data/announcements.json", brk:"data/breakthroughs.json"};
const SIG_FRESH_DAYS = 30, REFRESH_MIN = 10, STALE_HOURS = 26;

const $ = id => document.getElementById(id);
const fmt = (n,d=2)=> (n==null||isNaN(n)) ? "--" : Number(n).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
const px3 = v => fmt(v, v<1?3:2);
const daysAgo = d => { const t=new Date(d).getTime(); return isFinite(t)?Math.floor((Date.now()-t)/86400000):999; };

let ROWS=[], VIEW=[], SEL=0, FILTER="all", Q="", BASE=null, LAST_OK=0, nextAt=0;

async function probeBase(){
  if(BASE) return BASE;
  for(const b of BASES){
    try{
      const r = await fetch(`${b}/${FILES.holdings}?_=${Date.now()}`, {method:"HEAD"});
      if(r.ok){ BASE=b; return b; }
    }catch(e){}
  }
  return null;
}
async function getJ(path){
  const r = await fetch(`${BASE}/${path}?_=${Date.now()}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function sysmsg(html){ const el=$('sysbar'); if(!html){el.style.display='none';return;} el.style.display='block'; el.innerHTML=html; }

async function boot(retry=0){
  $('dsrc').textContent = "載入中…";
  if(!(await probeBase())){
    if(retry<3){ setTimeout(()=>boot(retry+1), (retry+1)*4000); $('dsrc').textContent=`重試中 ${retry+1}/3…`; return; }
    $('dsrc').textContent = "離線";
    sysmsg(`❌ 完全攞唔到數據。最可能原因:GitHub Pages 設定錯咗。去 <b>Settings → Pages</b> 確認 Branch 係 <b>main</b> + <b>/ (root)</b>(唔係 /docs)。改完等2分鐘再撳「↻ 重載」。`);
    return;
  }
  const rs = await Promise.allSettled([getJ(FILES.holdings), getJ(FILES.signals), getJ(FILES.ann), getJ(FILES.brk)]);
  const [H,S,A,B] = rs.map(r=> r.status==="fulfilled" ? r.value : null);
  if(!H){
    if(retry<3){ setTimeout(()=>boot(retry+1), (retry+1)*4000); return; }
    sysmsg(`❌ holdings.json 載入失敗 (${rs[0].reason||""})。撳「↻ 重載」再試;持續失敗就係你後台管線未出檔。`);
    $('dsrc').textContent = "離線"; return;
  }
  const missing = ["signals","公告","breakthroughs"].filter((_,i)=>!rs[i+1] || rs[i+1].status!=="fulfilled");
  const updated = H.updated || "";
  const ageH = updated ? (Date.now()-new Date(updated).getTime())/3.6e6 : null;
  let warn = [];
  if(missing.length) warn.push(`⚠ 部分數據缺檔(${missing.join("、")}),已自動降級顯示`);
  if(ageH!=null && ageH > STALE_HOURS) warn.push(`⚠ 數據已 ${Math.round(ageH)} 小時冇更新 — 係你後台管線未跑,唔係本頁問題`);
  sysmsg(warn.join("<br>") || null);

  try{ build(H, S||{groups:[]}, A||[], B||{active_prices:{}}); }
  catch(e){ sysmsg(`❌ 數據解析出錯:${e.message}。可能後台檔案格式改咗,要通知 AI 跟進。`); return; }

  LAST_OK = Date.now(); nextAt = Date.now()+REFRESH_MIN*60000;
  $('dsrc').textContent = "LIVE · "+(BASE===SITE?"絕對路徑":"相對路徑");
  $('upd').textContent = updated ? updated.slice(5,16) : "--";
}

function build(H,S,A,B){
  const hold = {};
  (Array.isArray(H.stocks)?H.stocks:Object.values(H.stocks||{})).forEach(s=>{ if(s&&s.c) hold[s.c]=s; });
  const sigmap = {}; (S.groups||[]).forEach(s=>{ if(s&&s.code) sigmap[s.code]=s; });
  const ap = B.active_prices || {};
  const annmap = {};
  (A||[]).forEach(a=>{ if(!a||!a.code) return; const k=a.code+"|"+a.typeLabel;
    if(!annmap[k] || (a.date||"") > (annmap[k].date||"")) annmap[k]=a; });

  const codes = new Set();
  (S.groups||[]).forEach(s=>{ if(s.corpTypes && (s.corpTypes.placement||s.corpTypes.rights)) codes.add(s.code); });
  (A||[]).forEach(a=>{ if(a && (a.typeLabel==='配股'||a.typeLabel==='供股')) codes.add(a.code); });

  function evTypeOf(code, sg){
    const p=annmap[code+"|配股"], r=annmap[code+"|供股"];
    if(p&&r) return (p.date||"")>=(r.date||"") ? ["配股",p] : ["供股",r];
    if(p) return ["配股",p];
    if(r) return ["供股",r];
    if(sg.corpTypes && sg.corpTypes.rights && !sg.corpTypes.placement) return ["供股",null];
    return ["配股",null];
  }

  ROWS = [];
  for(const code of codes){
    try{
      const h = hold[code]; if(!h || h.lp==null) continue;
      const sg = sigmap[code] || {signals:[],corpTypes:{}};
      const allSigs = Array.isArray(sg.signals)?sg.signals:[];
      const sigs = allSigs.filter(x=>x && daysAgo(x.date) <= SIG_FRESH_DAYS);
      const has = cat => sigs.some(x=>x.category===cat);
      const pocLabels = sigs.filter(x=>x.category==='poc').map(x=>x.label||"");
      const pocTier = pocLabels.some(l=>l.includes('3年')) ? 3 : pocLabels.some(l=>l.includes('12個月')) ? 2 : pocLabels.length ? 1 : 0;
      const gapok = has('gap') || sigs.some(x=>/FVG|跳空/.test(x.label||"")) || (h.vr||0) >= 3;

      const prices = ap[code] || [];
      const evp = t => { const x = prices.find(p=>p&&p.type===t); return x ? x.price : null; };
      const pPl = evp('placement'), pRt = evp('rights'), pIpo = evp('ipo');
      const [evType, ann] = evTypeOf(code, sg);

      const s1 = (h.yo!=null && h.lp>h.yo) || has('year_open');
      const s2 = has('ipo') || (pIpo!=null && h.lp>pIpo);
      const s3 = pocTier>0 && gapok;
      const brokeEv = (pPl!=null && h.lp>pPl) || (pRt!=null && h.lp>pRt);
      const ccassUp = sigs.some(x=>/增持/.test(x.label||""));
      const hits = (s1?1:0)+(s2?1:0)+(s3?1:0);

      let score = (s1?15:0)+(s2?20:0)+(s3?(10+pocTier*5):0)+(brokeEv?15:0)
                +(ccassUp?10:0)+((h.vr||0)>=3?5:0)+((h.t5||0)>=40?5:0)
                +(ann && daysAgo(ann.date)<=60 && hits>=1 ? 10:0);
      score = Math.min(100, Math.round(score));
      const grade = hits===3 ? "S" : hits===2 ? "A" : hits===1 ? "B" : "C";
      const lastSig = sigs.length ? Math.min(...sigs.map(x=>daysAgo(x.date))) : 999;

      ROWS.push({code, name:h.n||sg.name||"", h, sigs:allSigs.slice(0,12), evType, ann,
        levels:{yo:h.yo, ipo:pIpo, pl:pPl, rt:pRt}, s1,s2,s3, brokeEv, ccassUp, pocTier,
        score, grade, hits, lastSig, hkex: sg.hkexLink||(ann&&ann.url)||""});
    }catch(e){ /* 單股壞數據跳過,唔好炸全家 */ }
  }

  ROWS.sort((a,b)=> b.score-a.score || a.lastSig-b.lastSig);
  $('st-total').textContent = ROWS.length;
  $('st-s').textContent = ROWS.filter(r=>r.grade==="S").length;
  $('st-ev').textContent = ROWS.filter(r=>r.brokeEv).length;
  $('st-sig').textContent = ROWS.filter(r=>r.lastSig<=7).length;
  applyFilter();
}

function applyFilter(){
  VIEW = ROWS.filter(r=>{
    if((FILTER==="配股"||FILTER==="供股") && r.evType!==FILTER) return false;
    if(FILTER==="S" && !["S","A"].includes(r.grade)) return false;
    if(Q && !(r.code.includes(Q)||r.name.includes(Q))) return false;
    return true;
  });
  if(SEL >= VIEW.length) SEL = 0;
  $('lcount').textContent = VIEW.length+" 隻";
  renderList();
  if(VIEW.length) select(SEL); else clearDetail();
}

function clearDetail(){
  ['dcode','dname','dpx','dchg','dtag'].forEach(id=>$(id).textContent='--');
  $('evinfo').innerHTML=''; $('ladder').innerHTML=''; $('sighist').innerHTML='';
  $('gbig').textContent='-'; $('sbar').style.width='0%'; $('sval').textContent='0'; $('metrics').innerHTML='';
}

function renderList(){
  $('elist').innerHTML = VIEW.map((r,i)=>`
    <div class="ecard ${i===SEL?'sel':''}" onclick="select(${i})">
      <div class="erow1">
        <span class="ecode">${r.code}</span><span class="ename">${r.name}</span>
        <span class="etype ${r.evType==='配股'?'pg':'rs'}">${r.evType}</span>
        <span class="grade ${r.grade}">${r.grade}</span>
      </div>
      <div class="erow2">
        <span>現 <b>${px3(r.h.lp)}</b></span>
        <span class="${(r.h.chg||0)>=0?'up':'dn'}"><b>${(r.h.chg||0)>=0?'▲':'▼'}${fmt(Math.abs(r.h.chg||0),1)}%</b></span>
        <span>量比 <b>${fmt(r.h.vr,1)}</b></span>
        <span>Top5 <b>${fmt(r.h.t5,0)}%</b></span>
        ${r.lastSig<=7?`<span style="color:var(--up)">⚡${r.lastSig}日前訊號</span>`:""}
      </div>
      <div class="sigchips">
        <span class="chip ${r.s1?'on':''}">破年開</span>
        <span class="chip ${r.s2?'on':''}">破IPO</span>
        <span class="chip poc ${r.s3?'on':''}">POC×量${r.pocTier?'·'+['','半年','12月','3年'][r.pocTier]:''}</span>
        <span class="chip ev ${r.brokeEv?'on':''}">破${r.evType==='配股'?'配售':'供股'}價</span>
      </div>
    </div>`).join('') || '<div style="padding:20px;font-size:12px;color:var(--dim)">無符合事件</div>';
}

function select(i){
  if(!VIEW.length) return;
  SEL = Math.max(0, Math.min(i, VIEW.length-1));
  document.querySelectorAll('.ecard').forEach((el,j)=>el.classList.toggle('sel',j===SEL));
  const r = VIEW[SEL], h = r.h;
  $('dcode').textContent = r.code; $('dname').textContent = r.name;
  $('dpx').textContent = px3(h.lp); $('dpx').className='dpx '+((h.chg||0)>=0?'up':'dn');
  $('dchg').textContent = `${(h.chg||0)>=0?'▲':'▼'}${fmt(Math.abs(h.chg||0),2)}%`;
  $('dchg').className='dchg '+((h.chg||0)>=0?'up':'dn');
  $('dtag').textContent = r.evType + (r.ann?(' · '+r.ann.date):'');
  $('evinfo').innerHTML = [
    r.ann?`<span>最新公告 <b>${r.ann.date}</b></span>`:'',
    r.ann?`<span style="max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.ann.title||'')}</span>`:'',
    r.hkex?`<a href="${r.hkex}" target="_blank">公告 ↗</a>`:'',
    `<a href="${BASE===SITE?SITE:'..'}/rights_analysis.html" target="_blank">供配股分析 ↗</a>`,
    `<a href="${BASE===SITE?SITE:'..'}/daily_trade_prompt.html" target="_blank">每日提示 ↗</a>`,
    `<a href="${BASE===SITE?SITE:'..'}/timing_analysis.html" target="_blank">時間窗口總覽 ↗</a>`,
    `<a href="${BASE===SITE?SITE:'..'}/jieqi_analysis.html" target="_blank">節氣窗口 ↗</a>`,
    `<a href="${BASE===SITE?SITE:'..'}/distribution_day.html" target="_blank">分佈日分析 ↗</a>`,
  ].filter(Boolean).join('');

  const lvDefs = [
    ["年開市價", r.levels.yo, "#00E5FF"],
    ["IPO價", r.levels.ipo, "#FFB300"],
    ["配售價", r.levels.pl, "#9D6BFF"],
    ["供股價", r.levels.rt, "#9D6BFF"],
    ["52周高", h.hi52, "#FF4757"],
    ["52周低", h.lo52, "#00D98B"],
  ].filter(x=>x[1]!=null && isFinite(x[1]));
  const maxv = Math.max(h.lp, ...lvDefs.map(x=>x[1]))*1.05 || 1;
  $('ladder').innerHTML = lvDefs.map(([nm,v,col])=>{
    const broke = h.lp > v, pc = (h.lp/v-1)*100;
    return `<div class="lrow ${broke?'broke':''}">
      <span class="nm">${broke?'✓':'·'} ${nm}</span>
      <span class="bar"><i style="width:${Math.min(100,v/maxv*100)}%;background:${col}66;border-right:2px solid ${col}"></i>
        <span class="me" style="left:${Math.min(100,h.lp/maxv*100)}%"></span></span>
      <span class="lv">${px3(v)}</span>
      <span class="pc ${pc>=0?'up':'dn'}">${pc>=0?'+':''}${fmt(pc,1)}%</span>
    </div>`;
  }).join('') + (lvDefs.length?`<div style="font-size:10px;color:var(--dim);margin-top:2px">白色標記 = 現價位置</div>`:'<div style="font-size:11px;color:var(--dim)">無關卡價數據</div>');

  $('sighist').innerHTML = `<div class="ptitle" style="border:none;padding:8px 0 4px">⬢ 訊號紀錄 (你的引擎)</div>` +
    (r.sigs.length ? r.sigs.map(x=>`
      <div class="sline">
        <span class="d">${x.date||''}</span>
        <span class="cat ${['poc','year_open','ipo','gap'].includes(x.category)?x.category:(/增持|減持/.test(x.label||'')?'ccass':'other')}">${x.category||'·'}</span>
        <span>${(x.label||'').replace(/CCASS/g,'Market')}</span>
      </div>`).join('') : '<div class="sline"><span style="color:var(--dim)">近期無訊號</span></div>');

  $('gbig').textContent = r.grade;
  $('gbig').style.color = `var(--${r.grade.toLowerCase()})`;
  $('sbar').style.width = r.score+'%'; $('sval').textContent = r.score;
  $('metrics').innerHTML = [
    ["Top5 集中度", fmt(h.t5,1)+"%"], ["Top10", fmt(h.t10,1)+"%"],
    ["參與者", h.np??"--"], ["量比", fmt(h.vr,2)], ["市值", fmt(h.mc,0)+"億"],
    ["今年Δ", fmt(h.py_pct,1)+"%"], ["Market 方向", r.ccassUp?"增持 ↑":"--"],
  ].map(([k,v])=>`<div class="mrow"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
  drawRadar(r);
}

function drawRadar(r){
  const cv=$('radar'); if(!cv) return;
  const dpr=devicePixelRatio||1;
  cv.width=240*dpr; cv.height=195*dpr;
  const c=cv.getContext('2d'); c.scale(dpr,dpr);
  const cx=120, cy=98, R=66;
  const axes=[["破年開",r.s1?1:.25],["破IPO",r.s2?1:.25],["POC",r.pocTier/3||.15],
              ["量能",Math.min(1,(r.h.vr||0)/4)],["破事件價",r.brokeEv?1:.2],["集中度",Math.min(1,(r.h.t5||0)/60)]];
  const pt=(i,f)=>{const a=-Math.PI/2+i*2*Math.PI/axes.length;return[cx+Math.cos(a)*R*f,cy+Math.sin(a)*R*f]};
  c.strokeStyle='rgba(0,229,255,.15)';
  [0.33,0.66,1].forEach(f=>{c.beginPath();axes.forEach((_,i)=>{const[x,y]=pt(i,f);i?c.lineTo(x,y):c.moveTo(x,y)});c.closePath();c.stroke()});
  c.fillStyle='#6B7E99'; c.font='10px Noto Sans TC'; c.textAlign='center';
  axes.forEach((a,i)=>{const[x,y]=pt(i,1);c.strokeStyle='rgba(0,229,255,.12)';c.beginPath();c.moveTo(cx,cy);c.lineTo(x,y);c.stroke();
    const[lx,ly]=pt(i,1.25);c.fillText(a[0],lx,ly+3)});
  c.beginPath(); axes.forEach((a,i)=>{const[x,y]=pt(i,Math.max(.08,a[1]));i?c.lineTo(x,y):c.moveTo(x,y)}); c.closePath();
  c.fillStyle='rgba(255,71,87,.18)'; c.fill();
  c.strokeStyle='#FF4757'; c.lineWidth=2; c.shadowColor='#FF4757'; c.shadowBlur=10; c.stroke(); c.shadowBlur=0;
}

/* ── 自動刷新 + 倒數 + 返tab補刷 ── */
document.querySelectorAll('.fbtn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); FILTER=b.dataset.f; SEL=0; applyFilter();
});
$('q').oninput = e=>{ Q=e.target.value.trim(); SEL=0; applyFilter(); };
$('reload').onclick = ()=>{ BASE=null; boot(); };
addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowDown'){e.preventDefault();select(SEL+1);}
  if(e.key==='ArrowUp'){e.preventDefault();select(SEL-1);}
});
setInterval(()=>{
  if(nextAt){ const s=Math.max(0,Math.round((nextAt-Date.now())/1000));
    $('cd').textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
  if(Date.now() >= nextAt && nextAt>0){ nextAt=0; boot(); }
},1000);
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && Date.now()-LAST_OK > REFRESH_MIN*60000) boot();
});
boot();
</script>
