name: FVG Scanner

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Market to scan: hk / us / both"
        default: "both"
  schedule:
    - cron: "0 9 * * 1-5"    # 5pm HKT — after HK close
    - cron: "0 22 * * 1-5"   # 6am HKT next day — after US close

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scanner/requirements.txt

      - run: pip install -r scanner/requirements.txt

      - name: Run FVG scan
        timeout-minutes: 55
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          MARKET="${{ github.event.inputs.market || 'both' }}"
          python -u scanner/fvg_scanner.py "$MARKET"

      - name: Commit fvg.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fvg.json
          git diff --cached --quiet && { echo "fvg.json unchanged, skipping"; exit 0; }
          git commit -m "chore: update fvg.json [skip ci]"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying..."
              git rebase --abort 2>/dev/null || true
              sleep 5
            }
          done
