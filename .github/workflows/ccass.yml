name: CCASS Daily Scrape (6-Shard)

on:
  workflow_dispatch:
    inputs:
      query_date:
        description: "Override query date (YYYY-MM-DD). Leave empty for auto."
        required: false
        default: ""
  schedule:
    - cron: "0 13 * * 1-5"   # 9pm HKT Mon-Fri

permissions:
  contents: write

jobs:
  # ── Phase 1: 6 parallel shards, each scrapes ~463 stocks ──────────────
  scrape-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: [0, 1, 2, 3, 4, 5]

    outputs:
      query_date: ${{ steps.date.outputs.query_date }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Compute query date (previous HK trading day)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.query_date }}" ]; then
            QUERY_DATE="${{ github.event.inputs.query_date }}"
          else
            QUERY_DATE=$(python -c "
            from datetime import date, timedelta
            import holidays
            hk = holidays.HongKong()
            d = date.today() - timedelta(days=1)
            while d.weekday() >= 5 or d in hk:
                d -= timedelta(days=1)
            print(d.strftime('%Y-%m-%d'))
            ")
          fi
          echo "query_date=$QUERY_DATE" >> $GITHUB_OUTPUT
          echo "Query date: $QUERY_DATE"

      - name: Run CCASS shard ${{ matrix.shard }}/5
        timeout-minutes: 140
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          delay=$(( ${{ matrix.shard }} * 60 ))
          echo "Shard ${{ matrix.shard }} — waiting ${delay}s stagger..."
          sleep "$delay"
          cd ccass
          python -m src.runner \
            --shard ${{ matrix.shard }} \
            --shard-total 6 \
            --query-date ${{ steps.date.outputs.query_date }} \
            --out ../ccass-shard-${{ matrix.shard }}.json

      - name: Upload shard ${{ matrix.shard }} artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccass-shard-${{ matrix.shard }}
          path: ccass-shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 1

  # ── Phase 2: Merge all shards → DB → trends → alerts → ccass.json ────
  merge:
    needs: scrape-shard
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Compute query date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.query_date }}" ]; then
            QUERY_DATE="${{ github.event.inputs.query_date }}"
          else
            QUERY_DATE=$(python -c "
            from datetime import date, timedelta
            import holidays
            hk = holidays.HongKong()
            d = date.today() - timedelta(days=1)
            while d.weekday() >= 5 or d in hk:
                d -= timedelta(days=1)
            print(d.strftime('%Y-%m-%d'))
            ")
          fi
          echo "query_date=$QUERY_DATE" >> $GITHUB_OUTPUT

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ccass-shard-*
          merge-multiple: true
          path: .

      - name: Merge shards & run full pipeline
        timeout-minutes: 20
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          cd ccass
          python -m scripts.merge_shards --date ${{ steps.date.outputs.query_date }}

      - name: Commit ccass.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f ccass.json ]; then
            STOCK_COUNT=$(python -c "import json; d=json.load(open('ccass.json','r',encoding='utf-8')); print(len(d.get('stocks',[])))")
            echo "ccass.json has ${STOCK_COUNT} stocks"
            if [ "$STOCK_COUNT" -lt 2500 ]; then
              echo "ERROR: ccass.json only has ${STOCK_COUNT} stocks (expected 2500+). Aborting commit."
              exit 1
            fi
            git add ccass.json 2>/dev/null || true
            git diff --cached --quiet && { echo "unchanged, skipping commit"; exit 0; }
            git commit -m "chore: update ccass data (${STOCK_COUNT} stocks)"
          else
            echo "WARNING: ccass.json not found after merge!"
            exit 1
          fi
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying in 5s..."
              git rebase --abort 2>/dev/null || true
              sleep 5
            }
          done
