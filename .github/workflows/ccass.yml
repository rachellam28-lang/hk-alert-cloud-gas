name: CCASS Daily Scrape (6-Shard)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1-5"   # 9pm HKT Mon-Fri

permissions:
  contents: write

jobs:
  # ── Phase 1: 6 parallel shards, each scrapes ~463 stocks ──────────────
  scrape-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 150    # ~463 stocks × 11.5s ≈ 88 min, 150 is safe
    continue-on-error: true # partial stock failures are normal; merge must run anyway
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Run CCASS shard ${{ matrix.shard }}/5
        timeout-minutes: 140
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          delay=$(( ${{ matrix.shard }} * 60 ))
          echo "⏳ Shard ${{ matrix.shard }} — waiting ${delay}s stagger..."
          sleep "$delay"
          cd ccass
          python -m src.runner --shard ${{ matrix.shard }} --shard-total 6 --refresh-universe

      - name: Upload shard ${{ matrix.shard }} artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccass-shard-${{ matrix.shard }}
          path: ccass-shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 1

  # ── Phase 2: Merge all shards → trends → alerts → events → export ─────
  merge:
    needs: scrape-shard
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ccass-shard-*
          merge-multiple: true
          path: .

      - name: Merge & run full pipeline
        timeout-minutes: 20
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          cd ccass
          python -m src.runner --merge

      - name: Commit ccass.json + ccass.db.gz
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f ccass.json ]; then
            # Verify stock count before committing
            STOCK_COUNT=$(python -c "import json; d=json.load(open('ccass.json','r',encoding='utf-8')); print(len(d.get('stocks',[])))")
            echo "ccass.json has ${STOCK_COUNT} stocks"
            if [ "$STOCK_COUNT" -lt 2500 ]; then
              echo "ERROR: ccass.json only has ${STOCK_COUNT} stocks (expected 2500+). Aborting commit."
              exit 1
            fi
            git add ccass.json ccass/ccass.db.gz 2>/dev/null || true
            git diff --cached --quiet && { echo "unchanged, skipping commit"; exit 0; }
            git commit -m "chore: update ccass data (${STOCK_COUNT} stocks)"
          else
            echo "WARNING: ccass.json not found after merge!"
            exit 1
          fi
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying in 5s..."
              git rebase --abort 2>/dev/null || true
              sleep 5
            }
          done
