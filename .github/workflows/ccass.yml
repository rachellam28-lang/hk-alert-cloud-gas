name: CCASS Daily Scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1-5"   # 9pm HKT Mon-Fri

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Run CCASS daily
        timeout-minutes: 600
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          cd ccass
          python -m src.runner --refresh-universe

      - name: Upload debug HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccass-debug-html
          path: ccass/debug/
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit ccass.json + ccass.db.gz
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ccass.json
          git add ccass/ccass.db.gz 2>/dev/null || true
          git diff --cached --quiet && { echo "unchanged, skipping commit"; exit 0; }
          git commit -m "chore: update ccass data"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying in 5s..."
              git rebase --abort 2>/dev/null || true
              sleep 5
            }
          done
