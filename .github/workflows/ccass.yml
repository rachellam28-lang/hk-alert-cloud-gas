name: CCASS Daily Scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1-5"   # 9pm HKT Mon-Fri (after CCASS data published ~5:30pm)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Restore CCASS DB cache
        uses: actions/cache@v4
        with:
          path: ccass/ccass.db
          key: ccass-db-${{ github.run_id }}
          restore-keys: ccass-db-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Run CCASS daily
        timeout-minutes: 170
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd ccass
          python -m src.runner
