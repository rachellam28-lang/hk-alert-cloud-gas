name: CCASS Daily Pipeline

on:
  workflow_dispatch:
  schedule:
    # 7:30 AM HKT = 23:30 UTC (Mon-Fri)
    - cron: "30 23 * * 0-4"

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install longbridge pandas requests beautifulsoup4 lxml

      - name: Setup Node (for westock-data)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Init DB & Stock Universe
        run: |
          python -c "
          import sqlite3, json
          # Create minimal DB schema for backfill
          db = sqlite3.connect('ccass/ccass.db')
          db.execute('''CREATE TABLE IF NOT EXISTS stock_universe
            (stock_code TEXT PRIMARY KEY, stock_name TEXT, is_active INTEGER,
             added_at TEXT, last_seen_at TEXT, first_seen_date TEXT)''')
          db.execute('''CREATE TABLE IF NOT EXISTS ccass_daily
            (stock_code TEXT, trade_date TEXT, total_shares INTEGER, total_pct REAL,
             num_participants INTEGER, top5_pct REAL, top10_pct REAL, adj_hhi REAL,
             broker_top5_pct REAL, top_broker_id TEXT, top_broker_name TEXT,
             top_broker_pct REAL, futu_pct REAL, a00005_pct REAL,
             adjusted_float REAL, scraped_at TEXT, validation_failed INTEGER,
             PRIMARY KEY(stock_code, trade_date))''')
          # Load stock codes from JSON
          with open('data/stock_universe.json') as f:
              universe = json.load(f)
          for code in universe['codes']:
              db.execute('INSERT OR IGNORE INTO stock_universe(stock_code,is_active,added_at) VALUES(?,1,datetime(\"now\"))', (code,))
          db.commit()
          print(f'DB init: {len(universe[\"codes\"])} stocks')
          db.close()
          "

      - name: CCASS Backfill (Longbridge API)
        env:
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          LONGBRIDGE_REFRESH_TOKEN: ${{ secrets.LONGBRIDGE_REFRESH_TOKEN }}
          LONGBRIDGE_ACCOUNT: ${{ secrets.LONGBRIDGE_ACCOUNT }}
        run: |
          python -c "
          import datetime
          today = datetime.date.today()
          # Get last 2 trading days (skip weekends)
          days = []
          d = today
          while len(days) < 2:
              if d.weekday() < 5:
                  days.append(d.isoformat())
              d -= datetime.timedelta(days=1)
          # Update direct_backfill.py DATES
          with open('direct_backfill.py') as f:
              code = f.read()
          new_line = f'DATES = {days}'
          import re
          code = re.sub(r'DATES = \[.*?\]', new_line, code)
          with open('direct_backfill.py', 'w') as f:
              f.write(code)
          print(f'Backfilling: {days}')
          "
          python direct_backfill.py
        timeout-minutes: 90

      - name: Fetch prices via Longbridge
        env:
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
        run: |
          python .github/scripts/fetch_prices_longbridge.py
        timeout-minutes: 30

      - name: Enrich & Build ccass.json
        run: |
          python scripts/enrich_ccass.py

      - name: Fetch placements (westock-data-clawhub)
        run: |
          npx westock-data-clawhub buyback 00700 --start 2026-06-01 --end 2026-06-09 > /dev/null 2>&1 || true
          echo "Placements: using cached data (westock-data-clawhub no placements cmd)"

      - name: Calculate returns
        run: |
          python scripts/add_returns.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ccass.json data/ccass.json data/placements_enriched.json
          git diff --cached --quiet && { echo "No changes, skipping commit"; exit 0; }
          git commit -m "chore: daily CCASS update [skip ci]"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying in 10s..."
              git rebase --abort 2>/dev/null || true
              sleep 10
            }
          done
