name: HK Alert Cloud Scanner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scanner mode: corp, ipo, poc, all"
        required: true
        default: "all"
        type: choice
        options:
          - corp
          - ipo
          - poc
          - all
      shard_index:
        description: "POC shard index (0-based). Leave blank to scan all shards in parallel."
        required: false
        default: ""
        type: string
      shard_count:
        description: "POC shard count. Leave blank to use the workflow default."
        required: false
        default: ""
        type: string
  schedule:
    # Hong Kong time = UTC+8. Cron is in UTC.
    # We deliberately avoid :00 and :30 minute marks because GitHub-hosted
    # scheduled runs on those high-contention minutes are frequently delayed
    # or skipped during peak load. Each entry is shifted by a few minutes
    # from the "ideal" HKT time to land on a low-contention minute.
    # Corp actions (HKEXnews): Mon-Fri ~09:32, 12:32, 16:32, 20:02 HKT.
    - cron: "32 1 * * 1-5"   # 09:32 HKT
    - cron: "32 4 * * 1-5"   # 12:32 HKT
    - cron: "32 8 * * 1-5"   # 16:32 HKT
    - cron: "2 12 * * 1-5"   # 20:02 HKT
    # IPO: Mon-Fri ~16:47 HKT.
    - cron: "47 8 * * 1-5"   # 16:47 HKT
    # POC: 4 shards staggered after market close. Shard index is derived from
    # the cron string in the resolve step below.
    # Shard 0: 17:07 HKT, Shard 1: 17:32, Shard 2: 17:57, Shard 3: 18:22.
    - cron: "7 9 * * 1-5"
    - cron: "32 9 * * 1-5"
    - cron: "57 9 * * 1-5"
    - cron: "22 10 * * 1-5"

env:
  POC_SHARD_COUNT_DEFAULT: "4"

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      shard_count: ${{ steps.resolve.outputs.shard_count }}
      shard_indices: ${{ steps.resolve.outputs.shard_indices }}
    steps:
      - name: Resolve mode and shards
        id: resolve
        shell: bash
        run: |
          mode=""
          shard_index=""
          shard_count="${POC_SHARD_COUNT_DEFAULT}"
          shard_indices_json=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.mode }}"
            if [ -n "${{ inputs.shard_count }}" ]; then
              shard_count="${{ inputs.shard_count }}"
            fi
            if [ -n "${{ inputs.shard_index }}" ]; then
              shard_index="${{ inputs.shard_index }}"
            fi
          else
            case "${{ github.event.schedule }}" in
              "47 8 * * 1-5")
                mode="ipo"
                ;;
              "7 9 * * 1-5")
                mode="poc"
                shard_index="0"
                ;;
              "32 9 * * 1-5")
                mode="poc"
                shard_index="1"
                ;;
              "57 9 * * 1-5")
                mode="poc"
                shard_index="2"
                ;;
              "22 10 * * 1-5")
                mode="poc"
                shard_index="3"
                ;;
              *)
                mode="corp"
                ;;
            esac
          fi

          # Build the matrix shard list. Only POC fans out; everything else
          # runs as a single job with shard_index=0/shard_count=1.
          if [ "$mode" = "poc" ]; then
            if [ -n "$shard_index" ]; then
              shard_indices_json="[\"$shard_index\"]"
            else
              # workflow_dispatch with mode=poc and no shard_index: run every
              # shard in parallel so a manual run still covers the universe.
              indices=""
              for i in $(seq 0 $((shard_count - 1))); do
                if [ -z "$indices" ]; then
                  indices="\"$i\""
                else
                  indices="$indices,\"$i\""
                fi
              done
              shard_indices_json="[$indices]"
            fi
          else
            shard_count="1"
            shard_indices_json="[\"0\"]"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "shard_count=$shard_count" >> "$GITHUB_OUTPUT"
          echo "shard_indices=$shard_indices_json" >> "$GITHUB_OUTPUT"
          echo "Resolved: mode=$mode shard_count=$shard_count shard_indices=$shard_indices_json"

  scan:
    needs: resolve
    runs-on: ubuntu-latest
    # Hard ceiling per shard. Each POC shard processes ~700 stocks, well under
    # the timeout at batched yfinance throughput.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      # Cap parallel shards so we don't slam Yahoo Finance or fan out Telegram
      # start/complete pings all at once.
      max-parallel: 2
      matrix:
        shard_index: ${{ fromJson(needs.resolve.outputs.shard_indices) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        # Step-level timeout below the job timeout so logs flush and we get a
        # clean failure rather than an aborted job.
        timeout-minutes: 23
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
          MAX_STOCKS: ${{ vars.MAX_STOCKS || '0' }}
          POC_MAX_STOCKS_PER_RUN: ${{ vars.POC_MAX_STOCKS_PER_RUN || '0' }}
          POC_TIME_BUDGET_SEC: ${{ vars.POC_TIME_BUDGET_SEC || '1200' }}
          POC_SHARD_INDEX: ${{ matrix.shard_index }}
          POC_SHARD_COUNT: ${{ needs.resolve.outputs.shard_count }}
          YF_HTTP_TIMEOUT: ${{ vars.YF_HTTP_TIMEOUT || '10' }}
          YF_BATCH_SIZE: ${{ vars.YF_BATCH_SIZE || '60' }}
          YF_BATCH_THREADS: ${{ vars.YF_BATCH_THREADS || '8' }}
          BREAKOUT_FIELD: ${{ vars.BREAKOUT_FIELD || 'high' }}
        run: python -u scanner/hk_cloud_scanner.py "${{ needs.resolve.outputs.mode }}"
