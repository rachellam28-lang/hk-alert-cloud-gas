name: HK Alert Cloud Scanner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scanner mode: corp, ipo, poc, all"
        required: true
        default: "all"
        type: choice
        options:
          - corp
          - ipo
          - poc
          - all
  schedule:
    # Hong Kong time = UTC+8.
    # Corp actions: Mon-Fri 09:30, 12:30, 16:30, 20:00 HKT.
    - cron: "30 1 * * 1-5"
    - cron: "30 4 * * 1-5"
    - cron: "30 8 * * 1-5"
    - cron: "0 12 * * 1-5"
    # IPO: Mon-Fri 16:45 HKT.
    - cron: "45 8 * * 1-5"
    # POC: Mon-Fri 17:05 HKT.
    - cron: "5 9 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set mode from schedule
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 8 * * 1-5" ]; then
            echo "mode=ipo" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "5 9 * * 1-5" ]; then
            echo "mode=poc" >> "$GITHUB_OUTPUT"
          else
            echo "mode=corp" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
          MAX_STOCKS: ${{ vars.MAX_STOCKS || '0' }}
          BREAKOUT_FIELD: ${{ vars.BREAKOUT_FIELD || 'high' }}
        run: python scanner/hk_cloud_scanner.py "${{ steps.mode.outputs.mode }}"
