name: HK Alert Scheduler Heartbeat

# Tiny canary that pings Telegram on a schedule. If this stops firing,
# GitHub's cron scheduler is the problem (not the scanner workflows).

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours, off the :00 mark

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Send heartbeat
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets missing; skipping send."
            exit 0
          fi
          ts=$(TZ=Asia/Hong_Kong date '+%Y-%m-%d %H:%M HKT')
          msg="❤️ scheduler heartbeat · ${ts}"
          resp=$(curl -sS -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${msg}")
          http_code=$(echo "$resp" | tail -1)
          body=$(echo "$resp" | head -n -1)
          echo "HTTP $http_code: $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Telegram API returned $http_code — token or chat_id may be invalid"
            exit 1
          fi
          echo "Heartbeat sent: $msg"
