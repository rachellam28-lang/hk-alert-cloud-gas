name: CCASS Backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: "過去幾多個交易日 (default: 5)"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Restore CCASS DB cache
        uses: actions/cache@v4
        with:
          path: ccass/ccass.db
          key: ccass-db-${{ github.run_id }}
          restore-keys: ccass-db-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ccass/requirements.txt

      - run: pip install -r ccass/requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


      - name: Run CCASS backfill
        timeout-minutes: 350
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: |
          cd ccass
          python -m src.backfill --days ${{ github.event.inputs.days }}

      - name: Commit ccass.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ccass.json
          git diff --cached --quiet && { echo "ccass.json unchanged, skipping commit"; exit 0; }
          git commit -m "chore: update ccass.json after backfill [skip ci]"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying in 5s..."
              git rebase --abort 2>/dev/null || true
              sleep 5
            }
          done
