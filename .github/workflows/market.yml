name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */1 * * 1-5"   # every hour on weekdays

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install yfinance requests pandas cloudscraper beautifulsoup4 lxml
      - name: Fetch market data
        run: python .github/scripts/fetch_market.py
      - name: Commit market.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json
          git diff --cached --quiet && { echo "market.json unchanged, skipping commit"; exit 0; }
          git commit -m "chore: update market.json [skip ci]"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break || {
              echo "attempt $i failed, retrying in 5s..."
              git rebase --abort 2>/dev/null || true
              sleep 5
            }
          done
