name: HK Alert Corp Actions

on:
  workflow_dispatch:
  schedule:
    # Hong Kong time = UTC+8. Cron is in UTC. Avoid :00/:30 marks since
    # GitHub-hosted scheduled runs on those high-contention minutes are
    # frequently delayed or skipped.
    - cron: "32 1 * * 1-5"   # 09:32 HKT
    - cron: "32 4 * * 1-5"   # 12:32 HKT
    - cron: "32 8 * * 1-5"   # 16:32 HKT
    - cron: "2 12 * * 1-5"   # 20:02 HKT

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r scanner/requirements.txt
      - name: Run corp scan
        timeout-minutes: 18
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: python -u scanner/hk_cloud_scanner.py corp
      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/breakthroughs.json placing_history.json 2>/dev/null || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore: update corp data [skip ci]"
          git pull --rebase origin main && git push origin HEAD:main || echo "push failed, will retry next run"
