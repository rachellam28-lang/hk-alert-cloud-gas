name: ccass-refresh

on:
  workflow_dispatch:
    inputs:
      source:
        description: Dispatch source
        required: false
        default: manual
  # schedule disabled: refresh is no longer routed through GitHub Actions.
  # Use direct local/Cloudflare refresh + Wrangler deploy instead.

permissions:
  contents: write

concurrency:
  group: ccass-refresh-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CCASS_TELEGRAM_TOKEN: ${{ secrets.CCASS_TELEGRAM_TOKEN }}
      CCASS_TELEGRAM_CHAT_ID: ${{ secrets.CCASS_TELEGRAM_CHAT_ID }}
      CCASS_TELEGRAM_REQUIRE_DEDICATED: "1"
      LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
      FUTU_HOST: ${{ vars.FUTU_HOST || '127.0.0.1' }}
      FUTU_PORT: ${{ vars.FUTU_PORT || '11111' }}
      HOLDINGS_FAST: "1"
      HOLDINGS_DAILY_MAX_MINUTES: "120"
      HOLDINGS_SKIP_MARKET_CAP_FETCH: "1"
      AUDIT_MIN_COVERAGE: "99.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ccass/requirements.txt -r scanner/requirements.txt

      - name: Run bounded CCASS refresh
        run: bash ccass/scripts/daily_refresh.sh
