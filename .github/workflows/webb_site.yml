name: Webb-site CCASS Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1-5"   # 10pm HKT Mon-Fri (after CCASS scrape)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scanner/requirements.txt

      - run: pip install -r scanner/requirements.txt

      - name: Scrape Webb-site CCASS
        timeout-minutes: 10
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m scanner.webb_site_scraper --compare --summary

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/webb_site/last_run.json 2>/dev/null || true
          git add data/webb_site/summary.json 2>/dev/null || true
          git diff --cached --quiet && { echo "unchanged, skipping commit"; exit 0; }
          git commit -m "chore: update Webb-site CCASS state"
          git pull --rebase origin main && git push origin HEAD:main
