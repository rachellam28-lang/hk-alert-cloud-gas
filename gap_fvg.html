<!doctype html>
<html lang="zh-HK"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>警報中心 — Gap/FVG · 量比 · 轉倉</title>
<style>
:root{--bg:#f5f7fa;--surface:#fff;--surface-soft:#f8fafc;--text:#0f172a;--text-soft:#1e293b;--mute:#475569;--mute-2:#64748b;--line:#dbe3ee;--line-soft:#edf2f7;--primary:#0369a1;--primary-soft:#e0f2fe;--up:#15803d;--up-soft:#dcfce7;--down:#b91c1c;--down-soft:#fee2e2;--violet:#6d28d9;--violet-soft:#ede9fe;--amber:#b45309;--amber-soft:#fef3c7;--radius:8px;--shadow:0 1px 2px rgba(15,23,42,.05)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 Inter,system-ui,"PingFang TC",Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1440px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#b45309,#f59e0b);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.brand-title{font-size:14px;font-weight:600}.brand-sub{font-size:10px;color:var(--mute)}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:999px;background:#22c55e}.dot.loading{background:#f59e0b}.dot.error{background:#ef4444}
.wrap{max-width:1440px;margin:0 auto;padding:8px 12px 20px}
.summary-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin:0 0 8px}
.summary-item{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:5px 8px;box-shadow:var(--shadow)}
.summary-label{font-size:10px;color:var(--mute);font-weight:600}
.summary-val{font-size:16px;line-height:1.1;font-weight:800;color:var(--text);margin-top:1px}
.alert-layout{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(310px,.85fr);gap:10px;align-items:start}
.side-rail{display:grid;gap:10px}
.sec{margin-bottom:10px}
.sec-title{font-size:13px;font-weight:700;padding:4px 0 3px;display:flex;align-items:center;gap:5px}
.sec-sub{font-size:10px;color:var(--mute);margin-bottom:4px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:5px}
.card-head{padding:5px 8px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;font-weight:700;font-size:12px}
.card-head:hover{background:var(--surface-soft)}
.card-body{padding:2px 0}
.row{display:grid;grid-template-columns:16px 70px minmax(80px,auto) 56px minmax(150px,1fr);align-items:center;gap:5px;padding:3px 8px;font-size:11px;border-bottom:1px solid var(--line-soft)}
.row:last-child{border-bottom:none}
.code{font-weight:700;color:var(--violet);min-width:52px}
.name{color:var(--text-soft);min-width:80px}
.badge{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600}
.badge.gap{background:var(--up-soft);color:var(--up)}
.badge.fvg{background:var(--violet-soft);color:var(--violet)}
.badge.poc{background:var(--primary-soft);color:var(--primary)}
.badge.corp{background:var(--amber-soft);color:var(--amber)}
.val{font-weight:700;min-width:55px;text-align:right}
.detail{font-size:11px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.vr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px}
.vr-card{display:block;padding:5px 6px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:var(--surface);min-height:52px}
.vr-card:hover{background:var(--surface-soft)}
.vr-code{font-weight:700;font-size:13px;color:var(--violet)}
.vr-name{font-size:11px;color:var(--text-soft)}
.vr-val{font-size:16px;font-weight:800}
.vr-price{font-size:10px;color:var(--mute)}

.transfer-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:4px 8px;font-size:11px;border-bottom:1px solid var(--line-soft)}
.transfer-row:last-child{border-bottom:none}
.tf-code{font-weight:700;min-width:52px;color:var(--violet)}
.tf-name{color:var(--text-soft)}
.tf-total{font-weight:700;color:var(--text)}
.tf-dir{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.tf-dir.in{background:var(--up-soft);color:var(--up)}
.tf-dir.out{background:var(--down-soft);color:var(--down)}

.tf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px}
.tf-card{display:block;padding:5px 6px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:var(--surface);min-height:48px}
.tf-card:hover{background:var(--surface-soft)}
.tf-summary{font-size:9px;color:var(--mute);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}

.empty{padding:24px;text-align:center;color:var(--mute);font-size:13px}
.loading{padding:20px;text-align:center;color:var(--mute);font-size:13px}

@media(max-width:720px){
  .topbar-inner{padding:8px 12px}
  .brand-sub{display:none}
  .topright{gap:6px;font-size:12px;white-space:nowrap}
  .wrap{padding:10px 10px 24px}
  .summary-bar{grid-template-columns:repeat(2,minmax(0,1fr))}
  .alert-layout{display:block}
  .side-rail{display:block}
  .vr-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .vr-card{padding:6px}
  .vr-val{font-size:14px}
  .row{grid-template-columns:18px 72px minmax(82px,1fr) 58px;gap:6px;font-size:12px;padding:5px 8px}
  .detail{grid-column:2 / -1;font-size:12px;white-space:normal}
  .code{min-width:44px}
  .name{min-width:60px}
}
</style>
</head><body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo">⚠</div>
      <div><div class="brand-title">警報中心</div><div class="brand-sub">Gap/FVG · 量比 · 轉倉</div></div>
    </div>
    <div class="topright">
      <span id="dot" class="dot loading"></span>
      <span id="upd">載入…</span>
      <a href="./">← 港股版</a>
    </div>
  </div>
</div>

<div class="wrap" id="root"><div class="loading">載入中…</div></div>

<script>
var E = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmtMoney(v) {
  if (v == null || isNaN(v)) return '';
  var abs = Math.abs(v);
  if (abs === 0) return '$0';
  if (abs >= 1e8) return '$'+(v/1e8).toFixed(2)+'億';
  return '$'+(v/1e4).toFixed(1)+'萬';
}
window.toggleMore = function(el) {
  var id = el.getAttribute('data-target');
  var d = document.getElementById(id);
  if (!d) return;
  if (d.style.display === 'none') {
    d.style.display = '';
    el.textContent = '▲ 收起';
  } else {
    d.style.display = 'none';
    el.textContent = '▼ 顯示全部';
  }
};

async function main(){
  var dot = document.getElementById('dot'), upd = document.getElementById('upd');
  dot.className = 'dot loading'; upd.textContent = '載入…';
  var html = '';

  try {
    var r1 = await fetch('./data/alerts.json?_='+Date.now());
    var r2 = await fetch('./ccass.json?_='+Date.now());
    var r3 = await fetch('./data/transfers.json?_='+Date.now());

    // ─── 1. Gap/FVG/POC alerts ───
    var alerts = r1.ok ? ((await r1.json()).alerts||[]) : [];
    var byCode = {};
    alerts.forEach(function(a){
      var p = (typeof a.payload==='string'?JSON.parse(a.payload):a.payload) || {};
      var code = p.code || a.code || '';
      if(!byCode[code]) byCode[code] = {code:code, name:p.name||'', corp:p.corp_type||'', items:[]};
      var sig = p.signal || {};
      byCode[code].items.push({
        type: a.signal || sig.type || '',
        date: sig.date || (a.created_at||'').slice(0,10),
        gap_pct: sig.gap_pct, fvg_pct: sig.fvg_pct, breakout_pct: sig.breakout_pct,
        open: sig.open, close: sig.close, prev_high: sig.prev_high,
        gap_low: sig.gap_low, gap_high: sig.gap_high, current: sig.current, poc: sig.poc
      });
    });
    var stocks = Object.values(byCode).sort((a,b)=>b.items.length-a.items.length);
    var ccass = r2.ok ? await r2.json() : {stocks:[]};
    var ranked = (ccass.stocks||[]).filter(function(s){return s.vr!=null&&s.vr>=2;}).sort(function(a,b){return b.vr-a.vr;}).slice(0,40);
    var tdata = r3.ok ? await r3.json() : {transfers:[]};
    var transfers = tdata.transfers || [];
    var totalGap = alerts.filter(function(a){
      var p = (typeof a.payload==='string'?JSON.parse(a.payload):a.payload) || {};
      var sig = p.signal || {};
      return (a.signal || sig.type || '') === '向上跳空缺口';
    }).length;
    var totalFvg = alerts.filter(function(a){
      var p = (typeof a.payload==='string'?JSON.parse(a.payload):a.payload) || {};
      var sig = p.signal || {};
      return (a.signal || sig.type || '') === '向上FVG';
    }).length;
    var totalPoc = alerts.filter(function(a){
      var p = (typeof a.payload==='string'?JSON.parse(a.payload):a.payload) || {};
      var sig = p.signal || {};
      return (a.signal || sig.type || '') === '上破POC 12M';
    }).length;

    html += '<div class="summary-bar">';
    html += '<div class="summary-item"><div class="summary-label">⤴ Gap/FVG/POC</div><div class="summary-val">'+alerts.length+'</div></div>';
    html += '<div class="summary-item"><div class="summary-label">🔼 跳空缺口</div><div class="summary-val" style="color:var(--up)">'+totalGap+'</div></div>';
    html += '<div class="summary-item"><div class="summary-label">📊 量比≥2</div><div class="summary-val" style="color:var(--amber)">'+ranked.length+'</div></div>';
    html += '<div class="summary-item"><div class="summary-label">📦 轉倉</div><div class="summary-val" style="color:var(--primary)">'+transfers.length+'</div></div>';
    html += '</div><div class="alert-layout"><main>';

    html += '<div class="sec"><div class="sec-title">⤴ Gap / FVG / POC 警報</div>';
    html += '<div class="sec-sub">配股供股股票嘅向上跳空缺口、FVG、POC 12M 突破</div>';
    if(!stocks.length){
      html += '<div class="empty">暫無警報</div>';
    } else {
      stocks.forEach(function(s){
        s.items.sort((a,b)=>b.date.localeCompare(a.date));
        var g=s.items.filter(i=>i.type==='向上跳空缺口');
        var f=s.items.filter(i=>i.type==='向上FVG');
        var p=s.items.filter(i=>i.type==='上破POC 12M');
        html += '<div class="card">';
        html += `<div class="card-head" onclick="var b=this.nextElementSibling;b.style.display=b.style.display==='none'?'':'none'">`;
        html += '<span><span class="code">'+E(s.code)+'</span> '+E(s.name)+(s.corp?' <span class="badge corp">'+E(s.corp)+'</span>':'')+'</span>';
        html += '<span style="font-size:11px;color:var(--mute)">🔼'+g.length+' 📈'+f.length+' 🎯'+p.length+'</span>';
        html += '</div><div class="card-body">';
        var show = s.items.slice(0,3);
        var rest = s.items.slice(3);
        var ri = function(i){
          var isG=i.type==='向上跳空缺口', isF=i.type==='向上FVG';
          var icon=isG?'🔼':(isF?'📈':'🎯');
          var cls=isG?'gap':(isF?'fvg':'poc');
          var h = '<div class="row">';
          h += '<span>'+icon+'</span><span style="font-size:10px;color:var(--mute-2);min-width:72px">'+E(i.date)+'</span>';
          h += '<span class="badge '+cls+'">'+E(i.type)+'</span>';
          if(isG){
            h += '<span class="val" style="color:var(--up)">+'+i.gap_pct+'%</span>';
            h += '<span class="detail">開 '+i.open+' vs 前高 '+i.prev_high+' → 收 '+i.close+'</span>';
          } else if(isF){
            h += '<span class="val" style="color:var(--violet)">+'+i.fvg_pct+'%</span>';
            h += '<span class="detail">gap '+i.gap_low+'–'+i.gap_high+' → '+i.current+'</span>';
          } else {
            h += '<span class="val" style="color:var(--primary)">+'+i.breakout_pct+'%</span>';
            h += '<span class="detail">POC '+i.poc+' → '+i.current+'</span>';
          }
          h += '</div>';
          return h;
        }
        show.forEach(function(i){ html += ri(i); });
        if(rest.length){
          html += '<div id="more_'+E(s.code)+'" style="display:none">';
          rest.forEach(function(i){ html += ri(i); });
          html += '</div>';
          html += '<div style="text-align:center;padding:2px;font-size:10px;color:var(--primary);cursor:pointer" data-target="more_'+E(s.code)+'" onclick="toggleMore(this)">▼ 顯示全部 '+rest.length+' 項</div>';
        }
        html += '</div></div>';
      });
    }
    html += '</div>';
    html += '</main><aside class="side-rail">';

    // ─── 2. 量比警報 (from ccass.json) ───
    if(r2.ok){
      html += '<div class="sec"><div class="sec-title">📊 量比警報</div>';
      html += '<div class="sec-sub">量比≥2 · '+ranked.length+'隻</div>';
      if(!ranked.length){
        html += '<div class="empty">暫無異常量比</div>';
      } else {
        html += '<div class="vr-grid">';
        ranked.forEach(function(s){
          var p = s.lp!=null ? (s.lp<1?s.lp.toFixed(3):s.lp.toFixed(2)) : '—';
          var clr = s.vr>=5 ? 'var(--up)' : 'var(--amber)';
          html += `<div class="vr-card" onclick="window.open('https://www.tradingview.com/chart/?symbol=HKEX%3A${E(s.c)}','_blank')">`;
          html += '<div><span class="vr-code">'+E(s.c)+'</span> <span class="vr-name">'+E(s.n)+'</span></div>';
          html += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px">';
          html += '<span class="vr-val" style="color:'+clr+'">'+s.vr.toFixed(1)+'x</span>';
          html += '<span class="vr-price">$'+E(p)+'</span>';
          html += '</div></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    html += '</aside></div>';

    // ─── 3. 存倉轉倉 ───
    if(r3.ok){
      html += '<div class="sec"><div class="sec-title">📦 存倉轉倉監測</div>';
      html += '<div class="sec-sub">'+E(tdata.updated||'')+' · '+transfers.length+'項</div>';
      if(!transfers.length){
        html += '<div class="empty">暫無存倉轉倉</div>';
      } else {
        var priceMap = {};
        (ccass.stocks||[]).forEach(function(s){ priceMap[s.c] = s.lp; });
        // Compute totalVal, sort by $ value descending
        transfers.forEach(function(t){
          var totalChg = (t.total_in||0)+(t.total_out||0);
          var lp = priceMap[t.code] || 0;
          t._totalChg = totalChg;
          t._totalVal = totalChg * lp;
        });
        transfers.sort(function(a,b){ return b._totalVal - a._totalVal; });
        var high  = transfers.filter(function(t){ return t._totalVal >= 5e8; });
        var mid   = transfers.filter(function(t){ return t._totalVal >= 1e8 && t._totalVal < 5e8; });
        var low   = transfers.filter(function(t){ return t._totalVal < 1e8; });

        var renderTransferCard = function(t){
          var totalPct = t.total_shares>0 ? (t._totalChg/t.total_shares*100) : 0;
          var totalValStr = fmtMoney(t._totalVal);
          var biggest = null, biggestAbs = 0;
          (t.ins||[]).forEach(function(x){ var a=Math.abs(x.chg||0); if(a>biggestAbs){biggestAbs=a;biggest={dir:'in',pid:x.pid,pname:x.pname,chg:x.chg,pct:x.pct_chg};} });
          (t.outs||[]).forEach(function(x){ var a=Math.abs(x.chg||0); if(a>biggestAbs){biggestAbs=a;biggest={dir:'out',pid:x.pid,pname:x.pname,chg:Math.abs(x.chg||0),pct:x.pct_chg};} });
          var bigVal = biggest ? (biggest.chg * (priceMap[t.code]||0)) : 0;
          var bigValStr = fmtMoney(bigVal);
          var card = '<div class="tf-card" onclick="window.open(\'https://www.tradingview.com/chart/?symbol=HKEX%3A'+E(t.code)+'\',\'_blank\')">';
          card += '<div><span class="tf-code">'+E(t.code)+'</span> <span class="tf-name">'+E(t.name||'')+'</span></div>';
          card += '<div style="font-weight:700;font-size:12px;margin-top:2px;color:var(--text)">'+totalValStr+'</div>';
          card += '<div style="font-size:10px;color:var(--mute)">'+Number(Math.round(t._totalChg/10000)).toLocaleString()+'萬股  ·  佔流通 '+totalPct.toFixed(1)+'%</div>';
          if(biggest){
            var dirIcon = biggest.dir==='in'?'📥':'📤';
            var dirClr = biggest.dir==='in'?'color:var(--up)':'color:var(--down)';
            card += '<div style="font-size:10px;margin-top:3px;'+dirClr+'">'+dirIcon+' '+E(biggest.pname||biggest.pid)+'</div>';
            card += '<div style="font-size:9px;color:var(--mute-2)">'+E(biggest.pid)+' → '+Number(Math.round(biggest.chg/10000)).toLocaleString()+'萬股  ·  佔流通 '+(biggest.pct||0).toFixed(1)+'%  ·  '+bigValStr+'</div>';
          }
          card += '</div>';
          return card;
        }

        if(high.length){
          html += '<div class="sec-sub" style="font-weight:700;color:var(--amber);margin-top:6px;font-size:20px">🔥 總$5億以上 · '+high.length+'項</div>';
          html += '<div class="tf-grid">';
          high.forEach(function(t){ html += renderTransferCard(t); });
          html += '</div>';
        }
        if(mid.length){
          html += '<div class="sec-sub" style="font-weight:700;color:var(--amber);margin-top:6px;font-size:20px">🔥 總$1–5億 · '+mid.length+'項</div>';
          html += '<div class="tf-grid">';
          mid.forEach(function(t){ html += renderTransferCard(t); });
          html += '</div>';
        }
        if(low.length){
          html += '<div class="sec-sub" style="font-weight:700;color:var(--amber);margin-top:6px;font-size:20px">🔥 總$1億或以下 · '+low.length+'項</div>';
          html += '<div class="tf-grid">';
          low.forEach(function(t){ html += renderTransferCard(t); });
          html += '</div>';
        }
      }
      html += '</div>';
    }

    document.getElementById('root').innerHTML = html;
    dot.className = 'dot';
    upd.textContent = '更新完成';
  } catch(e){
    dot.className = 'dot error';
    upd.textContent = '載入失敗';
    document.getElementById('root').innerHTML = '<div class="empty" style="color:#ef4444">載入失敗：'+E(e.message)+'<br><small>請稍後重試</small></div>';
  }
}

main();
</script>
</body></html>
