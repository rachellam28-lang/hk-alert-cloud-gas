<!doctype html>
<html lang="zh-HK"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>警報中心 — Gap/FVG · 量比 · 轉倉</title>
<style>
:root{--bg:#f5f7fa;--surface:#fff;--surface-soft:#f8fafc;--text:#0f172a;--text-soft:#334155;--mute:#64748b;--mute-2:#94a3b8;--line:#e2e8f0;--primary:#0284c7;--up:#15803d;--up-soft:#dcfce7;--down:#b91c1c;--down-soft:#fee2e2;--violet:#6d28d9;--amber:#b45309;--amber-soft:#fef3c7;--radius:10px;--shadow:0 1px 2px rgba(15,23,42,.04)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 Inter,system-ui,"PingFang TC",Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#b45309,#f59e0b);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.brand-title{font-size:14px;font-weight:600}.brand-sub{font-size:10px;color:var(--mute)}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:999px;background:#22c55e}.dot.loading{background:#f59e0b}.dot.error{background:#ef4444}
.wrap{max-width:1200px;margin:0 auto;padding:12px 16px 30px}
.sec{margin-bottom:18px}
.sec-title{font-size:15px;font-weight:700;padding:8px 0 6px;display:flex;align-items:center;gap:6px}
.sec-sub{font-size:11px;color:var(--mute);margin-bottom:8px}

.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px}
.card-head{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;font-size:13px}
.card-head:hover{background:var(--surface-soft)}
.card-body{padding:6px 0}
.row{display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:12px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.row:last-child{border-bottom:none}
.code{font-weight:700;color:var(--violet);min-width:52px}
.name{color:var(--text-soft);min-width:80px}
.badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.badge.gap{background:var(--up-soft);color:var(--up)}
.badge.fvg{background:var(--violet-soft);color:var(--violet)}
.badge.poc{background:var(--primary-soft);color:var(--primary)}
.badge.corp{background:var(--amber-soft);color:var(--amber)}
.val{font-weight:700;min-width:55px;text-align:right}
.detail{font-size:10px;color:var(--mute);flex-basis:100%}

.vr-card{display:inline-block;width:calc(50% - 5px);padding:8px;border:1px solid var(--line);border-radius:8px;margin:3px 2px;cursor:pointer;vertical-align:top}
.vr-card:hover{background:var(--surface-soft)}
.vr-code{font-weight:700;font-size:13px;color:var(--violet)}
.vr-name{font-size:11px;color:var(--text-soft)}
.vr-val{font-size:16px;font-weight:800}
.vr-price{font-size:10px;color:var(--mute)}

.transfer-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 14px;font-size:12px;border-bottom:1px solid var(--line-soft)}
.transfer-row:last-child{border-bottom:none}
.tf-code{font-weight:700;min-width:52px;color:var(--violet)}
.tf-name{color:var(--text-soft)}
.tf-total{font-weight:700;color:var(--text)}
.tf-dir{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.tf-dir.in{background:var(--up-soft);color:var(--up)}
.tf-dir.out{background:var(--down-soft);color:var(--down)}

.empty{padding:24px;text-align:center;color:var(--mute);font-size:13px}
.loading{padding:20px;text-align:center;color:var(--mute);font-size:13px}

@media(max-width:720px){
  .vr-card{width:calc(50% - 4px);padding:5px;margin:2px 1px}
  .vr-val{font-size:14px}
  .row{font-size:11px;padding:4px 8px}
  .code{min-width:44px}
  .name{min-width:60px}
}
</style>
</head><body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo">⚠</div>
      <div><div class="brand-title">警報中心</div><div class="brand-sub">Gap/FVG · 量比 · 轉倉</div></div>
    </div>
    <div class="topright">
      <span id="dot" class="dot loading"></span>
      <span id="upd">載入…</span>
      <a href="./">← 港股版</a>
    </div>
  </div>
</div>

<div class="wrap" id="root"><div class="loading">載入中…</div></div>

<script>
var E = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function main(){
  var dot = document.getElementById('dot'), upd = document.getElementById('upd');
  dot.className = 'dot loading'; upd.textContent = '載入…';
  var html = '';

  try {
    // ─── 1. Gap/FVG/POC alerts ───
    var r1 = await fetch('./data/alerts.json?_='+Date.now());
    var alerts = r1.ok ? ((await r1.json()).alerts||[]) : [];
    var byCode = {};
    alerts.forEach(function(a){
      var p = (typeof a.payload==='string'?JSON.parse(a.payload):a.payload) || {};
      var code = p.code || a.code || '';
      if(!byCode[code]) byCode[code] = {code:code, name:p.name||'', corp:p.corp_type||'', items:[]};
      var sig = p.signal || {};
      byCode[code].items.push({
        type: a.signal || sig.type || '',
        date: sig.date || (a.created_at||'').slice(0,10),
        gap_pct: sig.gap_pct, fvg_pct: sig.fvg_pct, breakout_pct: sig.breakout_pct,
        open: sig.open, close: sig.close, prev_high: sig.prev_high,
        gap_low: sig.gap_low, gap_high: sig.gap_high, current: sig.current, poc: sig.poc
      });
    });
    var stocks = Object.values(byCode).sort((a,b)=>b.items.length-a.items.length);

    html += '<div class="sec"><div class="sec-title">⤴ Gap / FVG / POC 警報</div>';
    html += '<div class="sec-sub">配股供股股票嘅向上跳空缺口、FVG、POC 12M 突破</div>';
    if(!stocks.length){
      html += '<div class="empty">暫無警報</div>';
    } else {
      stocks.forEach(function(s){
        s.items.sort((a,b)=>b.date.localeCompare(a.date));
        var g=s.items.filter(i=>i.type==='向上跳空缺口');
        var f=s.items.filter(i=>i.type==='向上FVG');
        var p=s.items.filter(i=>i.type==='上破POC 12M');
        html += '<div class="card">';
        html += '<div class="card-head" onclick="var b=this.nextElementSibling;b.style.display=b.style.display==\\'none\\'?\\'\\':\\'none\\'">';
        html += '<span><span class="code">'+E(s.code)+'</span> '+E(s.name)+(s.corp?' <span class="badge corp">'+E(s.corp)+'</span>':'')+'</span>';
        html += '<span style="font-size:11px;color:var(--mute)">🔼'+g.length+' 📈'+f.length+' 🎯'+p.length+'</span>';
        html += '</div><div class="card-body">';
        s.items.forEach(function(i){
          var isG=i.type==='向上跳空缺口', isF=i.type==='向上FVG';
          var icon=isG?'🔼':(isF?'📈':'🎯');
          var cls=isG?'gap':(isF?'fvg':'poc');
          html += '<div class="row">';
          html += '<span>'+icon+'</span><span style="font-size:10px;color:var(--mute-2);min-width:72px">'+E(i.date)+'</span>';
          html += '<span class="badge '+cls+'">'+E(i.type)+'</span>';
          if(isG){
            html += '<span class="val" style="color:var(--up)">+'+i.gap_pct+'%</span>';
            html += '<span class="detail">開 '+i.open+' vs 前高 '+i.prev_high+' → 收 '+i.close+'</span>';
          } else if(isF){
            html += '<span class="val" style="color:var(--violet)">+'+i.fvg_pct+'%</span>';
            html += '<span class="detail">gap '+i.gap_low+'–'+i.gap_high+' → '+i.current+'</span>';
          } else {
            html += '<span class="val" style="color:var(--primary)">+'+i.breakout_pct+'%</span>';
            html += '<span class="detail">POC '+i.poc+' → '+i.current+'</span>';
          }
          html += '</div>';
        });
        html += '</div></div>';
      });
    }
    html += '</div>';

    // ─── 2. 量比警報 (from ccass.json) ───
    var r2 = await fetch('./ccass.json?_='+Date.now());
    if(r2.ok){
      var ccass = await r2.json();
      var ranked = (ccass.stocks||[]).filter(function(s){return s.vr!=null&&s.vr>=2;}).sort(function(a,b){return b.vr-a.vr;}).slice(0,40);
      html += '<div class="sec"><div class="sec-title">📊 量比警報</div>';
      html += '<div class="sec-sub">量比≥2 · '+ranked.length+'隻</div>';
      if(!ranked.length){
        html += '<div class="empty">暫無異常量比</div>';
      } else {
        html += '<div style="font-size:0">';
        ranked.forEach(function(s){
          var p = s.lp!=null ? (s.lp<1?s.lp.toFixed(3):s.lp.toFixed(2)) : '—';
          var clr = s.vr>=5 ? 'var(--up)' : 'var(--amber)';
          html += '<div class="vr-card" onclick="window.open(\"https://www.tradingview.com/chart/?symbol=HKEX%3A'+E(s.c)+'\",\"_blank\")">';
          html += '<div><span class="vr-code">'+E(s.c)+'</span> <span class="vr-name">'+E(s.n)+'</span></div>';
          html += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px">';
          html += '<span class="vr-val" style="color:'+clr+'">'+s.vr.toFixed(1)+'x</span>';
          html += '<span class="vr-price">$'+E(p)+'</span>';
          html += '</div></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    // ─── 3. 存倉轉倉 ───
    var r3 = await fetch('./data/transfers.json?_='+Date.now());
    if(r3.ok){
      var tdata = await r3.json();
      var transfers = tdata.transfers || [];
      html += '<div class="sec"><div class="sec-title">📦 存倉轉倉監測</div>';
      html += '<div class="sec-sub">'+E(tdata.updated||'')+' · '+transfers.length+'項</div>';
      if(!transfers.length){
        html += '<div class="empty">暫無存倉轉倉</div>';
      } else {
        transfers.forEach(function(t){
          html += '<div class="card"><div class="card-head">';
          html += '<span><span class="tf-code">'+E(t.code)+'</span> '+E(t.name||'')+'</span>';
          html += '<span style="font-size:11px;color:var(--mute)">'+((t.total_in||0)+(t.total_out||0)).toLocaleString()+'股</span>';
          html += '</div><div class="card-body">';
          (t.ins||[]).forEach(function(x){
            html += '<div class="transfer-row">';
            html += '<span class="tf-dir in">📥 轉入</span>';
            html += '<span>'+E(x.pid||'')+' '+E(x.pname||'')+'</span>';
            html += '<span style="color:var(--up);font-weight:700;margin-left:auto">+'+((x.chg||0)/10000).toFixed(1)+'萬</span>';
            html += '</div>';
          });
          (t.outs||[]).forEach(function(x){
            html += '<div class="transfer-row">';
            html += '<span class="tf-dir out">📤 轉出</span>';
            html += '<span>'+E(x.pid||'')+' '+E(x.pname||'')+'</span>';
            html += '<span style="color:var(--down);font-weight:700;margin-left:auto">−'+((Math.abs(x.chg||0))/10000).toFixed(1)+'萬</span>';
            html += '</div>';
          });
          html += '</div></div>';
        });
      }
      html += '</div>';
    }

    document.getElementById('root').innerHTML = html;
    dot.className = 'dot';
    upd.textContent = '更新完成';
  } catch(e){
    dot.className = 'dot error';
    upd.textContent = '載入失敗';
    document.getElementById('root').innerHTML = '<div class="empty" style="color:#ef4444">載入失敗：'+E(e.message)+'<br><small>請稍後重試</small></div>';
  }
}

main();
</script>
</body></html>
