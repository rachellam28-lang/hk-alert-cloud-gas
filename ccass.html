<!doctype html>
<html lang="zh-HK"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCASS 持倉分析</title>
<style>
:root{--bg:#f5f7fa;--surface:#fff;--surface-soft:#f8fafc;--text:#0f172a;--text-soft:#334155;--mute:#64748b;--mute-2:#94a3b8;--line:#e2e8f0;--line-soft:#eef1f6;--primary:#0284c7;--primary-soft:#e0f2fe;--primary-border:#bae6fd;--up:#15803d;--up-soft:#dcfce7;--up-border:#86efac;--down:#b91c1c;--down-soft:#fee2e2;--down-border:#fca5a5;--violet:#6d28d9;--violet-soft:#ede9fe;--violet-border:#c4b5fd;--amber:#b45309;--amber-soft:#fef3c7;--amber-border:#fcd34d;--radius:10px;--shadow:0 1px 2px rgba(15,23,42,.04)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 Inter,system-ui,"PingFang TC","Noto Sans TC",Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1440px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#0284c7,#0ea5e9);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.brand-title{font-size:14px;font-weight:600}.brand-sub{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:999px;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.dot.loading{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.18)}
.dot.error{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.18)}
.refresh-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:11px;color:var(--text-soft)}
.wrap{max-width:1440px;margin:0 auto;padding:18px 20px 36px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.toolbar-sect{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.spacer{flex:1}
.summary-bar{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
.scnt{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--mute);padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:var(--surface-soft)}
.scnt b{font-weight:600;font-variant-numeric:tabular-nums}
.input{background:var(--surface);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:8px;font:400 12.5px inherit;outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(2,132,199,.15)}
.input.search-in{min-width:200px}
.btn-ghost{appearance:none;background:transparent;border:1px solid var(--line);color:var(--text-soft);padding:5px 10px;border-radius:8px;font:500 12px inherit;cursor:pointer;white-space:nowrap}
.btn-ghost:hover{background:var(--surface-soft)}
.btn-ghost.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--text);background:var(--primary-soft)}
th.sort-active{color:var(--primary)}.sort-icon{margin-left:4px;font-size:9px}
table{width:100%;border-collapse:collapse;table-layout:auto}
thead th{background:var(--surface-soft);color:var(--mute);font-size:10px;text-align:left;padding:9px 10px;text-transform:uppercase;letter-spacing:.14em;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;font-size:12px}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--surface-soft)}
tbody tr{cursor:pointer}
.code{font:600 13px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.name{color:var(--text-soft);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:170px}
.num{font:600 12.5px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;white-space:nowrap}
.delta-up{color:var(--up)}.delta-dn{color:var(--down)}.delta-null{color:var(--mute-2)}
.streak{font-size:10px;margin-left:3px;white-space:nowrap}
/* Signal pills */
.cpill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;line-height:1.5;border:1px solid transparent;margin:1px 2px 1px 0}
.cpill em{font-style:normal;font-weight:600;margin-left:3px;opacity:.85}
.cpill-placement{background:var(--down-soft);color:var(--down);border-color:var(--down-border)}
.cpill-rights{background:var(--violet-soft);color:var(--violet);border-color:var(--violet-border)}
.cpill-increase{background:var(--up-soft);color:var(--up);border-color:var(--up-border)}
.cpill-block{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
.cpill-other{background:var(--surface-soft);color:var(--mute);border-color:var(--line)}
.foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);text-align:center;color:var(--mute-2);font-size:11px}
/* Detail drawer */
.drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:99;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-480px;width:460px;max-width:92vw;height:100%;background:var(--surface);border-left:1px solid var(--line);z-index:100;overflow-y:auto;transition:right .25s ease;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:1}
.drawer-close{appearance:none;background:var(--surface-soft);border:1px solid var(--line);border-radius:8px;font-size:16px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mute)}
.drawer-close:hover{background:var(--down-soft);color:var(--down);border-color:var(--down-border)}
.drawer-title{font-size:15px;font-weight:700}
.drawer-sub{font-size:11px;color:var(--mute);margin-top:2px}
.drawer-body{padding:12px 16px}
.drawer-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.dmeta{display:flex;flex-direction:column;align-items:center;background:var(--surface-soft);border:1px solid var(--line-soft);border-radius:8px;padding:10px 14px;min-width:80px;flex:1}
.dmeta-label{font-size:9px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em}
.dmeta-val{font-size:16px;font-weight:700;margin-top:3px}
.dmeta-val.up{color:var(--up)}.dmeta-val.dn{color:var(--down)}
.dmeta-sub{font-size:10px;color:var(--mute-2);margin-top:1px}
.dsection{margin-top:14px}
.dsection-title{font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.hold-table{width:100%;border-collapse:collapse;font-size:11.5px}
.hold-table th{text-align:left;padding:4px 6px;font-size:9px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--line-soft);background:var(--surface-soft)}
.hold-table td{padding:4px 6px;border-bottom:1px solid var(--line-soft)}
.hold-table tr:last-child td{border-bottom:none}
.hold-name{color:var(--text-soft);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.hold-shares{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px}
.loading-msg{text-align:center;padding:60px 20px;color:var(--mute);font-size:14px}
/* Responsive */
@media(max-width:820px){.hide-t5,.th-t5{display:none}}
@media(max-width:720px){.hide-np,.th-np{display:none}}
@media(max-width:820px){.hide-sig,.th-sig{display:none}}
@media(max-width:640px){.brand>a{font-size:11px!important;padding:2px 6px!important;margin-left:3px!important}.input.search-in{min-width:140px}}
@media(max-width:520px){.hide-d20,.th-d20{display:none}.topbar-inner{padding:6px 10px;gap:8px}.brand{gap:6px;flex-shrink:0}.brand>a{font-size:10px!important;padding:1px 5px!important;margin-left:2px!important}.logo{display:none}.brand-title{font-size:12px;white-space:nowrap}.brand-sub{display:none}.topright{gap:3px;font-size:10px}.refresh-tag{display:none}}@media(max-width:400px){.topbar-inner{padding:4px 6px;gap:4px}.brand-title{font-size:11px}.brand>a{font-size:9px!important;padding:1px 4px!important}.topright span:last-child{font-size:8px}}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--surface-soft:#162032;--text:#f1f5f9;--text-soft:#cbd5e1;--mute:#64748b;--mute-2:#475569;--line:#334155;--line-soft:#1e293b;--primary:#38bdf8;--primary-soft:#0c2d44;--primary-border:#0369a1;--up:#4ade80;--up-soft:#052e16;--up-border:#166534;--down:#f87171;--down-soft:#2d0a0a;--down-border:#991b1b;--violet:#a78bfa;--violet-soft:#1e1040;--violet-border:#5b21b6;--amber:#fbbf24;--amber-soft:#1c0f00;--amber-border:#92400e}.topbar{background:rgba(15,23,42,.92)}}
</style>
</head><body>
<header class="topbar"><div class="topbar-inner">
  <div class="brand">
    <div class="logo"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
    <div><div class="brand-title">CCASS 持倉分析</div><div class="brand-sub">CCASS 參與者持股 · HKEX</div></div>
    <a style="font-size:12px;color:var(--primary);margin-left:6px;padding:3px 9px;border:1px solid var(--line);border-radius:6px;white-space:nowrap;font-weight:600" href="./index.html">🇭🇰 港股版 ←</a>
    <a style="font-size:12px;color:#b45309;margin-left:4px;padding:3px 9px;border:1px solid #fcd34d;border-radius:6px;white-space:nowrap;font-weight:600" href="./watchlist.html">⭐ 自選 →</a>
    <a style="font-size:12px;color:#6d28d9;margin-left:4px;padding:3px 9px;border:1px solid #c4b5fd;border-radius:6px;white-space:nowrap;font-weight:600" href="./history.html">🕐 歷史 →</a>

  <div class="topright">

    <span id="updatedAt">載入中…</span>
    <span class="refresh-tag">📦 CCASS 數據</span>
  </div>
</div></header>

<main class="wrap">
  <div class="card">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="toolbar">
      <div class="toolbar-sect">
        <input class="input search-in" id="searchInput" placeholder="搜尋代碼/名稱…" autocomplete="off">
        <select class="input" id="sortSelect" style="font-size:12px">
          <option value="d5">5日Δ</option>
          <option value="tp">CCASS%</option>
          <option value="t5">Top5%</option>
          <option value="t10">Top10%</option>
          <option value="np">參與者數</option>
          <option value="su">連續增持</option>
          <option value="sd">連續減持</option>
          <option value="code">代碼</option>
          <option value="n">名稱</option>
        </select>
        <button class="btn-ghost active" id="dirBtn" title="切換排序方向">↓</button>
      </div>
      <div class="spacer"></div>
      <div class="toolbar-sect">
        <button class="btn-ghost" id="filterAll">全部</button>
        <button class="btn-ghost" id="filterUp">↑ 增持</button>
        <button class="btn-ghost" id="filterDn">↓ 減持</button>
        <button class="btn-ghost" id="filterConcentrated">高集中度</button>
        <button class="btn-ghost" id="filterPlacement">配股</button>
        <button class="btn-ghost" id="filterRights">供股</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th class="sortable sort-active sort-desc" data-sort="code"><span>代碼</span><span class="sort-icon">▼</span></th>
          <th class="sortable" data-sort="n"><span>名稱</span><span class="sort-icon"></span></th>
          <th class="sortable th-sig" data-sort="sig"><span>信號</span><span class="sort-icon"></span></th>
          <th class="sortable" data-sort="tp"><span>CCASS%</span><span class="sort-icon"></span></th>
          <th class="sortable th-t5" data-sort="t5"><span>Top5%</span><span class="sort-icon"></span></th>
          <th class="sortable th-t5" data-sort="t10"><span>Top10%</span><span class="sort-icon"></span></th>
          <th class="sortable" data-sort="d5"><span>5日Δ</span><span class="sort-icon"></span></th>
          <th class="sortable th-d20" data-sort="d20"><span>20日Δ</span><span class="sort-icon"></span></th>
          <th class="sortable th-np" data-sort="np"><span>參與者</span><span class="sort-icon"></span></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>

  </div>
  <div id="pagination" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px"></div>
</main>

<!-- Detail drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div><div class="drawer-title" id="drawerTitle"></div><div class="drawer-sub" id="drawerSub"></div></div>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <div class="loading-msg">載入中…</div>
  </div>
</div>

<div class="foot">數據來源：HKEX CCASS · 僅供參考</div>

<script>
// --- helpers ---
function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function fmtPct(v){if(v==null)return'—';return (v>0?'+':'')+v.toFixed(2)+'%';}
function fmtStreak(su,sd){
  if(su>1)return '<span class="streak" style="color:var(--up)">🔥'+su+'日</span>';
  if(sd>1)return '<span class="streak" style="color:var(--down)">❄️'+sd+'日</span>';
  return '';
}
function deltaClass(v){if(v==null)return'delta-null';return v>0?'delta-up':'delta-dn';}

// --- state ---
let allStocks=[];
let filtered=[];
let sortCol='code';
let sortDir=-1; // -1 = desc
let searchVal='';
let filterMode='all'; // all, up, dn, concentrated
let page=0;
const PAGE_SIZE=200;
const GAS_URL='https://script.google.com/macros/s/AKfycbxov_zEI5TvIp0Xg4ie937Rci_PEfFrUEyk7YH8RKVPz07i0RNS0fqkythLn-iErjVqZA/exec';
let signalMap=new Map();

function renderSummaryBar(data){
  const bar=document.getElementById('summaryBar');
  const up=data.top_increase?.length||0;
  const dn=data.top_decrease?.length||0;
  let pCnt=0, rCnt=0;
  allStocks.forEach(s=>{const m=signalMap.get(s.c);if(m&&m.pl)pCnt++;if(m&&m.ri)rCnt++;});
  bar.innerHTML='<span class="scnt">📅 <b>'+esc(data.updated)+'</b></span>'
    +'<span class="scnt">📦 <b>'+data.total_stocks+'</b> 隻股票</span>'
    +'<span class="scnt">🏦 <b>'+data.total_participants?.toLocaleString()+'</b> 參與者次</span>'
    +'<span class="scnt" style="border-color:var(--up-border);background:var(--up-soft);color:var(--up)">▲ <b>'+up+'</b> 增持</span>'
    +'<span class="scnt" style="border-color:var(--down-border);background:var(--down-soft);color:var(--down)">▼ <b>'+dn+'</b> 減持</span>'
    +'<span class="scnt">📊 <b>'+data.first_date+'</b> 至 <b>'+esc(data.updated)+'</b></span>'+(pCnt?'<span class="scnt" style="border-color:var(--down-border);background:var(--down-soft);color:var(--down)">配股 <b>'+pCnt+'</b></span>':'')+(rCnt?'<span class="scnt" style="border-color:var(--violet-border);background:var(--violet-soft);color:var(--violet)">供股 <b>'+rCnt+'</b></span>':'');
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  const start=page*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE, filtered.length);
  const slice=filtered.slice(start, end);

  tbody.innerHTML=slice.map(s=>{
    const nameCls=s.n===s.c?'muted':''; // fallback if name equals code
    const streak=fmtStreak(s.su, s.sd);
    const d5=s.d5!==null?`<span class="num ${deltaClass(s.d5)}">${fmtPct(s.d5)}</span>`:'<span class="num delta-null">—</span>';
    const d20=s.d20!==null?`<span class="num ${deltaClass(s.d20)}">${fmtPct(s.d20)}</span>`:'<span class="num delta-null">—</span>';
    const sig=signalMap.get(s.c);
    let sigHtml='';
    if(sig){
      if(sig.pl) sigHtml+='<span class="cpill cpill-placement">配股</span>';
      if(sig.ri) sigHtml+='<span class="cpill cpill-rights">供股</span>';
      if(sig.inc) sigHtml+='<span class="cpill cpill-increase">增持</span>';
      if(sig.bl) sigHtml+='<span class="cpill cpill-block">轉倉</span>';
    }
    const tpCls=s.tp>50?'':'';
    return '<tr onclick="showDetail(\''+s.c+'\')">'
      +'<td><span class="code">'+esc(s.c)+'</span></td>'
      +'<td><span class="name" title="'+esc(s.n)+'">'+esc(s.n)+'</span></td>'
      +'<td class="hide-sig">'+sigHtml+'</td>'
      +'<td><span class="num">'+s.tp.toFixed(2)+'%</span></td>'
      +'<td class="hide-t5"><span class="num">'+s.t5.toFixed(2)+'%</span></td>'
      +'<td class="hide-t5"><span class="num">'+s.t10.toFixed(2)+'%</span></td>'
      +'<td>'+d5+streak+'</td>'
      +'<td class="hide-d20">'+d20+'</td>'
      +'<td class="hide-np"><span class="num">'+s.np+'</span></td>'
      +'</tr>';
  }).join('');

  // Pagination
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(totalPages<=1){pag.innerHTML='';return;}
  let html='<span class="scnt"><b>'+filtered.length+'</b> 隻</span>';
  html+='<button class="btn-ghost" onclick="gotoPage('+(page-1)+')" '+(page<=0?'disabled style="opacity:.4"':'')+'>‹</button>';
  html+='<span style="font-size:12px;color:var(--mute)">頁 '+(page+1)+' / '+totalPages+'</span>';
  html+='<button class="btn-ghost" onclick="gotoPage('+(page+1)+')" '+(page>=totalPages-1?'disabled style="opacity:.4"':'')+'>›</button>';
  pag.innerHTML=html;
}

function gotoPage(p){
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  page=Math.max(0, Math.min(p, totalPages-1));
  renderTable();
  document.getElementById('tbody').parentElement.scrollIntoView({behavior:'smooth',block:'start'});
}

function applyFilters(){
  const q=searchVal.toLowerCase().trim();
  filtered=allStocks.filter(s=>{
    if(q && !s.c.includes(q) && !s.n.toLowerCase().includes(q)) return false;
    if(filterMode==='up' && (s.d5===null || s.d5<=0)) return false;
    if(filterMode==='dn' && (s.d5===null || s.d5>=0)) return false;
    if(filterMode==='concentrated' && s.t5<50) return false;
    const sm=signalMap.get(s.c);
    if(filterMode==='placement'){if(!sm||!sm.pl)return false;}
    if(filterMode==='rights'){if(!sm||!sm.ri)return false;}
    return true;
  });
  // Sort
  filtered.sort((a,b)=>{
    let av=a[sortCol], bv=b[sortCol];
    if(typeof av==='string'){av=av.toLowerCase();bv=(bv||'').toLowerCase();}
    if(av==null)av=sortDir===-1?-Infinity:Infinity;
    if(bv==null)bv=sortDir===-1?-Infinity:Infinity;
    return av<bv?sortDir:av>bv?-sortDir:0;
  });
  page=0;
  renderTable();
}

// --- detail drawer ---
async function showDetail(code){
  const overlay=document.getElementById('drawerOverlay');
  const drawer=document.getElementById('drawer');
  overlay.classList.add('open');
  drawer.classList.add('open');
  document.getElementById('drawerTitle').textContent=code;
  document.getElementById('drawerBody').innerHTML='<div class="loading-msg">載入中…</div>';

  // Find stock in our data
  const s=allStocks.find(x=>x.c===code);
  if(!s){
    document.getElementById('drawerBody').innerHTML='<div class="empty">找不到該股票資料</div>';
    return;
  }
  document.getElementById('drawerTitle').textContent=s.c+' '+esc(s.n);
  document.getElementById('drawerSub').textContent='CCASS 持倉明細';

  // Meta cards
  const d5html=s.d5!==null?`<span class="dmeta-val ${s.d5>0?'up':'dn'}">${fmtPct(s.d5)}</span><span class="dmeta-sub">5日變化</span>`:'<span class="dmeta-val delta-null">—</span><span class="dmeta-sub">5日變化</span>';
  const d20html=s.d20!==null?`<span class="dmeta-val ${s.d20>0?'up':'dn'}">${fmtPct(s.d20)}</span><span class="dmeta-sub">20日變化</span>`:'<span class="dmeta-val delta-null">—</span><span class="dmeta-sub">20日變化</span>';

  document.getElementById('drawerBody').innerHTML=
    '<div class="drawer-meta">'
    +'<div class="dmeta"><span class="dmeta-label">CCASS%</span><span class="dmeta-val">'+s.tp.toFixed(2)+'%</span></div>'
    +'<div class="dmeta"><span class="dmeta-label">Top5%</span><span class="dmeta-val">'+s.t5.toFixed(2)+'%</span></div>'
    +'<div class="dmeta"><span class="dmeta-label">Top10%</span><span class="dmeta-val">'+s.t10.toFixed(2)+'%</span></div>'
    +'<div class="dmeta"><span class="dmeta-label">參與者</span><span class="dmeta-val">'+s.np+'</span></div>'
    +'</div>'
    +'<div class="drawer-meta">'
    +'<div class="dmeta">'+d5html+'</div>'
    +'<div class="dmeta">'+d20html+'</div>'
    +'<div class="dmeta">'+(s.su>1?'<span class="dmeta-val up">🔥 '+s.su+'日</span><span class="dmeta-sub">連續增持</span>':'<span class="dmeta-val" style="color:var(--mute-2)">—</span><span class="dmeta-sub">連續增持</span>')+'</div>'
    +'<div class="dmeta">'+(s.sd>1?'<span class="dmeta-val dn">❄️ '+s.sd+'日</span><span class="dmeta-sub">連續減持</span>':'<span class="dmeta-val" style="color:var(--mute-2)">—</span><span class="dmeta-sub">連續減持</span>')+'</div>'
    +'</div>'
    +'<div class="dsection"><div class="dsection-title">持倉分布</div>'
    +'<div id="holdingsTable"><div class="loading-msg" style="padding:20px">載入股東明細…</div></div></div>';

  // Fetch holdings detail from DB via a small inline script? Can't from static.
  // We'll embed participant summary from the JSON if available, or show a note.
  // For now show top participants from the JSON data we have (none directly in ccass.json)
  // Use a placeholder explanation
  document.getElementById('holdingsTable').innerHTML=
    '<div style="padding:12px 0;color:var(--mute);font-size:12px;text-align:center">'
    +'參與者明細數據只存於後端數據庫。每日 GitHub Actions 更新後可下載完整數據集。'
    +'<br><br><a class="btn-ghost" style="display:inline-flex" href="./ccass.json" target="_blank">📥 下載 ccass.json</a>'
    +'</div>';
}

function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e=>{if(e.key==='Escape')closeDrawer();});

// --- sorting ---
document.querySelectorAll('th.sortable').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.sort;
    if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=col==='code'||col==='n'?1:-1;}
    document.querySelectorAll('th.sortable').forEach(x=>{
      x.classList.remove('sort-active','sort-desc','sort-asc');
      x.querySelector('.sort-icon').textContent='';
    });
    th.classList.add('sort-active',sortDir===1?'sort-asc':'sort-desc');
    th.querySelector('.sort-icon').textContent=sortDir===1?'▲':'▼';
    applyFilters();
  });
});

// --- toolbar ---
document.getElementById('searchInput').addEventListener('input',()=>{
  searchVal=document.getElementById('searchInput').value;
  applyFilters();
});
document.getElementById('sortSelect').addEventListener('change',()=>{
  sortCol=document.getElementById('sortSelect').value;
  applyFilters();
});
document.getElementById('dirBtn').addEventListener('click',()=>{
  sortDir*=-1;
  document.getElementById('dirBtn').textContent=sortDir===1?'↑':'↓';
  applyFilters();
});

// --- filter buttons ---
function setFilter(mode){
  filterMode=mode;
  document.querySelectorAll('.toolbar-sect .btn-ghost').forEach(b=>b.classList.remove('active'));
  if(mode==='all') document.getElementById('filterAll').classList.add('active');
  else if(mode==='up') document.getElementById('filterUp').classList.add('active');
  else if(mode==='dn') document.getElementById('filterDn').classList.add('active');
  else if(mode==='concentrated') document.getElementById('filterConcentrated').classList.add('active');
  else if(mode==='placement') document.getElementById('filterPlacement').classList.add('active');
  else if(mode==='rights') document.getElementById('filterRights').classList.add('active');
  applyFilters();
}
document.getElementById('filterAll').addEventListener('click',()=>setFilter('all'));
document.getElementById('filterUp').addEventListener('click',()=>setFilter('up'));
document.getElementById('filterDn').addEventListener('click',()=>setFilter('dn'));
document.getElementById('filterConcentrated').addEventListener('click',()=>setFilter('concentrated'));
document.getElementById('filterPlacement').addEventListener('click',()=>setFilter('placement'));
document.getElementById('filterRights').addEventListener('click',()=>setFilter('rights'));
document.getElementById('filterAll').classList.add('active');

// --- main load ---
async function loadData(){
  const dot=document.getElementById('statusDot');
  const upd=document.getElementById('updatedAt');
  dot.className='dot loading';
  upd.textContent='載入中…';
  try{
    const res=await fetch('./ccass.json?_='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    allStocks=data.stocks||[];
    renderSummaryBar(data);
    applyFilters();
    fetch(GAS_URL+'?format=json')
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        if(d&&d.groups){
          d.groups.forEach(g=>{
            const ct=g.corpTypes||{};
            const code=String(g.code||"").padStart(5,"0");
            signalMap.set(code,
              {pl:ct.placement?.count>0, ri:ct.rights?.count>0,
               inc:ct.increase?.count>0, bl:ct.block?.count>0});
          });
        }
        renderSummaryBar(data);
        applyFilters();
      }).catch(()=>{});
    dot.className='dot';
    upd.textContent='更新於 '+data.updated;
  }catch(err){
    dot.className='dot error';
    upd.textContent='載入失敗';
    document.querySelector('.card').innerHTML='<div class="loading-msg" style="color:#ef4444">載入失敗：'+esc(err.message)+'<br><small>請稍後重試</small></div>';
  }
}
loadData();
</script>
