<!doctype html>
<html lang="zh-HK"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCASS 持倉分析</title>
<style>
:root{--bg:#f5f7fa;--surface:#fff;--surface-soft:#f8fafc;--text:#0f172a;--text-soft:#334155;--mute:#64748b;--mute-2:#94a3b8;--line:#e2e8f0;--line-soft:#eef1f6;--primary:#0284c7;--primary-soft:#e0f2fe;--primary-border:#bae6fd;--up:#15803d;--up-soft:#dcfce7;--up-border:#86efac;--down:#b91c1c;--down-soft:#fee2e2;--down-border:#fca5a5;--violet:#6d28d9;--violet-soft:#ede9fe;--violet-border:#c4b5fd;--amber:#b45309;--amber-soft:#fef3c7;--amber-border:#fcd34d;--radius:10px;--shadow:0 1px 2px rgba(15,23,42,.04)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 Inter,system-ui,"PingFang TC","Noto Sans TC",Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1440px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#0284c7,#0ea5e9);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.brand-title{font-size:14px;font-weight:600}.brand-sub{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:999px;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.dot.loading{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.18)}
.dot.error{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.18)}
.refresh-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:11px;color:var(--text-soft)}
.wrap{max-width:1440px;margin:0 auto;padding:18px 20px 36px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.toolbar-sect{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.spacer{flex:1}
.summary-bar{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
.scnt{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--mute);padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:var(--surface-soft)}
.scnt b{font-weight:600;font-variant-numeric:tabular-nums}
.input{background:var(--surface);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:8px;font:400 12.5px inherit;outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(2,132,199,.15)}
.input.search-in{min-width:200px}
.btn-ghost{appearance:none;background:transparent;border:1px solid var(--line);color:var(--text-soft);padding:5px 10px;border-radius:8px;font:500 12px inherit;cursor:pointer;white-space:nowrap}
.btn-ghost:hover{background:var(--surface-soft)}
.btn-ghost.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--text);background:var(--primary-soft)}
th.sort-active{color:var(--primary)}.sort-icon{margin-left:4px;font-size:9px}
table{width:100%;border-collapse:collapse;table-layout:auto}
thead th{background:var(--surface-soft);color:var(--mute);font-size:10px;text-align:left;padding:9px 10px;text-transform:uppercase;letter-spacing:.14em;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:7px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;font-size:12px}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--surface-soft)}
tbody tr{cursor:pointer}
.code{font:600 13px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.name{color:var(--text-soft);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:170px}
.num{font:600 12.5px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;white-space:nowrap}
.delta-up{color:var(--up)}.delta-dn{color:var(--down)}.delta-null{color:var(--mute-2)}
.streak{font-size:10px;margin-left:3px;white-space:nowrap}
/* Signal pills */
.cpill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;line-height:1.5;border:1px solid transparent;margin:1px 2px 1px 0}
.cpill em{font-style:normal;font-weight:600;margin-left:3px;opacity:.85}
.cpill-placement{background:var(--down-soft);color:var(--down);border-color:var(--down-border)}
.cpill-rights{background:var(--violet-soft);color:var(--violet);border-color:var(--violet-border)}
.cpill-increase{background:var(--up-soft);color:var(--up);border-color:var(--up-border)}
.cpill-block{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
.cpill-other{background:var(--surface-soft);color:var(--mute);border-color:var(--line)}
.foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);text-align:center;color:var(--mute-2);font-size:11px}
.mc-null{color:var(--mute-2);font-size:11px}
/* Detail drawer */
.drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:99;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-480px;width:460px;max-width:92vw;height:100%;background:var(--surface);border-left:1px solid var(--line);z-index:100;overflow-y:auto;transition:right .25s ease;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:1}
.drawer-close{appearance:none;background:var(--surface-soft);border:1px solid var(--line);border-radius:8px;font-size:16px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mute)}
.drawer-close:hover{background:var(--down-soft);color:var(--down);border-color:var(--down-border)}
.drawer-title{font-size:15px;font-weight:700}
.drawer-sub{font-size:11px;color:var(--mute);margin-top:2px}
.drawer-body{padding:12px 16px}
.drawer-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.dmeta{display:flex;flex-direction:column;align-items:center;background:var(--surface-soft);border:1px solid var(--line-soft);border-radius:8px;padding:10px 14px;min-width:80px;flex:1}
.dmeta-label{font-size:9px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em}
.dmeta-val{font-size:16px;font-weight:700;margin-top:3px}
.dmeta-val.up{color:var(--up)}.dmeta-val.dn{color:var(--down)}
.dmeta-sub{font-size:10px;color:var(--mute-2);margin-top:1px}
.dsection{margin-top:14px}
.dsection-title{font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.hold-table{width:100%;border-collapse:collapse;font-size:11.5px}
.hold-table th{text-align:left;padding:4px 6px;font-size:9px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--line-soft);background:var(--surface-soft)}
.hold-table td{padding:4px 6px;border-bottom:1px solid var(--line-soft)}
.hold-table tr:last-child td{border-bottom:none}
.hold-name{color:var(--text-soft);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.hold-shares{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px}
.loading-msg{text-align:center;padding:60px 20px;color:var(--mute);font-size:14px}
/* Price column */
.cell-price{width:90px;white-space:nowrap}.pv{font:600 13px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
/* Chart column */
.cell-chart{width:150px}.chartimg{display:block;width:140px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--line-soft);background:#0b1220}
.chartimg-link{display:block;line-height:0}.chartimg-link:hover .chartimg{border-color:var(--primary-border)}
.nochart{font-size:10px;color:var(--mute-2)}
/* Tech signal pills */
.spill{display:inline-flex;align-items:center;gap:4px;background:var(--primary-soft);color:#075985;border:1px solid var(--primary-border);font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;margin:1px 3px 1px 0;line-height:1.5;white-space:nowrap}
.spill-poc{background:var(--violet-soft);color:var(--violet);border-color:var(--violet-border)}
.spill-fvg{background:var(--up-soft);color:var(--up);border-color:var(--up-border)}
.spill-yearopen{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
.spill-ipo{background:linear-gradient(135deg,var(--amber-soft),#fff7ed);color:#b45309;border-color:#fcd34d}
.spill-date{font-size:10px;font-weight:500;opacity:.7;font-variant-numeric:tabular-nums}
.splink{text-decoration:none}
.cpillrow{margin-top:4px;display:flex;flex-wrap:wrap;gap:3px}
/* Watchlist star */
.btn-save{appearance:none;background:transparent;border:none;cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;color:var(--mute-2);transition:color .15s}
.btn-save:hover{color:#f59e0b}.btn-save.saved{color:#f59e0b}
/* Link column */
.cell-link{font-size:12px;white-space:nowrap}
.lnk{display:inline-flex;padding:3px 8px;border-radius:6px;border:1px solid var(--line);background:var(--surface);font:600 10px inherit;color:var(--text-soft);text-decoration:none}
.lnk:hover{border-color:var(--violet-border);background:var(--violet-soft);color:var(--violet);text-decoration:none}
/* Market indicator bar */
.mbar{display:flex;gap:12px;flex-wrap:wrap;padding:8px 0 12px;margin-bottom:4px}
.mchip{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:110px;flex:1;gap:3px}
.mchip-label{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em}
.mchip-val{font-size:17px;font-weight:700;color:var(--text);text-align:center}
.mchip-val.stale{color:var(--mute)}
.mchip-sub{font-size:9px;margin-top:1px;display:flex;align-items:center;gap:4px}
.mchip-avg{color:var(--mute)}
.ev-green{background:var(--up-soft);color:var(--up);border:1px solid var(--up-border);border-radius:4px;padding:1px 5px;font-weight:600}
.ev-neutral{background:var(--surface-soft);color:var(--mute);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-weight:600}
.ev-orange{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber-border);border-radius:4px;padding:1px 5px;font-weight:600}
.ev-red{background:var(--down-soft);color:var(--down);border:1px solid var(--down-border);border-radius:4px;padding:1px 5px;font-weight:600}
@media(max-width:520px){.mbar{display:flex;flex-wrap:nowrap;gap:4px}.mchip{padding:4px 3px;min-width:0;flex:1;gap:1px}.mchip-val{font-size:11px}.mchip-label{font-size:8px;letter-spacing:.06em}.mchip-sub{font-size:7px;gap:2px}}@media(max-width:400px){.mbar{gap:2px}.mchip{padding:2px 1px}.mchip-val{font-size:9px}.mchip-label{font-size:7px}.mchip-sub{font-size:6px}}
/* Breadth card */
.breadth-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px}
.breadth-head{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.breadth-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}.breadth-row:last-child{margin-bottom:0}
.breadth-lbl{font-size:11px;font-weight:600;color:var(--text-soft);width:28px;flex-shrink:0}
.breadth-bar{flex:1;height:12px;border-radius:6px;overflow:hidden;display:flex;background:var(--surface-soft)}
.bs-h{background:#16a34a}.bs-m{background:#94a3b8}.bs-l{background:#dc2626}
.breadth-stats{font-size:10px;white-space:nowrap;display:flex;gap:5px}
.bs-hi{color:#16a34a;font-weight:600}.bs-lo{color:#dc2626;font-weight:600}.bs-n{color:var(--mute-2)}
/* IPO card */
.ipo-card{margin-bottom:10px;background:var(--surface);border:1px solid var(--amber-border);border-radius:var(--radius);overflow:hidden}.ipo-head{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 3px;font-size:11px;font-weight:700;color:var(--amber)}.ipo-count{font-size:10px;font-weight:600;color:var(--mute);background:var(--amber-soft);padding:1px 8px;border-radius:10px;border:1px solid var(--amber-border)}.ipo-tbl{width:100%;border-collapse:collapse;font-size:12px}.ipo-tbl th{text-align:left;padding:2px 10px;font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;border-top:1px solid var(--amber-border);background:rgba(251,191,36,.04)}.ipo-tbl td{padding:2px 10px;border-bottom:1px solid var(--line-soft)}.ipo-tbl tr:last-child td{border-bottom:none}.ipo-tbl a{color:var(--text);text-decoration:none;font-weight:600}.ipo-tbl a:hover{color:var(--amber)}.ipo-tbl .name{color:var(--text-soft);font-size:11px}.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:4px;line-height:1.5}.badge-high{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber-border)}.badge-open{background:var(--primary-soft);color:var(--primary);border:1px solid var(--primary-border)}
/* Recent announcements */
.recent-card{padding:2px 0}
.ra-list{list-style:none;margin:0;padding:4px 10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0}
.ra-item{display:flex;align-items:center;gap:7px;padding:4px 4px;font-size:11.5px;border-bottom:1px solid var(--line-soft);min-width:0}
.ra-item:last-child{border-bottom:none}.ra-label{flex:0 0 auto}
.ra-date{flex:0 0 auto;font:600 11px "JetBrains Mono",ui-monospace,monospace;color:var(--text-soft);min-width:44px}
.ra-stk{flex:1 1 auto;display:flex;align-items:baseline;gap:5px;min-width:0;overflow:hidden}
.ra-code{font:600 11.5px "JetBrains Mono",ui-monospace,monospace}.ra-name{color:var(--mute);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ra-link{flex:0 0 auto;display:inline-flex;padding:2px 6px;border-radius:5px;border:1px solid var(--violet-border);background:var(--violet-soft);color:var(--violet);font:600 9px inherit;text-decoration:none}
/* Section toggle */
.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:20px 0 10px}
.section-head h2{margin:0;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.ico{display:inline-flex;width:18px;height:18px;border-radius:6px;background:var(--primary-soft);color:var(--primary);align-items:center;justify-content:center}
.section-toggle{appearance:none;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:0;width:100%;text-align:left}
.section-toggle h2{margin:0;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.toggle-arrow{font-size:10px;color:var(--mute-2);transition:transform .2s;margin-left:4px}
.section-toggle.collapsed .toggle-arrow{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:height .2s ease}
/* Responsive */
@media(max-width:900px){.hide-chart,.th-chart{display:none}}
@media(max-width:820px){.hide-t5,.th-t5{display:none}}
@media(max-width:820px){.hide-sig,.th-sig{display:none}}
@media(max-width:720px){.hide-np,.th-np{display:none}}
@media(max-width:720px){.hide-price,.th-price{display:none}}
@media(max-width:640px){.hide-mc,.th-mc{display:none}}
@media(max-width:640px){.hide-link,.th-link{display:none}}
@media(max-width:640px){.brand>a{font-size:11px!important;padding:2px 6px!important;margin-left:3px!important}.input.search-in{min-width:140px}}
@media(max-width:640px){.topbar-inner{padding:6px 10px;gap:8px}.brand{gap:6px;flex-shrink:0}.brand>a{font-size:10px!important;padding:1px 5px!important;margin-left:2px!important}.logo{display:none}.brand-title{font-size:12px;white-space:nowrap}.brand-sub{display:none}.topright{gap:3px;font-size:10px}.refresh-tag{display:none}}
@media(max-width:560px){.hide-d120,.th-d120{display:none}}
@media(max-width:480px){.hide-d60,.th-d60{display:none}}
@media(max-width:360px){.hide-d20,.th-d20{display:none}.topbar-inner{padding:4px 6px;gap:4px}.brand-title{font-size:11px}.brand>a{font-size:9px!important;padding:1px 4px!important}.topright span:last-child{font-size:8px}}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--surface-soft:#162032;--text:#f1f5f9;--text-soft:#cbd5e1;--mute:#64748b;--mute-2:#475569;--line:#334155;--line-soft:#1e293b;--primary:#38bdf8;--primary-soft:#0c2d44;--primary-border:#0369a1;--up:#4ade80;--up-soft:#052e16;--up-border:#166534;--down:#f87171;--down-soft:#2d0a0a;--down-border:#991b1b;--violet:#a78bfa;--violet-soft:#1e1040;--violet-border:#5b21b6;--amber:#fbbf24;--amber-soft:#1c0f00;--amber-border:#92400e}.topbar{background:rgba(15,23,42,.92)}}
</style>
</head><body>
<header class="topbar"><div class="topbar-inner">
  <div class="brand">
    <div class="logo"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>

<main class="wrap">
  <div class="mbar" id="mbar"></div>

    <div class="summary-bar" id="summaryBar"></div>
    <div class="toolbar">
      <div class="toolbar-sect">
        <input class="input search-in" id="searchInput" placeholder="搜尋代碼/名稱…" autocomplete="off">
        <select class="input" id="sortSelect" style="font-size:12px">
          <option value="d5">5日Δ</option>
          <option value="tp">CCASS%</option>
          <option value="t5">Top5%</option>
          <option value="t10">Top10%</option>
          <option value="np">參與者數</option>
          <option value="su">連續增持</option>
          <option value="sd">連續減持</option>
          <option value="d20">20日Δ</option>
          <option value="d60">60日Δ</option>
          <option value="d120">120日Δ</option>
          <option value="price">價格</option>
          <option value="code">代碼</option>
          <option value="n">名稱</option>

<script>
// --- helpers ---
function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function fmtPct(v){if(v==null)return'—';return (v>0?'+':'')+v.toFixed(2)+'%';}
function fmtStreak(su,sd){
  if(su>1)return '<span class="streak" style="color:var(--up)">🔥'+su+'日</span>';
  if(sd>1)return '<span class="streak" style="color:var(--down)">❄️'+sd+'日</span>';
  return '';
}
function deltaClass(v){if(v==null)return'delta-null';return v>0?'delta-up':'delta-dn';}
function fmtMC(mc){
  if(mc==null)return'<span class="mc-null">—</span>';
  if(mc>=100)return mc.toFixed(0)+'億';
  return mc.toFixed(1)+'億';
}
function sigType(lbl){
  if(lbl.indexOf('POC')>=0)return'poc';if(lbl.indexOf('FVG')>=0)return'fvg';
  if(lbl.indexOf('年開')>=0)return'yearopen';if(lbl.indexOf('IPO')>=0)return'ipo';
  return '';
}
function fmtTime(s){if(!s)return'—';try{const d=new Date(s);if(isNaN(d))return String(s);const p=n=>n<10?'0'+n:''+n;return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());}catch(e){return String(s);}}
function fmtDate(s){if(!s)return'—';try{const d=new Date(s);if(isNaN(d))return String(s);const p=n=>n<10?'0'+n:''+n;return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}catch(e){return String(s);}}

// --- state ---
let allStocks=[];
let filtered=[];
let sortCol='code';
let sortDir=-1; // -1 = desc
let searchVal='';
let activeFilters=new Set();
let page=0;
const PAGE_SIZE=200;
const GAS_URL='https://script.google.com/macros/s/AKfycbxov_zEI5TvIp0Xg4ie937Rci_PEfFrUEyk7YH8RKVPz07i0RNS0fqkythLn-iErjVqZA/exec';
let signalMap=new Map();
let priceMap=new Map();
let chartMap=new Map();
let hkexLinkMap=new Map();
let techSignalMap=new Map();
const CORP_CACHE_KEY='hk_corp_signal_cache_v2';

function extractDateFromLink(link){
  if(!link) return null;
  const m=link.match(/\/(\d{4})\/(\d{2})(\d{2})\//);
  return m ? m[1]+'-'+m[2]+'-'+m[3] : null;
}
function loadCorpCache(){
  try{return JSON.parse(localStorage.getItem(CORP_CACHE_KEY)||'{}');}catch{return {};}
}
function saveCorpCache(c){localStorage.setItem(CORP_CACHE_KEY,JSON.stringify(c));}
function pruneCorpCache(){
  const cache=loadCorpCache();
  const cut=new Date(); cut.setMonth(cut.getMonth()-9);
  let ch=false;
  Object.keys(cache).forEach(code=>{
    Object.keys(cache[code]).forEach(t=>{
      if(cache[code][t].date && new Date(cache[code][t].date)<cut){delete cache[code][t];ch=true;}
    });
    if(Object.keys(cache[code]).length===0){delete cache[code];ch=true;}
  });
  if(ch) saveCorpCache(cache);
  return cache;
}

// --- section toggle ---
function toggleSection(id, btn) {
  const body = document.getElementById('body-' + id);
  const key = 'sec_collapsed_' + id;
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  btn.classList.toggle('collapsed', !collapsed);
  try { localStorage.setItem(key, collapsed ? '0' : '1'); } catch(e) {}
}
(function initSections() {
  ['signals','corps'].forEach(function(id) {
    try {
      if (localStorage.getItem('sec_collapsed_' + id) === '1') {
        const body = document.getElementById('body-' + id);
        const btn = document.getElementById('toggle-' + id);
        if (body) body.style.display = 'none';
        if (btn) btn.classList.add('collapsed');
      }
    } catch(e) {}
  });
})();

function renderSummaryBar(data){
  const bar=document.getElementById('summaryBar');
  const up=data.top_increase?.length||0;
  const dn=data.top_decrease?.length||0;
  let pCnt=0, rCnt=0;
  allStocks.forEach(s=>{const m=signalMap.get(s.c);if(m&&m.pl)pCnt++;if(m&&m.ri)rCnt++;});
  let totalMc=0, mcCnt=0;
  allStocks.forEach(s=>{if(s.mc!=null){totalMc+=s.mc; mcCnt++;}});
  bar.innerHTML='<span class="scnt">📅 <b>'+esc(data.updated)+'</b></span>'
    +'<span class="scnt">📦 <b>'+data.total_stocks+'</b> 隻股票</span>'
    +'<span class="scnt">🏦 <b>'+data.total_participants?.toLocaleString()+'</b> 參與者次</span>'
    +'<span class="scnt" style="border-color:var(--up-border);background:var(--up-soft);color:var(--up)">▲ <b>'+up+'</b> 增持</span>'
    +'<span class="scnt" style="border-color:var(--down-border);background:var(--down-soft);color:var(--down)">▼ <b>'+dn+'</b> 減持</span>'
    +'<span class="scnt">📊 <b>'+data.first_date+'</b> 至 <b>'+esc(data.updated)+'</b></span>'+(pCnt?'<span class="scnt" style="border-color:var(--down-border);background:var(--down-soft);color:var(--down)">配股 <b>'+pCnt+'</b></span>':'')+(rCnt?'<span class="scnt" style="border-color:var(--violet-border);background:var(--violet-soft);color:var(--violet)">供股 <b>'+rCnt+'</b></span>':'')+(mcCnt?'<span class="scnt">💰 <b>'+totalMc.toFixed(0)+'億</b> 總市值</span>':'');
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  const start=page*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE, filtered.length);
  const slice=filtered.slice(start, end);
  const wl=loadWatchlist();

  tbody.innerHTML=slice.map(s=>{
    const streak=fmtStreak(s.su, s.sd);
    const d5=s.d5!==null?`<span class="num ${deltaClass(s.d5)}">${fmtPct(s.d5)}</span>`:'<span class="num delta-null">—</span>';
    const d20=s.d20!==null?`<span class="num ${deltaClass(s.d20)}">${fmtPct(s.d20)}</span>`:'<span class="num delta-null">—</span>';
    const d60=s.d60!==null?`<span class="num ${deltaClass(s.d60)}">${fmtPct(s.d60)}</span>`:'<span class="num delta-null">—</span>';
    const d120=s.d120!==null?`<span class="num ${deltaClass(s.d120)}">${fmtPct(s.d120)}</span>`:'<span class="num delta-null">—</span>';

    // Corp signal pills
    const sig=signalMap.get(s.c);
    let corpHtml='';
    if(sig){
      if(sig.pl) corpHtml+='<span class="cpill cpill-placement">配股'+(sig.plDate?' <em>'+sig.plDate.slice(5)+'</em>':'')+'</span>';
      if(sig.ri) corpHtml+='<span class="cpill cpill-rights">供股'+(sig.riDate?' <em>'+sig.riDate.slice(5)+'</em>':'')+'</span>';
      if(sig.inc) corpHtml+='<span class="cpill cpill-increase">增持</span>';
      if(sig.bl) corpHtml+='<span class="cpill cpill-block">轉倉</span>';
    }

    // Tech signal pills from GAS
    const techSig=techSignalMap.get(s.c)||[];
    const techHtml=techSig.slice(0,4).map(sig=>{
      const dateStr=sig.date?'<span class="spill-date">'+fmtDate(sig.date).slice(5)+'</span>':'';
      const t=sigType(sig.label),cls='spill'+(t?' spill-'+t:'');
      const body='<span class="'+cls+'">'+esc(sig.label)+dateStr+'</span>';
      return sig.link?'<a class="splink" href="'+esc(sig.link)+'" target="_blank" rel="noopener">'+body+'</a>':body;
    }).join(' ');

    // Merged signal cell
    const mergedSig=(techHtml||'')+(corpHtml?'<div class="cpillrow">'+corpHtml+'</div>':'');
    const sigDisplay=mergedSig||'<span class="mc-null">—</span>';

    // Price
    const priceVal=priceMap.get(s.c);
    const priceHtml=priceVal!=null
      ? '<span class="pv">'+esc(priceVal<1?priceVal.toFixed(3):priceVal.toFixed(2))+'</span>'
      : '<span class="mc-null">—</span>';

    // Chart
    const chartUrl=chartMap.get(s.c);
    let chartHtml='<span class="nochart">—</span>';
    if(chartUrl){
      chartHtml='<a class="chartimg-link" href="'+esc(chartUrl)+'" target="_blank" rel="noopener"><img class="chartimg" src="'+esc(chartUrl)+'" alt="'+esc(s.c)+'" loading="lazy" width="140" height="60" referrerpolicy="no-referrer" onerror="this.onerror=null;this.parentNode.outerHTML=\'<span class=&quot;nochart&quot;>—</span>\'"></a>';
    }

    // Watchlist + HKEX link
    const savedWl=wl.has(s.c);
    const hkexLnk=hkexLinkMap.get(s.c);
    const linkHtml='<button class="btn-save'+(savedWl?' saved':'')+'" data-code="'+esc(s.c)+'" data-name="'+esc(s.n)+'" data-signal="" data-date="" title="加入自選">'+(savedWl?'★':'☆')+'</button>'+(hkexLnk?' <a class="lnk" href="'+esc(hkexLnk)+'" target="_blank" rel="noopener" title="HKEX 披露易">HKEX</a>':'');

    return '<tr onclick="showDetail(\''+s.c+'\')">'
      +'<td><span class="code">'+esc(s.c)+'</span></td>'
      +'<td><span class="name" title="'+esc(s.n)+'">'+esc(s.n)+'</span></td>'
      +'<td class="hide-price">'+priceHtml+'</td>'
      +'<td class="hide-chart">'+chartHtml+'</td>'
      +'<td class="hide-sig cell-pills">'+sigDisplay+'</td>'
      +'<td><span class="num">'+s.tp.toFixed(2)+'%</span></td>'
      +'<td class="hide-t5"><span class="num">'+s.t5.toFixed(2)+'%</span></td>'
      +'<td class="hide-t5"><span class="num">'+s.t10.toFixed(2)+'%</span></td>'
      +'<td>'+d5+streak+'</td>'
      +'<td class="hide-d20">'+d20+'</td>'
      +'<td class="hide-d60">'+d60+'</td>'
      +'<td class="hide-d120">'+d120+'</td>'
      +'<td class="hide-np"><span class="num">'+s.np+'</span></td>'
      +'<td class="hide-mc"><span class="num">'+fmtMC(s.mc)+'</span></td>'
      +'<td class="hide-link" onclick="event.stopPropagation()">'+linkHtml+'</td>'
      +'</tr>';
  }).join('');

  // Pagination
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(totalPages<=1){pag.innerHTML='';return;}
  let html='<span class="scnt"><b>'+filtered.length+'</b> 隻</span>';
  html+='<button class="btn-ghost" onclick="gotoPage('+(page-1)+')" '+(page<=0?'disabled style="opacity:.4"':'')+'>‹</button>';
  html+='<span style="font-size:12px;color:var(--mute)">頁 '+(page+1)+' / '+totalPages+'</span>';
  html+='<button class="btn-ghost" onclick="gotoPage('+(page+1)+')" '+(page>=totalPages-1?'disabled style="opacity:.4"':'')+'>›</button>';
  pag.innerHTML=html;
}

function gotoPage(p){
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  page=Math.max(0, Math.min(p, totalPages-1));
  renderTable();
  document.getElementById('tbody').parentElement.scrollIntoView({behavior:'smooth',block:'start'});
}

function applyFilters(){
  const q=searchVal.toLowerCase().trim();
  const sigFilterVal=document.getElementById('sigFilter')?.value||'all';
  filtered=allStocks.filter(s=>{
    if(q && !s.c.includes(q) && !s.n.toLowerCase().includes(q)) return false;

    // Multi-select AND-logic filters
    if(activeFilters.size>0){
      for(const mode of activeFilters){
        if(mode==='up' && (s.d5===null || s.d5<=0)) return false;
        if(mode==='dn' && (s.d5===null || s.d5>=0)) return false;
        if(mode==='concentrated' && s.t5<50) return false;
        if(mode==='placement'){const sm=signalMap.get(s.c);if(!sm||!sm.pl)return false;}
        if(mode==='rights'){const sm=signalMap.get(s.c);if(!sm||!sm.ri)return false;}
        if(mode==='small_mc' && (s.mc===null || s.mc>=20)) return false;
        if(mode==='mid_mc' && (s.mc===null || s.mc<20 || s.mc>=100)) return false;
        if(mode==='large_mc' && (s.mc===null || s.mc<100)) return false;
      }
    }

    // Signal type dropdown filter (AND with multi-select)
    if(sigFilterVal!=='all'){
      const ts=techSignalMap.get(s.c)||[];
      const sigText=ts.map(x=>x.label).join(' ');
      const sm=signalMap.get(s.c);
      let sigOK=true;
      if(sigFilterVal==='poc') sigOK=sigText.indexOf('POC')>=0;
      else if(sigFilterVal==='fvg') sigOK=sigText.indexOf('FVG')>=0;
      else if(sigFilterVal==='yearopen') sigOK=sigText.indexOf('年開突破')>=0;
      else if(sigFilterVal==='ipo') sigOK=sigText.indexOf('IPO首日')>=0;
      else if(sigFilterVal==='ccass_up') sigOK=sm&&s.d5!==null&&s.d5>0;
      else if(sigFilterVal==='ccass_dn') sigOK=sm&&s.d5!==null&&s.d5<0;
      if(!sigOK) return false;
    }
    return true;
  });
  // Sort
  filtered.sort((a,b)=>{
    let av=a[sortCol], bv=b[sortCol];
    // Handle price sort from priceMap
    if(sortCol==='price'){
      av=priceMap.get(a.c)||0;
      bv=priceMap.get(b.c)||0;
    } else {
      if(typeof av==='string'){av=av.toLowerCase();bv=(bv||'').toLowerCase();}
      if(av==null)av=sortDir===-1?-Infinity:Infinity;
      if(bv==null)bv=sortDir===-1?-Infinity:Infinity;
    }
    return av<bv?sortDir:av>bv?-sortDir:0;
  });
  page=0;
  renderTable();
}

// --- detail drawer ---

  // Price

    if(sig.bl) dsigHtml+='<span class="cpill cpill-block">轉倉</span>';
  }

  // Tech signal pills
  const techSig=techSignalMap.get(s.c)||[];
  const techHtml=techSig.slice(0,4).map(sig=>{

    const t=sigType(sig.label),cls='spill'+(t?' spill-'+t:'');

  document.getElementById('drawerBody').innerHTML=
    '<div class="drawer-meta">'

// --- filter buttons (multi-select) ---
const FILTER_IDS={filterAll:'all',filterUp:'up',filterDn:'dn',filterConcentrated:'concentrated',filterPlacement:'placement',filterRights:'rights',filterSmallMC:'small_mc',filterMidMC:'mid_mc',filterLargeMC:'large_mc'};

function toggleFilter(mode){
  if(mode==='all'){activeFilters.clear();updateFilterUI();applyFilters();return;}
  if(activeFilters.has(mode)){activeFilters.delete(mode);updateFilterUI();applyFilters();return;}
  if(mode==='up'||mode==='dn'){activeFilters.delete('up');activeFilters.delete('dn');}
  else if(mode==='small_mc'||mode==='mid_mc'||mode==='large_mc'){
    activeFilters.delete('small_mc');activeFilters.delete('mid_mc');activeFilters.delete('large_mc');}
  activeFilters.add(mode);
  updateFilterUI();applyFilters();
}

function updateFilterUI(){
  document.querySelectorAll('.toolbar-sect .btn-ghost').forEach(b=>{
    const m=FILTER_IDS[b.id];
    if(m==='all')b.classList.toggle('active',activeFilters.size===0);
    else b.classList.toggle('active',activeFilters.has(m));
  });
}

Object.entries(FILTER_IDS).forEach(([id,m])=>{
  document.getElementById(id).addEventListener('click',()=>toggleFilter(m));
});

// --- watchlist ---
function loadWatchlist(){
  try{return new Set((JSON.parse(localStorage.getItem('hk_watchlist_v1')||'[]').map(x=>x.code)));}catch{return new Set();}
}
function saveToWatch(btn){
  try{
    const {code,name,signal,date}=btn.dataset;
    const key='hk_watchlist_v1';
    const items=JSON.parse(localStorage.getItem(key)||'[]');
    const idx=items.findIndex(x=>x.code===code);
    const entry={id:idx>=0?items[idx].id:Date.now(),code,name,signal,date,note:idx>=0?items[idx].note:''};
    if(idx>=0)items[idx]=entry;else items.unshift(entry);
    localStorage.setItem(key,JSON.stringify(items));
    btn.textContent='★';btn.classList.add('saved');
    setTimeout(()=>{if(btn.textContent==='★'){btn.textContent='☆';btn.classList.remove('saved');}},2000);
  }catch(e){}
}
// Use capture phase so this fires before td onclick stopPropagation
document.getElementById('tbody').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-save');if(!btn)return;
  e.stopPropagation();
  e.preventDefault();
  saveToWatch(btn);
}, true);

// --- Market indicators ---
function renderMarket(snap){
  if(!snap) return;
  const bar=document.getElementById('mbar');
  if(!bar) return;
  function fmtNum(v,d){return v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
  function chgHtml(pct){if(pct==null)return '';const s=pct>=0?'+':'';return '<span style="font-size:10px;color:'+(pct>=0?'var(--up)':'var(--down)')+'">'+s+pct.toFixed(2)+'%</span>';}
  function evBadge(ev){if(!ev)return '';return '<span class="ev-'+ev.color+'">'+ev.label+'</span>';}
  function avgHtml(avg){if(avg==null)return '';return '<span class="mchip-avg">均'+fmtNum(avg,2)+'</span>';}
  function chip(label,val,chgPct,stale,dp,ev,avg5y){
    const valStr=fmtNum(val,dp??2);
    const sub=(evBadge(ev)||avgHtml(avg5y))?'<span class="mchip-sub">'+evBadge(ev)+avgHtml(avg5y)+'</span>':'';
    return '<div class="mchip"><span class="mchip-label">'+label+'</span><span class="mchip-val'+(stale?' stale':'')+'">'+valStr+' '+chgHtml(chgPct)+'</span>'+sub+'</div>';
  }
  const h=snap.hsi||{},dow=snap.dow||{},d=snap.dxy||{},v=snap.vix||{},hp=snap.hsi_pe||{},sp=snap.spx_pe||{},sm=snap.spx_m2||{},fg=snap.fear_greed||{};
  bar.innerHTML=[
    chip('恒指', h.value, h.changePct, h.stale, 0),
    chip('道指', dow.value, dow.changePct, dow.stale, 0),
    chip('DXY', d.value, d.changePct, d.stale, 2),
    chip('VIX', v.value, v.changePct, v.stale, 2, v.eval),
    chip('港股P/E', hp.value, null, hp.stale, 2, hp.eval, hp.avg5y_mid),
    chip('美股P/E', sp.value, null, sp.stale, 2, sp.eval, sp.avg5y_mid),
    chip('SPX/M2', sm.value, null, sm.stale, 0, sm.eval),
    chip('恐懼貪婪', fg.value, fg.changePct, fg.stale, 0, fg.eval),
  ].join('');
}
function renderBreadth(snap){
  const card=document.getElementById('breadthCard');
  if(!card)return;
  if(!snap||!snap.breadth){card.style.display='none';return;}
  function row(lbl,b){
    if(!b||!b.count)return '';
    return '<div class="breadth-row">'
      +'<span class="breadth-lbl">'+lbl+'</span>'
      +'<span class="bs-hi" style="flex-shrink:0;font-size:10px">高'+b.high+'%</span>'
      +'<div class="breadth-bar">'
        +'<div class="bs-h" style="width:'+b.high+'%"></div>'
        +'<div class="bs-m" style="width:'+b.mid+'%"></div>'
        +'<div class="bs-l" style="width:'+b.low+'%"></div>'
      +'</div>'
      +'<span class="bs-lo" style="flex-shrink:0;font-size:10px">低'+b.low+'%</span>'
      +'<span class="bs-n" style="font-size:10px">(n='+b.count+')</span>'
    +'</div>';
  }
  const rows=row('港股',snap.breadth.hk)+row('美股',snap.breadth.us);
  if(!rows){card.style.display='none';return;}
  document.getElementById('breadthRows').innerHTML=rows;
  card.style.display='';
}

// --- IPO section ---
function renderIPO(){
  const card=document.getElementById('ipoCard');
  const body=document.getElementById('ipoBody');
  const count=document.getElementById('ipoCount');
  if(!card||!body)return;
  const stocks={};
  techSignalMap.forEach((signals,code)=>{
    signals.forEach(function(s){
      if(!s.label)return;
      if(s.label.indexOf('IPO首日高突破')>=0){
        if(!stocks[code]) stocks[code]={code,stock:allStocks.find(x=>x.c===code),badges:[]};
        stocks[code].badges.push('high');
      }else if(s.label.indexOf('IPO首日開突破')>=0){
        if(!stocks[code]) stocks[code]={code,stock:allStocks.find(x=>x.c===code),badges:[]};
        stocks[code].badges.push('open');
      }
    });
  });
  const codes=Object.keys(stocks);
  if(!codes.length){card.style.display='none';return;}
  body.innerHTML=codes.map(function(c){
    const s=stocks[c];
    const name=s.stock?esc(s.stock.n):'';
    const badges=s.badges.map(function(t){
      const cls=t==='high'?'badge badge-high':'badge badge-open';
      return '<span class="'+cls+'">🚀'+(t==='high'?'高突破':'開突破')+'</span>';
    }).join(' ');
    return '<tr><td><span class="code">'+esc(c)+'</span>'+(name?'<div class="name">'+name+'</div>':'')+'</td>'
      +'<td>'+badges+'</td></tr>';
  }).join('');
  count.textContent=codes.length+'股';
  card.style.display='';
}

// --- Recent announcements ---
function renderRecent(recentCorps){
  if(!recentCorps||!recentCorps.length){
    document.getElementById('recentWrap').innerHTML='<div style="padding:12px;color:var(--mute);text-align:center;font-size:12px">暫無公告</div>';
    return;
  }
  const items = recentCorps.map(r=>{
    const shortDate = r.date ? r.date.slice(5) : '—';
    const codeBlock = r.code?'<span class="ra-code">'+esc(r.code)+'</span>'+(r.name?'<span class="ra-name">'+esc(r.name)+'</span>':''):'<span class="muted">—</span>';
    const linkHtml = r.url?'<a class="ra-link" href="'+esc(r.url)+'" target="_blank" rel="noopener">HKEX</a>':'';
    return '<li class="ra-item"><span class="ra-label"><span class="cpill cpill-'+r.type+'">'+esc(r.typeLabel||'公告')+'</span></span><span class="ra-date" title="'+esc(r.date||'')+'">'+esc(shortDate)+'</span><span class="ra-stk">'+codeBlock+'</span>'+linkHtml+'</li>';
  }).join('');
  document.getElementById('recentWrap').innerHTML = '<ul class="ra-list">'+items+'</ul>';
}

// --- main load ---
async function loadData(){
  const dot=document.getElementById('statusDot');
  const upd=document.getElementById('updatedAt');
  dot.className='dot loading';
  upd.textContent='載入中…';
  try{
    const res=await fetch('./ccass.json?_='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    allStocks=data.stocks||[];
    renderSummaryBar(data);
    applyFilters();

    // Fetch market.json
    fetch('./market.json?_='+Date.now())
      .then(r=>r.ok?r.json():null)
      .then(m=>{renderMarket(m);renderBreadth(m);})
      .catch(()=>{});

    // Fetch GAS
    fetch(GAS_URL+'?format=json')
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        if(d&&d.groups){
          // Merge GAS data into localStorage cache (9-month retention)
          const cache=pruneCorpCache();
          d.groups.forEach(g=>{
            const ct=g.corpTypes||{};
            const code=String(g.code||"").padStart(5,"0");
            ['placement','rights','increase','block'].forEach(t=>{
              if(ct[t]&&ct[t].link){
                const date=extractDateFromLink(ct[t].link);
                if(date){
                  if(!cache[code]) cache[code]={};
                  const existing=cache[code][t];
                  if(!existing||date>existing.date)
                    cache[code][t]={count:ct[t].count,link:ct[t].link,date};
                }
              }
            });
          });
          saveCorpCache(cache);

          // Build signalMap from cache (fresh + historical within 9mo)
          signalMap.clear();
          priceMap.clear();
          chartMap.clear();
          hkexLinkMap.clear();
          techSignalMap.clear();
          d.groups.forEach(g=>{
            const ct=g.corpTypes||{};
            const code=String(g.code||"").padStart(5,"0");
            const e=cache[code]||{};
            signalMap.set(code,{
              pl:!!ct.placement,ri:!!ct.rights,inc:!!ct.increase,bl:!!ct.block,
              plDate:e.placement?.date||null,riDate:e.rights?.date||null,
              plCount:e.placement?.count||0,riCount:e.rights?.count||0,
              incCount:e.increase?.count||0,blCount:e.block?.count||0,
            });
            // New Maps
            priceMap.set(code, g.latestPrice);
            chartMap.set(code, g.chartImageUrl||'');
            hkexLinkMap.set(code, g.hkexLink||'');
            techSignalMap.set(code, g.signals||[]);
          });
          // Also add cache-only codes not in fresh GAS response
          Object.keys(cache).forEach(code=>{
            if(!signalMap.has(code)){
              const e=cache[code];
              signalMap.set(code,{
                pl:!!e.placement,ri:!!e.rights,inc:!!e.increase,bl:!!e.block,
                plDate:e.placement?.date||null,riDate:e.rights?.date||null,
                plCount:e.placement?.count||0,riCount:e.rights?.count||0,
                incCount:e.increase?.count||0,blCount:e.block?.count||0,
              });
            }
          });
          // Signal summary count
          const techCodes=new Set(d.groups.filter(g=>(g.signals||[]).length>0).map(g=>String(g.code||"").padStart(5,"0")));
          const card=document.getElementById('signalSummaryCard');
          if(card) card.innerHTML='<span style="color:var(--text-soft)">技術信號: <b>'+techCodes.size+'</b> 隻股票</span>';
        }
        renderSummaryBar(data);
        renderIPO();
        renderRecent(d?.recentCorps||[]);
        applyFilters();
      }).catch(()=>{});
    dot.className='dot';
    upd.textContent='更新於 '+data.updated;
  }catch(err){
    dot.className='dot error';
    upd.textContent='載入失敗';
    document.querySelector('.card').innerHTML='<div class="loading-msg" style="color:#ef4444">載入失敗：'+esc(err.message)+'<br><small>請稍後重試</small></div>';
  }
}
loadData();
