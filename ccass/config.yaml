# CCASS Tracker 配置

universe: all_hk    # 全港股 ~2700 隻

scraping:
  # --- delay between stock requests -----------------------------------------
  # 3-8s between successful requests. Anti-blocking cooldown system handles
  # the rest — escalating pauses (5→10→20 min) when Akamai blocks, plus
  # batch breaks every ~60 stocks (30-90s coffee break).
  # Override via env: CCASS_DELAY_MIN / CCASS_DELAY_MAX
  delay_min_seconds: 3.0
  delay_max_seconds: 8.0

  timeout_seconds: 30
  max_retries: 2
  retry_backoff_base: 2
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  # parallel_workers is managed by parallel_backfill.py, not used by sequential runner
  parallel_workers: 1

  # --- Anti-blocking (v2 — May 2026) ----------------------------------------
  # These are hardcoded constants in scraper.py. Listed here for visibility.
  #
  # Cooldown tiers when Akamai blocks:
  #   Tier 1: 5-10 min  (first block)
  #   Tier 2: 10-20 min (second block)
  #   Tier 3: 20-30 min (third+ block)
  #
  # Batch breaks: after every ~60 successful stocks, pause 30-90s
  # Warning threshold: 5/12 bad → extra 5-10s pause preemptively
  # Abort threshold:  7/12 bad → enter cooldown (NOT RuntimeError anymore!)
  #
  # Key change from v1: Once blocked, scraper enters cooldown + rotates
  # browser session (new cookies, new fingerprint, new UA). After cooldown,
  # outcome window resets — no more wasting hours on already-blocked sessions.

  # --- User agent rotation pool (hardcoded in scraper.py) -------------------
  # 6 rotating Chrome UAs (Win/Mac, Chrome 123-125 + Edge)

trend_windows: [5, 20]

alerts:
  spike_threshold_pct: 5.0       # 5日 total_pct 變化 ≥ 呢個 trigger
  consecutive_days: 3            # 連續 N 日同方向
  consecutive_min_daily_pct: 1.0 # 每日 ≥ 呢個 % 先計
  max_alerts_per_batch: 20
  telegram_throttle_seconds: 3
  summary_only_threshold: 50

logging:
  level: INFO
  retention_days: 30
  dir: logs

database:
  path: ccass.db
  backup_dir: backups
