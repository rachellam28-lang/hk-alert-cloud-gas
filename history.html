<!doctype html>
<html lang="zh-HK"><head>
<meta name="robots" content="noindex, nofollow">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=0.5,maximum-scale=5,user-scalable=yes">
<title>訊號歷史 — 港股訊號儀表板</title>
<style>
:root{--bg:#f5f7fa;--surface:#fff;--surface-soft:#f8fafc;--text:#0f172a;--text-soft:#334155;--mute:#64748b;--mute-2:#94a3b8;--line:#e2e8f0;--line-soft:#eef1f6;--primary:#0284c7;--primary-soft:#e0f2fe;--primary-border:#bae6fd;--up:#15803d;--up-soft:#dcfce7;--up-border:#86efac;--down:#b91c1c;--down-soft:#fee2e2;--down-border:#fca5a5;--violet:#6d28d9;--violet-soft:#ede9fe;--violet-border:#c4b5fd;--amber:#b45309;--amber-soft:#fef3c7;--amber-border:#fcd34d;--radius:10px;--shadow:0 1px 2px rgba(15,23,42,.04)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 Inter,system-ui,"PingFang TC","Noto Sans TC",Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#0284c7,#0ea5e9);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.brand-title{font-size:14px;font-weight:600}.brand-sub{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:999px;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.dot.loading{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.18)}
.dot.error{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.18)}
.wrap{max-width:1200px;margin:0 auto;padding:18px 20px 40px}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.page-title{font-size:18px;font-weight:700;color:var(--text)}
.page-sub{font-size:12px;color:var(--mute);margin-top:2px}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px}
.input{background:var(--surface);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:8px;font:400 12.5px inherit;outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(2,132,199,.15)}
.input.search-in{min-width:220px;padding-left:30px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");background-repeat:no-repeat;background-position:10px center}
.btn-ghost{appearance:none;background:transparent;border:1px solid var(--line);color:var(--text-soft);padding:5px 10px;border-radius:8px;font:500 12px inherit;cursor:pointer}
.btn-ghost:hover{background:var(--surface-soft)}
.th-filter{appearance:none;-webkit-appearance:none;background:var(--surface);border:1px solid var(--line);color:var(--text-soft);font:500 12px/1.4 inherit;padding:5px 28px 5px 10px;border-radius:8px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5'><path d='M0 0L8 0L4 5Z' fill='%2364748b'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
.th-filter:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(2,132,199,.15)}
.loading-msg{text-align:center;padding:60px 20px;color:var(--mute)}
.day-section{margin-bottom:10px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden}
.day-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;background:var(--surface-soft);border-bottom:1px solid var(--line)}
.day-header:hover{background:var(--primary-soft)}
.day-date{font:700 13px "JetBrains Mono",ui-monospace,monospace;color:var(--text);font-variant-numeric:tabular-nums;min-width:90px}
.day-weekday{font-size:11px;color:var(--mute)}
.day-cnt{margin-left:auto;font-size:11px;color:var(--mute);background:var(--surface);border:1px solid var(--line);padding:2px 8px;border-radius:999px;font-variant-numeric:tabular-nums}
.day-arrow{font-size:10px;color:var(--mute-2);transition:transform .2s;margin-left:6px}
.day-header.collapsed .day-arrow{transform:rotate(-90deg)}
.day-body{overflow:hidden}
.day-body.collapsed{display:none}
table{width:100%;border-collapse:collapse;table-layout:auto}
thead th{background:var(--surface-soft);color:var(--mute);font-size:10px;text-align:left;padding:7px 12px;text-transform:uppercase;letter-spacing:.14em;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:8px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-soft)}
.code{font:600 12px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.name{font-size:11px;color:var(--mute);margin-top:1px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spill{display:inline-flex;align-items:center;background:var(--primary-soft);color:#075985;border:1px solid var(--primary-border);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
.cpill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
.cpill-placement{background:var(--down-soft);color:var(--down);border-color:var(--down-border)}
.cpill-increase{background:var(--up-soft);color:var(--up);border-color:var(--up-border)}
.cpill-rights{background:var(--violet-soft);color:var(--violet);border-color:var(--violet-border)}
.cpill-other{background:var(--surface-soft);color:var(--mute);border-color:var(--line)}
.time-cell{font:500 11px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;color:var(--mute);white-space:nowrap}
.msg-cell{font-size:11px;color:var(--text-soft);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lnk{display:inline-flex;padding:2px 7px;border-radius:5px;border:1px solid var(--line);background:var(--surface);font:600 9px inherit;color:var(--text-soft);text-decoration:none;white-space:nowrap}
.lnk:hover{border-color:var(--primary-border);background:var(--primary-soft);color:var(--primary);text-decoration:none}
.foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);text-align:center;color:var(--mute-2);font-size:11px}
.empty{text-align:center;color:var(--mute);padding:40px 16px;font-size:13px}
.no-results{text-align:center;padding:40px 20px;color:var(--mute);font-size:13px}
@media(max-width:720px){.msg-cell{display:none}thead th:nth-child(4){display:none}.input.search-in{min-width:140px}}
@media(max-width:520px){.time-cell{display:none}thead th:nth-child(5){display:none}}
@media(max-width:640px){.site-nav{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px 8px;gap:6px}.site-nav a{flex:0 0 auto}.topbar-inner{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}.page-head{margin-bottom:10px}.toolbar{gap:6px;padding:8px 10px}.loading-msg,.empty,.no-results{padding:24px 12px}}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--surface-soft:#162032;--text:#f1f5f9;--text-soft:#cbd5e1;--mute:#64748b;--mute-2:#475569;--line:#334155;--line-soft:#1e293b;--primary:#38bdf8;--primary-soft:#0c2d44;--primary-border:#0369a1;--up:#4ade80;--up-soft:#052e16;--up-border:#166534;--down:#f87171;--down-soft:#2d0a0a;--down-border:#991b1b;--violet:#a78bfa;--violet-soft:#1e1040;--violet-border:#5b21b6;--amber:#fbbf24;--amber-soft:#1c0f00;--amber-border:#92400e}.topbar{background:rgba(15,23,42,.92)}}
.site-nav{display:flex;flex-wrap:wrap;gap:6px 12px;padding:8px 12px;background:#0f172a;border-bottom:1px solid #1e293b;font-size:13px}
.site-nav a{color:#94a3b8;text-decoration:none;white-space:nowrap}
.site-nav a:hover{color:#e2e8f0}
.site-nav a.active{color:#38bdf8;font-weight:600}
.status-loading,.status-error,.status-empty{padding:24px;text-align:center;border-radius:8px;font-size:14px;color:#94a3b8}
.status-error{background:#1e0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.status-loading{background:#0f172a}
.status-empty{background:#0f1a2e}
</style>
</head><body>
  <nav class="site-nav" id="sharedSiteNav"></nav>

<header class="topbar"><div class="topbar-inner">
  <div class="brand">
    <div class="logo"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg></div>
    <div><div class="brand-title">訊號歷史</div><div class="brand-sub">港股訊號 · 歷史回顧</div></div>
  </div>
  <div class="topright">
    <span class="dot loading" id="statusDot"></span>
    <span id="updatedAt">載入中…</span>
  </div>
</div></header>

<main class="wrap">
  <div class="page-head">
    <div>
      <div class="page-title">每日訊號 / 公告歷史</div>
      <div class="page-sub">按日期分組，最新在最前 · 技術信號 + 披露易公告</div>
    </div>
  </div>
  <div class="toolbar">
    <input id="q" class="input search-in" type="search" placeholder="搜尋代號 / 名稱…" autocomplete="off">
    <select id="sigFilter" class="th-filter">
      <option value="all">訊號：全部</option>
      <option value="poc3">半年+12月+3年POC</option>
      <option value="poc_half">半年POC</option>
      <option value="yearopen">年開突破</option>
      <option value="fvg">FVG</option>
      <option value="hkdata_up">Market增持</option>
      <option value="hkdata_dn">Market減持</option>
      <option value="placement">配股</option>
      <option value="rights">供股</option>
    </select>
    <input id="dFrom" class="input" type="date" title="由日期" style="font-family:monospace;font-size:12px">
    <input id="dTo" class="input" type="date" title="至日期" style="font-family:monospace;font-size:12px">
    <button class="btn-ghost" id="clearBtn">清除</button>
    <span id="matchCount" style="font-size:11px;color:var(--mute);margin-left:4px"></span>
  </div>
  <div id="historyRoot"><div class="loading-msg">載入訊號歷史…</div></div>
  <div class="foot">
    更新於：<span id="historyFooterUpdated">載入中…</span><br>
    數據來源：data/history.json（自家歷史記錄）
  </div>
</main>

<script src="./shared-nav.js"></script>
<script>
function showLoading(el,msg){
  if(!el)return;
  el.innerHTML='<div class="status-loading">⏳ '+(msg||'載入中…')+'</div>';
}
function showError(el,err,retryFn){
  if(!el)return;
  const retryBtn = retryFn
    ? '<button onclick="('+retryFn.toString()+')()" style="margin-top:8px;padding:4px 12px;cursor:pointer">🔄 重試</button>'
    : '';
  el.innerHTML='<div class="status-error">❌ 載入失敗：'+String(err)+'<br>'+retryBtn+'</div>';
}
function showEmpty(el,msg){
  if(!el)return;
  el.innerHTML='<div class="status-empty">'+(msg||'暫無數據')+'</div>';
}

(function(){
// (GAS removed — using local data/history.json)
const root = document.getElementById('historyRoot');
const dot  = document.getElementById('statusDot');
const upd  = document.getElementById('updatedAt');
const qEl  = document.getElementById('q');
const sfEl = document.getElementById('sigFilter');
const dFrom= document.getElementById('dFrom');
const dTo  = document.getElementById('dTo');
const clrBtn=document.getElementById('clearBtn');
const cntEl= document.getElementById('matchCount');

let allDays = [];

function safeSig(a) {
  var s = a.signal;
  if (!s) return '';
  if (Array.isArray(s)) return s.map(function(x){
    if (x == null) return '';
    if (typeof x==='object') return x.label || x.type || '';
    var v = String(x).trim();
    return (v === 'null' || v === 'undefined' || v === 'NaN') ? '' : v;
  }).filter(Boolean).join(' ');
  if (typeof s === 'object') return s.label || s.type || s.name || '';
  var v = String(s).trim();
  return (v === 'null' || v === 'undefined' || v === 'NaN') ? '' : v;
}

function matchSigType(a, sigType) {
  if (!sigType || sigType === 'all') return true;
  const sig  = safeSig(a).toLowerCase();
  const tags = (Array.isArray(a.tags) ? a.tags.join(',') : (typeof a.tags === 'string' ? a.tags : '')).toLowerCase();
  const cat  = (a.category || '');
  const blob = sig + ' ' + tags;
  if (sigType === 'poc3')     return blob.includes('3年');
  if (sigType === 'poc_half') return blob.includes('半年poc');
  if (sigType === 'yearopen') return blob.includes('年開突破');
  if (sigType === 'fvg')      return blob.includes('fvg');
  if (sigType === 'hkdata_up') return blob.includes('hkdata增持');
  if (sigType === 'hkdata_dn') return blob.includes('hkdata減持');
  if (sigType === 'placement') return cat === 'corp_action' && (blob.includes('配股') || blob.includes('配售'));
  if (sigType === 'rights')    return cat === 'corp_action' && blob.includes('供股');
  return true;
}

const WEEKDAY = ['日','一','二','三','四','五','六'];

function fmtTime(s) {
  if (s == null) return '';
  const v = String(s).trim();
  if (!v || v === 'null' || v === 'undefined' || v === 'NaN') return '';
  try {
    const d = new Date(v);
    if (isNaN(d.getTime())) return v;
    const p = n => n < 10 ? '0'+n : n;
    return p(d.getHours()) + ':' + p(d.getMinutes());
  } catch(e) { return v; }
}

function weekday(dateStr) {
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return '星期' + WEEKDAY[d.getDay()];
  } catch(e) { return ''; }
}

function pillHtml(a) {
  const sig  = safeSig(a).trim();
  const cat  = (a.category || '').trim();
  const tags = (Array.isArray(a.tags) ? a.tags.join(',') : (typeof a.tags === 'string' ? a.tags : '')).toLowerCase();
  const blob = sig + ' ' + tags;
  let cls = 'spill';
  if (cat === 'corp_action') {
    if (/配股|配售|認購/.test(blob))          cls = 'cpill cpill-placement';
    else if (/增持/.test(blob))               cls = 'cpill cpill-increase';
    else if (/供股|公開發售/.test(blob))       cls = 'cpill cpill-rights';
        else                                      cls = 'cpill cpill-other';
  }
  const label = sig || cat || '訊號';
  return '<span class="' + cls + '">' + esc(label) + '</span>';
}

function cleanText(s) {
  if (s == null) return '';
  const v = String(s).trim();
  return (v === 'null' || v === 'undefined' || v === 'NaN') ? '' : v;
}
function esc(s) {
  return cleanText(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function renderDay(day, filter, sigType) {
  const alerts = day.alerts.filter(a => {
    if (!matchSigType(a, sigType)) return false;
    if (!filter) return true;
    const f = filter.toLowerCase();
    return (a.code||'').toLowerCase().includes(f)
        || (a.name||'').toLowerCase().includes(f)
        || safeSig(a).toLowerCase().includes(f)
        || (a.message||'').toLowerCase().includes(f);
  });
  if (!alerts.length) return '';

  // Dedup: keep entry with more detail
  var seen = {};
  var deduped = [];
  alerts.forEach(function(a){
    var key = (a.code||'') + '|' + safeSig(a);
    var prev = seen[key];
    if (!prev) { seen[key] = a; deduped.push(a); }
    else if ((!prev.message && a.message) || (!prev.created_at && a.created_at)) {
      var idx = deduped.indexOf(prev);
      if (idx >= 0) { seen[key] = a; deduped[idx] = a; }
    }
  });

  var rows = deduped.map(function(a) {
    const code = a.code || '';
    const name = a.name || '';
    const t    = fmtTime(a.created_at);
    const msg  = a.message || '';
    const url  = a.chart_url || '';
    const linkHtml = url
      ? '<a class="lnk" href="' + esc(url) + '" target="_blank" rel="noopener">查看</a>'
      : '<span style="color:var(--mute-2)">—</span>';
    return '<tr>'
      + '<td><div class="code">' + esc(code) + '</div>'
      +       (name ? '<div class="name">' + esc(name) + '</div>' : '') + '</td>'
      + '<td>' + pillHtml(a) + '</td>'
      + '<td class="msg-cell">' + esc(msg) + '</td>'
      + '<td class="time-cell">' + esc(t) + '</td>'
      + '<td>' + linkHtml + '</td>'
      + '</tr>';
  }).join('');

  return '<div class="day-section" data-date="' + esc(day.date) + '">'
    + '<div class="day-header" onclick="toggleDay(this)">'
    +   '<span class="day-date">' + esc(day.date) + '</span>'
    +   '<span class="day-weekday">' + weekday(day.date) + '</span>'
    +   '<span class="day-cnt">' + alerts.length + ' 條</span>'
    +   '<span class="day-arrow">▼</span>'
    + '</div>'
    + '<div class="day-body">'
    +   '<table><thead><tr>'
    +     '<th>代號 / 名稱</th><th>訊號 / 類型</th><th>備注</th><th>時間</th><th>連結</th>'
    +   '</tr></thead><tbody>' + rows + '</tbody></table>'
    + '</div></div>';
}

function render(filter, sigType, fromDate, toDate) {
  let html = '';
  let total = 0;
  let daysShown = 0;
  allDays.forEach(day => {
    if (fromDate && day.date < fromDate) return;
    if (toDate   && day.date > toDate)   return;
    const s = renderDay(day, filter, sigType);
    if (s) {
      total += day.alerts.filter(a => {
        if (!matchSigType(a, sigType)) return false;
        if (!filter) return true;
        const f = filter.toLowerCase();
        return (a.code||'').toLowerCase().includes(f)||(a.name||'').toLowerCase().includes(f)
              ||safeSig(a).toLowerCase().includes(f)||(a.message||'').toLowerCase().includes(f);
      }).length;
      html += s; daysShown++;
    }
  });
  if (!html) html = '<div class="no-results">沒有符合條件的訊號</div>';
  root.innerHTML = html;
  const hasFilter = filter || (sigType && sigType !== 'all') || fromDate || toDate;
  cntEl.textContent = hasFilter
    ? daysShown + ' 天 · ' + total + ' 條訊號'
    : allDays.length + ' 天 · ' + allDays.reduce(function(s,d){return s+(d.alerts?d.alerts.length:0);},0) + ' 條訊號';
}

function applyFilter() {
  render((qEl.value||'').trim(), sfEl.value||'all', dFrom.value||'', dTo.value||'');
}

window.toggleDay = function(hdr) {
  hdr.classList.toggle('collapsed');
  const body = hdr.nextElementSibling;
  if (body) body.classList.toggle('collapsed');
};

qEl.addEventListener('input', applyFilter);
sfEl.addEventListener('change', applyFilter);
dFrom.addEventListener('change', applyFilter);
dTo.addEventListener('change', applyFilter);
clrBtn.addEventListener('click', function(){
  qEl.value=''; sfEl.value='all'; dFrom.value=''; dTo.value='';
  applyFilter();
});

// SW Kill Switch — unregister any stale Service Worker on load
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  }).catch(() => {});
}

async function load() {
  try {
    dot.className = 'dot loading';
    const res = await fetch('./data/history.json?_=v2_'+Date.now(), {cache:'no-store'});
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'GAS error');
    // 港股歷史頁：排除美股信號
    allDays = (data.days || []).map(day => ({
      ...day,
      alerts: day.alerts.filter(a => a.category !== 'us_corp' && a.market !== 'US' && !(a.tags||'').includes('美股'))
    })).filter(day => day.alerts.length > 0);
    dot.className = 'dot';
    const updatedLabel = data.updated || data.updatedAt || '—';
    upd.textContent = '更新於 ' + updatedLabel + ' · 共 ' + allDays.length + ' 天 · ' + (data.total||0) + ' 條記錄';
    const footerUpd = document.getElementById('historyFooterUpdated');
    if (footerUpd) footerUpd.textContent = updatedLabel;
    render('', '', '');
  } catch(e) {
    dot.className = 'dot error';
    upd.textContent = '載入失敗';
    root.innerHTML = '<div class="no-results">載入失敗：' + esc(String(e)) + '</div>';
  }
}

load();
})();
</script>
<script>
document.querySelectorAll('.site-nav a').forEach(a => {
  if(location.pathname.endsWith(a.getAttribute('href').replace('./',''))) {
    a.classList.add('active');
  }
});
</script>
</body></html>
