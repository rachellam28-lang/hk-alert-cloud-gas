<!doctype html>
<html lang="zh-HK"><head>
<meta name="robots" content="noindex, nofollow">

<title>美股訊號儀表板</title>
<style>
:root{--bg:#f5f7fa;--surface:#fff;--surface-soft:#f8fafc;--text:#0f172a;--text-soft:#334155;--mute:#64748b;--mute-2:#94a3b8;--line:#e2e8f0;--line-soft:#eef1f6;--primary:#0284c7;--primary-soft:#e0f2fe;--primary-border:#bae6fd;--up:#15803d;--up-soft:#dcfce7;--up-border:#86efac;--down:#b91c1c;--down-soft:#fee2e2;--down-border:#fca5a5;--violet:#6d28d9;--violet-soft:#ede9fe;--violet-border:#c4b5fd;--amber:#b45309;--amber-soft:#fef3c7;--amber-border:#fcd34d;--radius:10px;--shadow:0 1px 2px rgba(15,23,42,.04)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 Inter,system-ui,"PingFang TC","Noto Sans TC",Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1440px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.brand-title{font-size:14px;font-weight:600}.brand-sub{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:999px;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.dot.loading{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.18)}
.dot.error{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.18)}
.refresh-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:11px;color:var(--text-soft)}
.wrap{max-width:1440px;margin:0 auto;padding:18px 20px 36px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:20px 0 10px}
.section-head h2{margin:0;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.ico{display:inline-flex;width:18px;height:18px;border-radius:6px;background:var(--primary-soft);color:var(--primary);align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.tlabel{font-size:13px;font-weight:600}
.summary{display:flex;flex-wrap:wrap;gap:6px}
.cnt{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--mute);padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:var(--surface-soft)}
.cnt b{font-weight:600;font-variant-numeric:tabular-nums}
.cnt.placement{border-color:var(--down-border);background:var(--down-soft);color:var(--down)}.cnt.placement b{color:var(--down)}
.cnt.increase{border-color:var(--up-border);background:var(--up-soft);color:var(--up)}.cnt.increase b{color:var(--up)}
.cnt.rights{border-color:var(--violet-border);background:var(--violet-soft);color:var(--violet)}.cnt.rights b{color:var(--violet)}
.spacer{flex:1}
.tabs{display:inline-flex;gap:2px;padding:3px;background:#eef2f7;border-radius:8px}
.tab{appearance:none;background:transparent;border:0;color:var(--text-soft);padding:5px 12px;border-radius:6px;font:500 12px inherit;cursor:pointer;transition:background .15s}
.tab:hover{color:var(--text)}.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(15,23,42,.06);font-weight:600}
.search{display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap}
.input{background:var(--surface);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:8px;font:400 12.5px inherit;outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(2,132,199,.15)}
.input.search-in{min-width:200px}
.btn-ghost{appearance:none;background:transparent;border:1px solid var(--line);color:var(--text-soft);padding:5px 10px;border-radius:8px;font:500 12px inherit;cursor:pointer}
.btn-ghost:hover{background:var(--surface-soft)}
table{width:100%;border-collapse:collapse;table-layout:auto}
thead th{background:var(--surface-soft);color:var(--mute);font-size:10px;text-align:left;padding:9px 14px;text-transform:uppercase;letter-spacing:.14em;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:10px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--surface-soft)}
th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--text);background:var(--primary-soft)}
th.sort-active{color:var(--primary)}.sort-icon{margin-left:4px;font-size:9px}
.cell-code{min-width:110px}.code{font:600 13px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.name{font-size:12px;color:var(--mute);margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-price{width:90px;white-space:nowrap}.pv{font:600 13px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.cell-pills{min-width:200px}
.spill{display:inline-flex;align-items:center;gap:4px;background:var(--primary-soft);color:#075985;border:1px solid var(--primary-border);font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;margin:1px 3px 1px 0;line-height:1.5;white-space:nowrap}
.spill-poc{background:var(--violet-soft);color:var(--violet);border-color:var(--violet-border)}
.spill-fvg{background:var(--up-soft);color:var(--up);border-color:var(--up-border)}
.spill-yearopen{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
.spill-ipo{background:linear-gradient(135deg,var(--amber-soft),#fff7ed);color:#b45309;border-color:#fcd34d}
.spill-date{font-size:10px;font-weight:500;opacity:.7;font-variant-numeric:tabular-nums}
.splink{text-decoration:none}
.cpillrow{margin-top:4px;display:flex;flex-wrap:wrap;gap:3px}
.cpill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;line-height:1.5;border:1px solid transparent}
.cpill em{font-style:normal;font-weight:600;margin-left:3px;opacity:.85}
.cpill-placement{background:var(--down-soft);color:var(--down);border-color:var(--down-border)}
.cpill-increase{background:var(--up-soft);color:var(--up);border-color:var(--up-border)}
.cpill-rights{background:var(--violet-soft);color:var(--violet);border-color:var(--violet-border)}
.cpill-other{background:var(--surface-soft);color:var(--mute);border-color:var(--line)}
.cell-time{color:var(--mute);font:500 12px "JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;white-space:nowrap}
.cell-link{font-size:12px;white-space:nowrap}
.lnk{display:inline-flex;padding:3px 8px;border-radius:6px;border:1px solid var(--line);background:var(--surface);font:600 10px inherit;color:var(--text-soft);text-decoration:none}
.lnk:hover{border-color:var(--violet-border);background:var(--violet-soft);color:var(--violet);text-decoration:none}
.muted{color:var(--mute-2)}
.empty{text-align:center;color:var(--mute);padding:40px 16px;font-size:13px}
.foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);text-align:center;color:var(--mute-2);font-size:11px}
.loading-msg{text-align:center;padding:60px 20px;color:var(--mute);font-size:14px}
.section-toggle{appearance:none;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:0;width:100%;text-align:left}
.section-toggle h2{margin:0;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.toggle-arrow{font-size:10px;color:var(--mute-2);transition:transform .2s;margin-left:4px}
.section-toggle.collapsed .toggle-arrow{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:height .2s ease}

/* Holdings card (US version of Market) */
.hold-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px}
.hold-head{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.hold-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.hold-cols{grid-template-columns:1fr}}
.hold-col-head{font-size:10px;font-weight:600;margin-bottom:4px}
.hold-col-head.up{color:#16a34a}.hold-col-head.dn{color:#dc2626}
.hold-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line-soft);font-size:12px}
.hold-row:last-child{border-bottom:none}
.hold-name{color:var(--text-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.hold-conc{font-size:10px;color:var(--mute-2);white-space:nowrap;margin:0 6px;flex-shrink:0}
.hold-delta{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.hold-delta.up{color:#16a34a}.hold-delta.dn{color:#dc2626}
.hold-sub{font-size:9px;color:var(--mute-2);margin-left:4px}

/* Market chips */
.mbar{display:flex;gap:12px;flex-wrap:wrap;padding:8px 0 12px;margin-bottom:4px}
.mchip{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:110px;flex:1;gap:3px}
.mchip-label{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em}
.mchip-val{font-size:17px;font-weight:700;color:var(--text);text-align:center}
.mchip-val.stale{color:var(--mute)}
.mchip-sub{font-size:9px;margin-top:1px;display:flex;align-items:center;gap:4px}
.mchip-avg{color:var(--mute)}
.ev-green{background:var(--up-soft);color:var(--up);border:1px solid var(--up-border);border-radius:4px;padding:1px 5px;font-weight:600}
.ev-neutral{background:var(--surface-soft);color:var(--mute);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-weight:600}
.ev-orange{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber-border);border-radius:4px;padding:1px 5px;font-weight:600}
.ev-red{background:var(--down-soft);color:var(--down);border:1px solid var(--down-border);border-radius:4px;padding:1px 5px;font-weight:600}

.breadth-head{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.breadth-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}.breadth-row:last-child{margin-bottom:0}
.breadth-lbl{font-size:11px;font-weight:600;color:var(--text-soft);width:28px;flex-shrink:0}
.breadth-bar{flex:1;height:12px;border-radius:6px;overflow:hidden;display:flex;background:var(--surface-soft)}
.bs-h{background:#16a34a}.bs-m{background:#94a3b8}.bs-l{background:#dc2626}
.breadth-stats{font-size:10px;white-space:nowrap;display:flex;gap:5px}
.bs-hi{color:#16a34a;font-weight:600}.bs-lo{color:#dc2626;font-weight:600}.bs-n{color:var(--mute-2)}

@media(max-width:720px){.cell-price,thead th:nth-child(2){display:none}.cell-time,thead th:nth-child(4){display:none}.tabs{overflow-x:auto}.input.search-in{min-width:130px}}
@media(max-width:640px){.brand>a{font-size:11px!important;padding:2px 6px!important;margin-left:3px!important}}@media(max-width:520px){.topbar-inner{padding:6px 10px;gap:8px}.brand{gap:6px;flex-shrink:0}.brand>a{font-size:10px!important;padding:1px 5px!important;margin-left:2px!important}.logo{display:none}.brand-title{font-size:12px;white-space:nowrap}.brand-sub{display:none}.topright{gap:3px;font-size:10px}.refresh-tag{display:none}.topright span:last-child{font-size:9px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}}@media(max-width:400px){.topbar-inner{padding:4px 6px;gap:4px}.brand-title{font-size:11px}.brand>a{font-size:9px!important;padding:1px 4px!important}.topright span:last-child{font-size:8px;max-width:70px}}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--surface-soft:#162032;--text:#f1f5f9;--text-soft:#cbd5e1;--mute:#64748b;--mute-2:#475569;--line:#334155;--line-soft:#1e293b;--primary:#38bdf8;--primary-soft:#0c2d44;--primary-border:#0369a1;--up:#4ade80;--up-soft:#052e16;--up-border:#166534;--down:#f87171;--down-soft:#2d0a0a;--down-border:#991b1b;--violet:#a78bfa;--violet-soft:#1e1040;--violet-border:#5b21b6;--amber:#fbbf24;--amber-soft:#1c0f00;--amber-border:#92400e}.topbar{background:rgba(15,23,42,.92)}.tabs{background:#1e293b}.tab.active{background:#0f172a}}
.site-nav{display:flex;flex-wrap:wrap;gap:6px 12px;padding:8px 12px;background:#0f172a;border-bottom:1px solid #1e293b;font-size:13px}
.site-nav a{color:#94a3b8;text-decoration:none;white-space:nowrap}
.site-nav a:hover{color:#e2e8f0}
.site-nav a.active{color:#38bdf8;font-weight:600}
.status-loading,.status-error,.status-empty{padding:24px;text-align:center;border-radius:8px;font-size:14px;color:#94a3b8}
.status-error{background:#1e0a0a;border:1px solid #7f1d1d;color:#fca5a5}
.status-loading{background:#0f172a}
.status-empty{background:#0f1a2e}
</style>

<script>
function showLoading(el,msg){
  if(!el)return;
  el.innerHTML='<div class="status-loading">⏳ '+(msg||'載入中…')+'</div>';
}
function showError(el,err,retryFn){
  if(!el)return;
  const retryBtn = retryFn
    ? '<button onclick="('+retryFn.toString()+')()" style="margin-top:8px;padding:4px 12px;cursor:pointer">🔄 重試</button>'
    : '';
  el.innerHTML='<div class="status-error">❌ 載入失敗：'+String(err)+'<br>'+retryBtn+'</div>';
}
function showEmpty(el,msg){
  if(!el)return;
  el.innerHTML='<div class="status-empty">'+(msg||'暫無數據')+'</div>';
}

// (GAS removed — using local data)
const REFRESH_MS = 600000;

function toggleSection(id, btn) {
  const body = document.getElementById('body-' + id);
  const key = 'us_sec_collapsed_' + id;
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  btn.classList.toggle('collapsed', !collapsed);
  try { localStorage.setItem(key, collapsed ? '0' : '1'); } catch(e) {}
}
(function initSections() {
  ['signals'].forEach(function(id) {
    try {
      if (localStorage.getItem('us_sec_collapsed_' + id) === '1') {
        const body = document.getElementById('body-' + id);
        const btn = document.getElementById('toggle-' + id);
        if (body) body.style.display = 'none';
        if (btn) btn.classList.add('collapsed');
      }
    } catch(e) {}
  });
})();

// Normalize nullish/sentinel values before HTML escaping.
function cleanText(s){
  if(s==null) return '';
  const v=String(s).trim();
  return (v==='null'||v==='undefined'||v==='NaN') ? '' : v;
}
function esc(s){
  return cleanText(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function fmtTime(s){ const v=cleanText(s); if(!v)return'—'; try{ const d=new Date(v);if(isNaN(d))return v;const p=n=>n<10?'0'+n:''+n;return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }catch(e){return v;} }
function fmtDate(s){ const v=cleanText(s); if(!v)return'—'; try{ const d=new Date(v);if(isNaN(d))return v;const p=n=>n<10?'0'+n:''+n;return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }catch(e){return v;} }

function renderRow(g, wl){
  const codeStr = g.code||g.symbol||'';
  const lastTime = fmtTime(g.latestRaw);
  const lastDate = fmtDate(g.latestRaw);
  const price = g.latestPrice;
  const priceHtml = price ? `<span class="pv">${esc((price<1?price.toFixed(3):price.toFixed(2)))}</span>` : '<span class="muted">—</span>';

   function sigType(lbl){
     if(!lbl)return'';
     if(lbl.indexOf('POC')>=0)return'poc';if(lbl.indexOf('FVG')>=0)return'fvg';
     if(lbl.indexOf('年開')>=0)return'yearopen';if(lbl.indexOf('IPO')>=0)return'ipo';
     return'';
   }
   const sigPills = (g.signals||[]).slice(0,4).map(s=>{
     const dateStr = s.date ? '<span class="spill-date">'+fmtDate(s.date).slice(5)+'</span>' : '';
     const t=sigType(s.label),cls='spill'+(t?' spill-'+t:'');
     const body=`<span class="${cls}">${esc(s.label)}${dateStr}</span>`;
     return s.link?`<a class="splink" href="${esc(s.link)}" target="_blank" rel="noopener">${body}</a>`:body;
  }).join(' ');

  const corpOrder=['placement','increase','rights','other'];
  const corpPills = corpOrder.filter(t=>g.corpTypes&&g.corpTypes[t]).map(t=>{
    const c=g.corpTypes[t];
    const body=`<span class="cpill cpill-${t}">${corpLabel(t)}${c.count>1?` <em>×${c.count}</em>`:''}</span>`;
    return c.link?`<a class="cplink" href="${esc(c.link)}" target="_blank" rel="noopener">${body}</a>`:body;
  }).join(' ');

  const firstSig = (g.signals&&g.signals[0])?g.signals[0].label:(corpOrder.find(t=>g.corpTypes&&g.corpTypes[t])?corpLabel(corpOrder.find(t=>g.corpTypes&&g.corpTypes[t])):'');
  const hasCorp = g.corpCount>0?'1':'0';
  const rowCount = (g.techCount||0)+(g.corpCount||0);
  const secLnk = g.hkexLink||g.sourceUrl?`<a class="lnk" href="${esc(g.hkexLink||g.sourceUrl)}" target="_blank" rel="noopener" title="SEC EDGAR">SEC</a>`:'';
  const tvLnk = `<a class="lnk" href="https://www.tradingview.com/chart/?symbol=${esc(codeStr)}" target="_blank" rel="noopener" title="TradingView">TV</a>`;
  const saved = wl&&wl.has(codeStr);
  const saveBtn = `<button class="btn-save${saved?' saved':''}" data-code="${esc(codeStr)}" data-name="${esc(g.name||'')}" data-signal="${esc(firstSig)}" data-date="${esc(lastDate)}" title="加入自選">${saved?'★':'☆'}</button>`;

  return `<tr class="urow" data-code="${esc(codeStr)}" data-name="${esc(g.name||'')}" data-date="${esc(lastDate)}" data-corp="${hasCorp}" data-price="${price||0}" data-signal="${esc(firstSig)}">
<td class="cell-code"><div class="code">${esc(codeStr)}</div>${g.name?`<div class="name">${esc(g.name)}</div>`:''}</td>
<td class="cell-price">${priceHtml}</td>
<td class="cell-pills">${sigPills||'<span class="muted">—</span>'}${corpPills?`<div class="cpillrow">${corpPills}</div>`:''}</td>
<td class="cell-time">${esc(lastTime)}</td>
<td class="cell-link">${saveBtn}${tvLnk}${secLnk}</td>
</tr>`;
}

const CORP_LABELS = {placement:'配股',increase:'增持',rights:'供股',other:'公告'};
function corpLabel(t){ return CORP_LABELS[t]||'公告'; }

function renderTable(groups){
  const _wl=new Set((()=>{try{return JSON.parse(localStorage.getItem('us_watchlist_v1')||'[]').map(x=>x.code);}catch{return [];}})());
  // Filter for US stocks only
  const usGroups = (groups||[]).filter(g=>{
    if(g.market==='US') return true;
    const tags=typeof g.tags==='string'?g.tags:(g.tags||[]).join(',');
    if(tags.includes('美股')) return true;
    const c=(g.code||g.symbol||'');
    if(/^[A-Z]{1,6}(-[A-Z])?$/.test(c)) return true;
    return false;
  });
  const html = usGroups.length
    ? usGroups.map(g=>renderRow(g,_wl)).join('')
    : '<tr><td colspan="5" class="empty">暫無美股數據</td></tr>';
  document.getElementById('tableWrap').innerHTML =
    `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table><thead><tr>
<th class="sortable" data-sort="code">Ticker / 名稱<span class="sort-icon"></span></th>
<th class="sortable" data-sort="price">價格<span class="sort-icon"></span></th>
<th class="sortable" data-sort="signal">信號 / 公告<select id="sigFilter" class="th-filter" onclick="event.stopPropagation()" onchange="ftype=this.value;applyFilter()"><option value="all">全部</option><option value="poc">POC突破</option><option value="yearopen">年開突破</option><option value="fvg">FVG</option><option value="placement">配股</option><option value="increase">增持</option><option value="rights">供股</option></select><span class="sort-icon"></span></th>
<th class="sortable sort-active sort-desc" data-sort="date">最後出現<span class="sort-icon">▼</span></th>
<th>連結</th>
</tr></thead><tbody id="urows">${html}</tbody></table></div>`;
  attachSort();
  const sf=document.getElementById('sigFilter');if(sf)sf.value=ftype;
  renderSummary(usGroups);
}

function renderSummary(groups){
  let p=0,inc=0,r=0;
  groups.forEach(g=>{
    if(g.corpTypes){
      if(g.corpTypes.placement) p+=g.corpTypes.placement.count;
      if(g.corpTypes.increase) inc+=g.corpTypes.increase.count;
      if(g.corpTypes.rights) r+=g.corpTypes.rights.count;
    }
  });
  document.getElementById('summary').innerHTML =
    `<span class="cnt placement">配股 <b>${p}</b></span><span class="cnt increase">增持 <b>${inc}</b></span><span class="cnt rights">供股 <b>${r}</b></span>`;
}

// --- Filtering ---
let ftype='all';
function applyFilter(){
  const tbody=document.getElementById('urows');
  if(!tbody)return;
  const q=(document.getElementById('tq')?.value||'').trim().toLowerCase();
  tbody.querySelectorAll('.urow').forEach(r=>{
    const name=(r.dataset.name||'').toLowerCase();
    const code=(r.dataset.code||'').toLowerCase();
    const date=(r.dataset.date||'');
    const sigText=Array.from(r.querySelectorAll('.spill')).map(s=>s.textContent).join(' ');
    const hasSig=kw=>sigText.indexOf(kw)>=0;
    let ftOK=true;
    if(ftype==='poc')ftOK=hasSig('POC');
    else if(ftype==='yearopen')ftOK=hasSig('年開');
    else if(ftype==='fvg')ftOK=hasSig('FVG');
    else if(ftype==='placement')ftOK=!!r.querySelector('.cpill-placement');
    else if(ftype==='increase')ftOK=!!r.querySelector('.cpill-increase');
    else if(ftype==='rights')ftOK=!!r.querySelector('.cpill-rights');
    const mq=!q||name.includes(q)||code.includes(q);
    r.style.display=(ftOK&&mq)?'':'none';
  });
}
document.getElementById('tq').addEventListener('input',applyFilter);
document.getElementById('tclear').addEventListener('click',()=>{
  document.getElementById('tq').value='';
  const sf=document.getElementById('sigFilter');if(sf)sf.value='all';
  ftype='all';applyFilter();
});

// --- Sorting ---
let sortCol='date',sortDir=-1;
function getVal(r,col){
  if(col==='code')return r.dataset.code||'';
  if(col==='date')return r.dataset.date||'';
  if(col==='price')return parseFloat(r.dataset.price||'0');
  if(col==='count')return parseInt(r.dataset.count||'0',10);
  if(col==='signal')return r.dataset.signal||'';
  return '';
}
function attachSort(){
  document.querySelectorAll('th.sortable').forEach(th=>{
    th.addEventListener('click',()=>{
      const col=th.dataset.sort;
      if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=(col==='date'||col==='count'||col==='price')?-1:1;}
      document.querySelectorAll('th.sortable').forEach(x=>{x.classList.remove('sort-active','sort-desc','sort-asc');x.querySelector('.sort-icon').textContent='';});
      th.classList.add('sort-active',sortDir===1?'sort-asc':'sort-desc');
      th.querySelector('.sort-icon').textContent=sortDir===1?'▲':'▼';
      const tbody=document.getElementById('urows');if(!tbody)return;
      const rows=Array.from(tbody.querySelectorAll('.urow'));
      rows.sort((a,b)=>{const av=getVal(a,col),bv=getVal(b,col);return av<bv?sortDir:av>bv?-sortDir:0;});
      rows.forEach(r=>tbody.appendChild(r));
      applyFilter();
    });
  });
}

// --- Holdings card (like Market for HK) ---
function renderHoldings(h){
  const card=document.getElementById('holdCard');
  if(!h||!h.stocks){card.style.display='none';return;}
  const stocks=Object.values(h.stocks);
  if(!stocks.length){card.style.display='none';return;}
  card.style.display='';
  document.getElementById('holdDate').textContent=h.updated||'';
  // Compute top by inst_count (most institutions)
  const byCount = [...stocks].filter(s=>s.inst_count).sort((a,b)=>b.inst_count-a.inst_count).slice(0,5);
  // Compute top by inst_pct (highest institutional ownership)
  const byPct = [...stocks].filter(s=>s.inst_pct).sort((a,b)=>b.inst_pct-a.inst_pct).slice(0,5);

  function rows(arr, label){
    if(!arr||!arr.length)return '<div style="color:var(--mute-2);font-size:11px;padding:6px 0">暫無數據</div>';
    return arr.map(r=>{
      const conc = r.top5_pct?`<span class="hold-conc">T5:${r.top5_pct}%</span>`:'';
      return '<div class="hold-row">'
        +'<span class="code" style="font-size:11px;min-width:46px">'+r.ticker+'</span>'
        +'<span class="hold-name" title="'+r.ticker+'">'+(label==='count'?(r.inst_count||'')+'家':(r.inst_pct||'')+'%')+'</span>'
        +conc
        +'<span class="hold-delta '+(r.inst_pct>50?'up':'dn')+'">'+(r.inst_pct||0)+'%</span>'
        +'</div>';
    }).join('');
  }
  document.getElementById('holdUp').innerHTML=rows(byCount,'count');
  document.getElementById('holdDn').innerHTML=rows(byPct,'pct');
}

// --- Market ---
function renderMarket(snap){
  if(!snap) return;
  const bar=document.getElementById('mbar');
  if(!bar) return;
  function fmtNum(v,d){return v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
  function chgHtml(pct){if(pct==null)return '';const s=pct>=0?'+':'';return `<span style="font-size:10px;color:${pct>=0?'var(--up)':'var(--down)'}">${s}${pct.toFixed(2)}%</span>`;}
  function evBadge(ev){if(!ev)return '';return `<span class="ev-${ev.color}">${ev.label}</span>`;}
  function avgHtml(avg){if(avg==null)return '';return `<span class="mchip-avg">均${fmtNum(avg,2)}</span>`;}
  function chip(label,val,chgPct,stale,dp,ev,avg5y){
    const valStr=fmtNum(val,dp??2);
    const sub=(evBadge(ev)||avgHtml(avg5y))?`<span class="mchip-sub">${evBadge(ev)}${avgHtml(avg5y)}</span>`:'';
    return `<div class="mchip"><span class="mchip-label">${label}</span><span class="mchip-val${stale?' stale':''}">${valStr} ${chgHtml(chgPct)}</span>${sub}</div>`;
  }
  const dw=snap.dow||{},d=snap.dxy||{},v=snap.vix||{},sp_pe=snap.spx_pe||{},sm=snap.spx_m2||{},fg=snap.fear_greed||{};
  bar.innerHTML=[
    chip('道指', dw.value, dw.changePct, dw.stale, 0),
    chip('DXY', d.value, d.changePct, d.stale, 2),
    chip('VIX', v.value, v.changePct, v.stale, 2, v.eval),
    chip('美股P/E', sp_pe.value, null, sp_pe.stale, 2, sp_pe.eval, sp_pe.avg5y_mid),
    chip('SPX/M2', sm.value, null, sm.stale, 0, sm.eval),
    chip('恐懼貪婪', fg.value, fg.changePct, fg.stale, 0, fg.eval),
  ].join('');
}
function renderBreadth(snap){
  const card=document.getElementById('breadthCard');
  if(!card)return;
  if(!snap||!snap.breadth){card.style.display='none';return;}
  function row(lbl,b){
    if(!b||!b.count)return '';
    return '<div class="breadth-row">'
      +'<span class="breadth-lbl">'+lbl+'</span>'
      +'<span class="bs-hi" style="flex-shrink:0;font-size:10px">高'+b.high+'%</span>'
      +'<div class="breadth-bar">'
        +'<div class="bs-h" style="width:'+b.high+'%"></div>'
        +'<div class="bs-m" style="width:'+b.mid+'%"></div>'
        +'<div class="bs-l" style="width:'+b.low+'%"></div>'
      +'</div>'
      +'<span class="bs-lo" style="flex-shrink:0;font-size:10px">低'+b.low+'%</span>'
      +'<span class="bs-n" style="font-size:10px">(n='+b.count+')</span>'
    +'</div>';
  }
  const rows=row('港股',snap.breadth.hk)+row('美股',snap.breadth.us);
  if(!rows){card.style.display='none';return;}
  document.getElementById('breadthRows').innerHTML=rows;
  card.style.display='';
}

// Watchlist save
function saveToWatch(btn){
  try{
    const {code,name,signal,date}=btn.dataset;
    const key='us_watchlist_v1';
    const items=JSON.parse(localStorage.getItem(key)||'[]');
    const idx=items.findIndex(x=>x.code===code);
    const entry={id:idx>=0?items[idx].id:Date.now(),code,name,signal,date,note:idx>=0?items[idx].note:''};
    if(idx>=0)items[idx]=entry;else items.unshift(entry);
    localStorage.setItem(key,JSON.stringify(items));
    btn.textContent='★';btn.classList.add('saved');
    setTimeout(()=>{if(btn.textContent==='★'){btn.textContent='☆';btn.classList.remove('saved');}},2000);
  }catch(e){}
}
document.getElementById('tableWrap').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-save');if(!btn)return;saveToWatch(btn);
});

// --- Data fetch ---
async function loadData(){
  const dot=document.getElementById('statusDot');
  const upd=document.getElementById('updatedAt');
  dot.className='dot loading';
  upd.textContent='載入中…';
  try{
    const res = await fetch('./data/signals.json?_='+Date.now());
    const data = await res.json();
    if(!data.ok) throw new Error(data.error||'API error');
    renderTable(data.groups||[]);
    // Merge tech alerts (POC/FVG/Gap) from alerts.json
    fetch('./data/alerts.json?_='+Date.now())
      .then(r=>r.ok?r.json():null)
      .then(ad=>{
        if(ad&&ad.alerts){
          var alertByCode={};
          ad.alerts.forEach(function(a){
            var p=typeof a.payload==='string'?JSON.parse(a.payload):(a.payload||{});
            var code=String(p.code||a.code||'').padStart(5,'0');
            var sig=p.signal||{};
            if(!alertByCode[code])alertByCode[code]=[];
            alertByCode[code].push({label:a.signal||sig.type||'',date:sig.date||(a.created_at||'').slice(0,10)});
          });
          (data.groups||[]).forEach(function(g){
            var code=String(g.code||'').padStart(5,'0');
            var alerts=alertByCode[code];
            if(alerts&&alerts.length){
              if(!g.signals)g.signals=[];
              alerts.forEach(function(a){g.signals.push(a);});
            }
          });
          renderTable(data.groups||[]);
        }
      }).catch(function(){});
    fetch('./market.json?_='+Date.now())
      .then(r=>r.ok?r.json():null)
      .then(m=>{renderMarket(m);renderBreadth(m);})
      .catch(()=>{});
    fetch('./us_holdings.json?_='+Date.now())
      .then(r=>r.ok?r.json():null)
      .then(h=>renderHoldings(h))
      .catch(()=>{});
    const t=new Date(data.updatedAt);
    const p=n=>n<10?'0'+n:''+n;
    upd.textContent='更新於 '+t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+' '+p(t.getHours())+':'+p(t.getMinutes());
    dot.className='dot';
    applyFilter();
  }catch(err){
    dot.className='dot error';
    upd.textContent='載入失敗：'+err.message;
    document.getElementById('tableWrap').innerHTML=`<div class="loading-msg" style="color:#ef4444">載入失敗：${esc(err.message)}<br><small>請稍後重試</small></div>`;
  }
}

const saved=sessionStorage.getItem('usDashScroll');
if(saved)window.scrollTo(0,parseInt(saved,10));

loadData();
setTimeout(()=>{sessionStorage.setItem('usDashScroll',String(window.scrollY));location.reload();},REFRESH_MS);
