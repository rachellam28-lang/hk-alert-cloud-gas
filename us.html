<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>美股事件儀表板</title>
<style>
:root{--bg:#f8fafc;--surface:#fff;--surface-soft:#f1f5f9;--text:#0f172a;--text-soft:#334155;--mute:#64748b;--mute-2:#94a3b8;--line:#e2e8f0;--line-soft:#f1f5f9;--primary:#3b82f6;--up:#16a34a;--down:#dc2626;--amber:#d97706}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:100;background:rgba(248,250,252,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:0 16px}
.topbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:48px;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:28px;height:28px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.brand-title{font-size:14px;font-weight:600}
.brand-sub{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.16em}
.brand-nav{font-size:12px;color:var(--mute);margin-left:4px}
.topright{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--mute)}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block}
.dot.loading{background:#f59e0b;animation:pulse 1.2s infinite}
.dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line-soft)}
.tlabel{font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.14em}
.spacer{flex:1}
.tabs{display:flex;gap:2px;background:var(--surface-soft);border-radius:8px;padding:2px}
.tab{appearance:none;background:transparent;border:0;color:var(--text-soft);padding:5px 12px;border-radius:6px;font:500 12px inherit;cursor:pointer;transition:background .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.search{display:flex;gap:6px;align-items:center}
.input{border:1px solid var(--line);border-radius:8px;padding:5px 10px;font:inherit;font-size:12px;background:var(--surface);color:var(--text);outline:none}
.input:focus{border-color:var(--primary)}
.btn-ghost{appearance:none;background:transparent;border:1px solid var(--line);color:var(--text-soft);padding:5px 10px;border-radius:8px;font:500 12px inherit;cursor:pointer}
.summary{display:flex;gap:6px;flex-wrap:wrap}
.sbadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.sb-buy{background:#dcfce7;color:#15803d}
.sb-place{background:#fee2e2;color:#b91c1c}
.sb-rights{background:#fef3c7;color:#b45309}
.sb-13d{background:#ede9fe;color:#6d28d9}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface-soft);color:var(--mute);font-size:10px;text-align:left;padding:9px 14px;text-transform:uppercase;letter-spacing:.14em;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--line-soft);transition:background .1s}
tbody tr:hover{background:var(--surface-soft)}
tbody tr:last-child{border-bottom:0}
td{padding:10px 14px;vertical-align:top}
.cell-ticker .ticker{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.02em}
.cell-ticker .co-name{font-size:11px;color:var(--mute);margin-top:2px}
.cell-ticker .mc{font-size:10px;color:var(--mute-2);margin-top:1px}
.etag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap}
.etag-buy{background:#dcfce7;color:#15803d}
.etag-place{background:#fee2e2;color:#b91c1c}
.etag-rights{background:#fef3c7;color:#b45309}
.etag-13d{background:#ede9fe;color:#6d28d9}
.cell-detail{font-size:12px;color:var(--text-soft);max-width:320px;line-height:1.5}
.cell-detail .buyer{font-size:11px;color:var(--mute);margin-top:2px}
.cell-val{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
.cell-val .sub{font-size:10px;color:var(--mute);font-weight:400}
.cell-links{white-space:nowrap}
.lnk{font-size:11px;font-weight:500;border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--text-soft);display:inline-block;margin-right:4px}
.lnk:hover{background:var(--surface-soft);text-decoration:none}
.cell-date{font-size:11px;color:var(--mute);white-space:nowrap}
.loading-msg{text-align:center;padding:60px 20px;color:var(--mute);font-size:14px}
.foot{text-align:center;font-size:11px;color:var(--mute-2);padding:16px 0 8px}
@media(max-width:720px){.cell-val,.cell-detail .buyer{display:none}thead th:nth-child(4){display:none}}
@media(max-width:520px){thead th:nth-child(5){display:none}.cell-date{display:none}}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f172a;--surface:#1e293b;--surface-soft:#162032;--text:#f1f5f9;--text-soft:#cbd5e1;--mute:#64748b;--mute-2:#475569;--line:#334155;--line-soft:#1e293b;--primary:#60a5fa;--up:#4ade80;--down:#f87171;--amber:#fbbf24}
  .topbar{background:rgba(15,23,42,.92)}
  .tabs{background:#1e293b}.tab.active{background:#0f172a}
  .sb-buy{background:#052e16;color:#4ade80}.sb-place{background:#2d0a0a;color:#f87171}
  .sb-rights{background:#1c0f00;color:#fbbf24}.sb-13d{background:#1e1040;color:#a78bfa}
  .etag-buy{background:#052e16;color:#4ade80}.etag-place{background:#2d0a0a;color:#f87171}
  .etag-rights{background:#1c0f00;color:#fbbf24}.etag-13d{background:#1e1040;color:#a78bfa}
}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner">
  <div class="brand">
    <div class="logo">🇺🇸</div>
    <div>
      <div class="brand-title">美股事件儀表板</div>
      <div class="brand-sub">SEC EDGAR · 小型股事件</div>
    </div>
    <a class="brand-nav" href="./index.html">← 港股版</a>
  </div>
  <div class="topright">
    <span class="dot loading" id="statusDot"></span>
    <span id="updatedAt">載入中…</span>
    <span>自動更新 10分鐘</span>
  </div>
</div></header>

<main class="wrap">
  <div class="card">
    <div class="toolbar">
      <div class="tlabel">美股事件</div>
      <div class="summary" id="summary"></div>
      <div class="spacer"></div>
      <div class="tabs" id="ftabs">
        <button class="tab active" data-ftype="all">全部</button>
        <button class="tab" data-ftype="buy">大手增持</button>
        <button class="tab" data-ftype="place">配股</button>
        <button class="tab" data-ftype="rights">供股</button>
        <button class="tab" data-ftype="13d">大手建倉</button>
      </div>
      <div class="search">
        <input id="tq" class="input" type="search" placeholder="搜尋 Ticker / 名稱…" autocomplete="off" style="min-width:140px">
        <button class="btn-ghost" id="tclear">清除</button>
      </div>
    </div>
    <div id="tableWrap"><div class="loading-msg">載入數據中…</div></div>
  </div>
  <div class="foot">美股事件儀表板 · SEC EDGAR · GitHub Pages</div>
</main>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxov_zEI5TvIp0Xg4ie937Rci_PEfFrUEyk7YH8RKVPz07i0RNS0fqkythLn-iErjVqZA/exec';
const REFRESH_MS = 600000;

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

function fmtDate(raw){
  if(!raw)return '—';
  try{const d=new Date(raw);const p=n=>n<10?'0'+n:''+n;return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());}catch{return raw;}
}

function etagClass(signal){
  if(!signal)return 'etag-13d';
  if(signal.includes('增持')||signal.includes('Form4'))return 'etag-buy';
  if(signal.includes('配股')||signal.includes('424'))return 'etag-place';
  if(signal.includes('供股'))return 'etag-rights';
  return 'etag-13d';
}
function ftypeOf(signal){
  if(!signal)return '13d';
  if(signal.includes('增持')||signal.includes('Form4'))return 'buy';
  if(signal.includes('配股')||signal.includes('424'))return 'place';
  if(signal.includes('供股'))return 'rights';
  return '13d';
}

function renderTable(groups){
  const usGroups = (groups||[]).filter(g=>(g.market==='US')||(g.tags||[]).includes('美股'));
  if(!usGroups.length){
    document.getElementById('tableWrap').innerHTML='<div class="loading-msg">暫無美股事件數據</div>';
    renderSummary([]);
    return;
  }
  renderSummary(usGroups);
  const rows = usGroups.map(g=>{
    const sig = g.signals&&g.signals[0]?g.signals[0].label:g.signal||'';
    const ft = ftypeOf(sig);
    const msg = g.message||g.signals?.[0]?.label||'';
    // Parse detail lines from message (2nd line onward)
    const lines = msg.split('\n').slice(1);
    const detail = lines.slice(0,2).map(l=>esc(l)).join('<br>');
    const buyer  = lines[2]?`<div class="buyer">${esc(lines[2])}</div>`:'';
    const tvUrl  = `https://www.tradingview.com/chart/?symbol=${esc(g.code)}`;
    const secUrl = g.hkexLink||g.sourceUrl||'';
    return `<tr class="urow" data-ftype="${ft}" data-code="${esc(g.code)}" data-name="${esc(g.name||'')}">
<td class="cell-ticker"><div class="ticker">${esc(g.code)}</div><div class="co-name">${esc(g.name||'')}</div></td>
<td><span class="etag ${etagClass(sig)}">${esc(sig)}</span></td>
<td class="cell-detail">${detail}${buyer}</td>
<td class="cell-date">${esc(fmtDate(g.latestRaw))}</td>
<td class="cell-links">
  <a class="lnk" href="${esc(tvUrl)}" target="_blank" rel="noopener">走勢圖</a>
  ${secUrl?`<a class="lnk" href="${esc(secUrl)}" target="_blank" rel="noopener">SEC</a>`:''}
</td></tr>`;
  });
  document.getElementById('tableWrap').innerHTML=
    `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
     <table><thead><tr>
       <th>Ticker / 名稱</th><th>事件類型</th><th>詳情</th><th>時間</th><th>連結</th>
     </tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
  applyFilter();
}

function renderSummary(groups){
  let buy=0,place=0,rights=0,d=0;
  groups.forEach(g=>{
    const sig=(g.signals&&g.signals[0]?g.signals[0].label:g.signal)||'';
    const ft=ftypeOf(sig);
    if(ft==='buy')buy++;else if(ft==='place')place++;
    else if(ft==='rights')rights++;else d++;
  });
  document.getElementById('summary').innerHTML=[
    buy?`<span class="sbadge sb-buy">大手增持 ${buy}</span>`:'',
    place?`<span class="sbadge sb-place">配股 ${place}</span>`:'',
    rights?`<span class="sbadge sb-rights">供股 ${rights}</span>`:'',
    d?`<span class="sbadge sb-13d">建倉 ${d}</span>`:'',
  ].join('');
}

let ftype='all';
function applyFilter(){
  const q=document.getElementById('tq').value.trim().toUpperCase();
  document.querySelectorAll('.urow').forEach(r=>{
    const ft=r.dataset.ftype||'';
    const code=(r.dataset.code||'').toUpperCase();
    const name=(r.dataset.name||'').toUpperCase();
    const ftOK=ftype==='all'||ftype===ft;
    const mq=!q||code.includes(q)||name.includes(q);
    r.style.display=(ftOK&&mq)?'':'none';
  });
}
document.getElementById('ftabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('#ftabs .tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');ftype=t.dataset.ftype||'all';applyFilter();
});
document.getElementById('tq').addEventListener('input',applyFilter);
document.getElementById('tclear').addEventListener('click',()=>{
  document.getElementById('tq').value='';
  document.querySelector('#ftabs .tab[data-ftype="all"]').classList.add('active');
  ftype='all';applyFilter();
});

async function loadData(){
  const dot=document.getElementById('statusDot');
  const upd=document.getElementById('updatedAt');
  dot.className='dot loading';
  try{
    const res=await fetch(GAS_URL+'?format=json');
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'API error');
    renderTable(data.groups||[]);
    const t=new Date(data.updatedAt);
    const p=n=>n<10?'0'+n:''+n;
    upd.textContent='更新於 '+t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+' '+p(t.getHours())+':'+p(t.getMinutes());
    dot.className='dot';
  }catch(err){
    dot.className='dot error';
    upd.textContent='載入失敗：'+err.message;
    document.getElementById('tableWrap').innerHTML=`<div class="loading-msg" style="color:#ef4444">載入失敗：${esc(err.message)}</div>`;
  }
}
loadData();
setTimeout(()=>location.reload(),REFRESH_MS);
</script>
</body>
</html>
